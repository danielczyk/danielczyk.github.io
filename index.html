<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Drzewo Genealogiczne</title>
  <style type="text/css">
    :root {
      --bg:          #ffffff;
      --surface:     #ffffff;
      --surface-2:   #efefef;
      --border:      #cccccc;
      --text:        #000000;
      --text-muted:  #555555;
      --text-mono:   #333333;
      --btn-primary: #333333;
      --btn-hover:   #555555;
      --btn-disabled:#999999;
      --shadow:      rgba(0,0,0,0.2);
      --nav-btn-bg:  rgba(255,255,255,0.9);
      --nav-btn-active: rgba(220,220,220,0.95);
    }
    body.dark {
      --bg:          #16213e;
      --surface:     #1f2d47;
      --surface-2:   #0f3460;
      --border:      #3a4a6b;
      --text:        #e0e0e0;
      --text-muted:  #9aaabb;
      --text-mono:   #b0c0d0;
      --btn-primary: #4a90d9;
      --btn-hover:   #6aaaf0;
      --btn-disabled:#556070;
      --shadow:      rgba(0,0,0,0.5);
      --nav-btn-bg:  rgba(31,45,71,0.95);
      --nav-btn-active: rgba(15,52,96,0.95);
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
    }
    #login {
      background-color: var(--surface-2);
      padding: 20px;
      border-radius: 8px;
    }
    #login input {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 14px;
    }
    #login button {
      background: var(--btn-primary);
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-left: 6px;
    }
    #login button:hover { background: var(--btn-hover); }
    #myCanvas {
      cursor: pointer;
    }
    #person-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      background: var(--surface);
      color: var(--text);
      box-shadow: -2px 0 8px var(--shadow);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 10;
    }
    #person-panel.open {
      transform: translateX(0);
    }
    #panel-close {
      font-size: 24px;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }
    #panel-img {
      width: 100%;
      max-width: 200px;
      display: block;
      margin: 0 auto 16px;
      border-radius: 4px;
    }
    #panel-name {
      text-align: center;
      margin: 0 0 12px;
      font-size: 18px;
      font-family: Arial, sans-serif;
      color: var(--text);
    }
    #panel-id {
      text-align: center;
      margin: -8px 0 10px;
      font-size: 11px;
      font-family: Monaco, monospace;
      color: var(--text-muted);
    }
    #panel-details p {
      margin: 4px 0;
      font-size: 13px;
      font-family: Monaco, monospace;
      color: var(--text-mono);
    }
    #nav-widget {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 5;
      display: none;
      flex-direction: row;
      gap: 6px;
      align-items: center;
    }
    #nav-widget.visible {
      display: flex;
    }
    .nav-zoom {
      display: flex;
      flex-direction: row;
      gap: 6px;
    }
    #nav-widget button {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--nav-btn-bg);
      color: var(--text);
      box-shadow: 0 1px 4px var(--shadow);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      touch-action: none;
      user-select: none;
    }
    #nav-widget button:active {
      background: var(--nav-btn-active);
    }
    #about-btn,
    #settings-btn,
    #data-btn {
      position: fixed;
      right: 16px;
      z-index: 5;
      display: none;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--nav-btn-bg);
      color: var(--text);
      box-shadow: 0 1px 4px var(--shadow);
      cursor: pointer;
      font-size: 18px;
      align-items: center;
      justify-content: center;
    }
    #about-btn    { top: 16px; right: 104px; }
    #settings-btn { top: 16px; right: 60px; }
    #data-btn     { top: 16px; right: 16px; }
    #about-btn.visible,
    #settings-btn.visible,
    #data-btn.visible {
      display: flex;
    }
    #about-panel,
    #settings-panel,
    #data-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 300px;
      height: 100%;
      background: var(--surface);
      color: var(--text);
      box-shadow: -2px 0 8px var(--shadow);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 10;
    }
    #about-panel.open,
    #settings-panel.open,
    #data-panel.open {
      transform: translateX(0);
    }
    #about-close,
    #settings-close,
    #data-close {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 24px;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      line-height: 1;
    }
    #about-panel h2,
    #settings-panel h2,
    #data-panel h2 {
      font-family: Arial, sans-serif;
      font-size: 16px;
      margin: 0 0 16px;
      padding-right: 24px;
      color: var(--text);
    }
    #about-panel hr,
    #settings-panel hr,
    #data-panel hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }
    #data-panel label {
      display: block;
      font-family: Arial, sans-serif;
      font-size: 12px;
      margin-bottom: 4px;
      color: var(--text-muted);
    }
    #data-panel input[type="text"],
    #data-panel input[type="email"],
    #data-panel textarea {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      font-size: 13px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: Arial, sans-serif;
      background: var(--surface-2);
      color: var(--text);
    }
    #data-panel textarea {
      resize: vertical;
      min-height: 72px;
    }
    #data-panel input[type="file"] {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    #data-panel h3 {
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 6px;
      color: var(--text);
    }
    .data-panel-desc {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      margin: 0 0 10px;
      line-height: 1.5;
    }
    .data-panel-accordion {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      margin: 0 0 0;
    }
    .data-panel-accordion::after {
      content: '▸';
      font-size: 11px;
      color: var(--text-muted);
      transition: transform 0.15s ease;
    }
    .data-panel-accordion.open::after {
      transform: rotate(90deg);
    }
    .data-panel-accordion-body {
      display: none;
      margin-top: 12px;
    }
    .data-panel-accordion-body.open {
      display: block;
    }
    #data-panel button:not(#data-close) {
      padding: 9px;
      font-size: 13px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      box-sizing: border-box;
    }
    #settings-merge-btn {
      width: 100%;
      background: var(--btn-primary);
      color: #fff;
    }
    #settings-merge-btn:hover    { background: var(--btn-hover); }
    #settings-merge-btn:disabled { background: var(--btn-disabled); cursor: default; }
    #settings-merge-status {
      margin-top: 8px;
      font-size: 11px;
      font-family: Arial, sans-serif;
      color: var(--text-muted);
      min-height: 16px;
      white-space: pre-line;
      line-height: 1.5;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
    }
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--btn-primary); }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }
    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      min-height: 32px;
    }
    #panel-edit-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 2px 6px;
      margin-right: 4px;
      border-radius: 4px;
    }
    #panel-edit-btn:hover { color: var(--text); background: var(--surface-2); }
    #panel-img-wrap {
      position: relative;
      width: fit-content;
      margin: 0 auto 4px;
    }
    #panel-img-edit-btn {
      display: none;
      width: 100%;
      max-width: 200px;
      margin: 0 auto 4px;
      box-sizing: border-box;
      gap: 6px;
      justify-content: center;
    }
    #panel-img-change-label {
      flex: 1;
      padding: 5px;
      background: var(--surface-2);
      border: 1px dashed var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 12px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      text-align: center;
    }
    #panel-img-change-label:hover { color: var(--text); border-color: var(--text-muted); }
    #panel-img-remove-btn {
      padding: 5px 8px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 12px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      white-space: nowrap;
    }
    #panel-img-remove-btn:hover { color: #c0392b; border-color: #c0392b; }
    #panel-edit-form {
      font-family: Arial, sans-serif;
    }
    #panel-edit-form label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
      margin-top: 8px;
    }
    #panel-edit-form input[type="text"],
    #panel-edit-form select {
      width: 100%;
      box-sizing: border-box;
      font-size: 13px;
      padding: 5px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface-2);
      color: var(--text);
      font-family: Monaco, monospace;
    }
    .edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .edit-actions button {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-family: Arial, sans-serif;
    }
    #edit-save-btn,
    #add-relative-save   { background: var(--btn-primary); color: #fff; }
    #edit-save-btn:hover,
    #add-relative-save:hover { background: var(--btn-hover); }
    #edit-cancel-btn,
    #add-relative-cancel { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .settings-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .settings-row button {
      flex: 1;
    }
    #settings-send-webhook { width: 100%; background: var(--btn-primary); color: #fff; }
    #settings-send-webhook:hover:not(:disabled) { background: var(--btn-hover); }
    #settings-send-webhook:disabled { background: var(--btn-disabled); cursor: default; }
    #webhook-email-error { font-size: 11px; font-family: Arial, sans-serif; color: #c0392b; margin: -6px 0 8px; min-height: 14px; }
    #settings-download-edits { width: 100%; background: var(--btn-primary); color: #fff; }
    #export-html-btn { width: 100%; background: var(--btn-primary); color: #fff; }
    #export-html-btn:hover { background: var(--btn-hover); }
    #export-html-btn:disabled { background: var(--btn-disabled); cursor: default; }
    #export-password-error {
      font-size: 11px;
      font-family: Arial, sans-serif;
      margin: 2px 0 6px;
      color: #c0392b;
      min-height: 14px;
    }
    #export-html-status {
      font-size: 11px;
      font-family: Arial, sans-serif;
      margin: 4px 0 0;
      color: var(--text-muted);
    }
    #settings-download-edits:hover { background: var(--btn-hover); }
    #settings-reset-edits { background: #c0392b; color: #fff; border: none; }
    #settings-reset-edits:hover { background: #a93226; }
    #settings-edit-count {
      font-size: 11px;
      font-family: Arial, sans-serif;
      color: var(--text-muted);
      margin: 4px 0 0;
      line-height: 1.5;
    }
    #settings-edit-count ul {
      margin: 4px 0 0;
      padding: 0 0 0 14px;
      list-style: disc;
    }
    #settings-edit-count li {
      margin: 1px 0;
      color: var(--text);
    }
    #crop-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #crop-canvas {
      display: block;
      border-radius: 8px;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
    #crop-canvas:active { cursor: grabbing; }
    #crop-actions {
      display: flex;
      gap: 10px;
    }
    #crop-actions button {
      padding: 9px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      cursor: pointer;
    }
    #crop-cancel  { background: rgba(255,255,255,0.15); color: #fff; }
    #crop-cancel:hover { background: rgba(255,255,255,0.25); }
    #crop-zoom-out,
    #crop-zoom-in { background: rgba(255,255,255,0.15); color: #fff; font-size: 20px; padding: 7px 16px; }
    #crop-zoom-out:hover,
    #crop-zoom-in:hover { background: rgba(255,255,255,0.25); }
    #crop-apply   { background: var(--btn-primary); color: #fff; }
    #crop-apply:hover { background: var(--btn-hover); }
    #conflict-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 201;
      align-items: center;
      justify-content: center;
    }
    #conflict-box {
      background: var(--surface);
      color: var(--text);
      padding: 24px;
      border-radius: 8px;
      max-width: 560px;
      width: calc(100vw - 48px);
      max-height: 80vh;
      overflow-y: auto;
      font-family: Arial, sans-serif;
      box-shadow: 0 4px 24px var(--shadow);
    }
    #conflict-box h2 { margin: 0 0 8px; font-size: 18px; }
    #conflict-summary { margin: 0 0 16px; color: var(--text-muted); font-size: 13px; }
    .conflict-row {
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }
    .conflict-row:last-of-type { border-bottom: none; }
    .conflict-person { font-weight: bold; font-size: 14px; margin-bottom: 2px; }
    .conflict-field { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .conflict-choice {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      cursor: pointer;
    }
    .conflict-choice input { margin-right: 6px; cursor: pointer; }
    .conflict-choice strong { color: var(--text); }
    #conflict-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    #conflict-done {
      background: var(--btn-primary);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      margin-left: auto;
    }
    #conflict-done:hover { background: var(--btn-hover); }
    #conflict-keep-all,
    #conflict-accept-all {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
    }
    #conflict-keep-all:hover,
    #conflict-accept-all:hover { color: var(--text); border-color: var(--text-muted); }
    #panel-remove-btn {
      display: none;
      margin-top: 40px;
      width: 100%;
      padding: 10px;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      cursor: pointer;
    }
    #panel-remove-btn:hover { background: #a93226; }
    #search-container {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: 280px;
      display: none;
    }
    #search-container.visible { display: block; }
    #search-input {
      width: 100%;
      box-sizing: border-box;
      height: 36px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--nav-btn-bg);
      color: var(--text);
      font-size: 14px;
      font-family: Arial, sans-serif;
      outline: none;
      box-shadow: 0 1px 4px var(--shadow);
    }
    #search-input:focus { border-color: var(--btn-primary); }
    #search-suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 0;
      margin: 0;
      list-style: none;
      max-height: 260px;
      overflow-y: auto;
      box-shadow: 0 4px 12px var(--shadow);
    }
    #search-suggestions li {
      padding: 8px 12px;
      font-size: 13px;
      font-family: Arial, sans-serif;
      color: var(--text);
      cursor: pointer;
    }
    #search-suggestions li:hover,
    #search-suggestions li.active { background: var(--surface-2); }
    #remove-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 201;
      align-items: center;
      justify-content: center;
    }
    #remove-modal-box {
      background: var(--surface);
      color: var(--text);
      padding: 24px;
      border-radius: 8px;
      max-width: 360px;
      width: calc(100vw - 48px);
      font-family: Arial, sans-serif;
      box-shadow: 0 4px 24px var(--shadow);
    }
    #remove-modal-box p { margin: 0 0 20px; font-size: 15px; line-height: 1.4; }
    #remove-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    #remove-modal-cancel {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    #remove-modal-cancel:hover { color: var(--text); border-color: var(--text-muted); }
    #remove-modal-confirm {
      background: #c0392b;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    #remove-modal-confirm:hover { background: #a93226; }
    #reset-edits-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 201;
      align-items: center;
      justify-content: center;
    }
    #reset-edits-cancel {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    #reset-edits-cancel:hover { color: var(--text); border-color: var(--text-muted); }
    #reset-edits-confirm {
      background: #c0392b;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    #reset-edits-confirm:hover { background: #a93226; }
    #webhook-success-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 201;
      align-items: center;
      justify-content: center;
    }
    #webhook-success-close {
      background: var(--btn-primary);
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    #webhook-success-close:hover { background: var(--btn-hover); }
    #add-relative-panel {
      position: fixed;

// ── ID scanning ──────────────────────────────────────────────────────────────

function scanIdRange(text) {
  const re = /(@I|@F)(\d+)@/g;
  let minPerson = Infinity, maxPerson = -Infinity;
  let minFamily = Infinity, maxFamily = -Infinity;
  let m;
  while ((m = re.exec(text)) !== null) {
    const n = parseInt(m[2], 10);
    if (m[1] === '@I') {
      if (n < minPerson) minPerson = n;
      if (n > maxPerson) maxPerson = n;
    } else {
      if (n < minFamily) minFamily = n;
      if (n > maxFamily) maxFamily = n;
    }
  }
  return { minPerson, maxPerson, minFamily, maxFamily };
}

// ── ID shifting ───────────────────────────────────────────────────────────────

function shiftIds(text, personShift, familyShift) {
  if (personShift === 0 && familyShift === 0) return text;
  const re = /(@I|@F|MH:I|MH:F)(\d+)(@?)/g;
  return text.replace(re, (match, prefix, idStr, suffix) => {
    const isFamily = prefix === '@F' || prefix === 'MH:F';
    const shift = isFamily ? familyShift : personShift;
    return `${prefix}${parseInt(idStr, 10) + shift}${suffix}`;

      const person = { pointer: item.pointer };
      for (const p of item.tree) {
        if (p.tag === '_UPD')       { person.lastUpdated = p.data; }
        else if (p.tag === '_UID')  { person.uuid = p.data; }
        else if (p.tag === 'RIN')   { person.id = p.data; }
        else if (p.tag === 'FAMS')  { person.fams = p.data; }
        else if (p.tag === 'FAMC')  { person.famc = p.data; }
        else if (p.tag === 'SEX')   { person.sex = p.data; }
        else if (p.tag === 'NAME')  {
          person.fullname = p.data;
          for (const pp of (p.tree || [])) {
            if (pp.tag === 'GIVN') person.givenname = pp.data;
            else if (pp.tag === 'SURN') person.surname = pp.data;
          }
        }
        else if (p.tag === 'BIRT') {
          for (const pp of (p.tree || [])) {
            if (pp.tag === 'DATE') person.date_of_birth = pp.data;
            else if (pp.tag === 'PLAC') person.place_of_birth = pp.data;
          }
        }
        else if (p.tag === 'DEAT') {
          person.is_death = p.data || 'Y';
          for (const pp of (p.tree || [])) {
            if (pp.tag === 'DATE') person.date_of_death = pp.data;
            else if (pp.tag === 'PLAC') person.place_of_death = pp.data;
          }
        }
      }
      people.push(person);
    } else if (item.tag === 'FAM') {
      const family = { pointer: item.pointer, children: [] };
      for (const p of item.tree) {
        if (p.tag === '_UPD')      { family.lastUpdated = p.data; }
        else if (p.tag === '_UID') { family.uuid = p.data; }
        else if (p.tag === 'RIN')  { family.id = p.data; }
        else if (p.tag === 'HUSB') { family.husband = p.data; }
        else if (p.tag === 'WIFE') { family.wife = p.data; }
        else if (p.tag === 'CHIL') { family.children.push(p.data); }
        else if (p.tag === 'MARR') {
          for (const pp of (p.tree || [])) {
            if (pp.tag === 'DATE') family.date_of_marriage = pp.data;
            else if (pp.tag === 'PLAC') family.place_of_marriage = pp.data;
          }
        }
      }
      families.push(family);
    }
  }
  return { people, families };
}

// ── Deduplication ─────────────────────────────────────────────────────────────

function countFields(obj) {
  return Object.values(obj).filter(v =>
    v !== undefined && v !== null && v !== '' &&
    !(Array.isArray(v) && v.length === 0)
  ).length;
}

function deduplicate(people, families) {
  const redirects = new Map();

  function deduplicateArray(records) {
    const uuidMap = new Map();
    const kept = [];
    for (const rec of records) {
      if (!rec.uuid) { kept.push(rec); continue; }
      const existing = uuidMap.get(rec.uuid);
      if (!existing) {
        uuidMap.set(rec.uuid, rec);
        kept.push(rec);
      } else if (countFields(rec) > countFields(existing)) {
        redirects.set(existing.pointer, rec.pointer);
        uuidMap.set(rec.uuid, rec);
        kept[kept.indexOf(existing)] = rec;
      } else {
        redirects.set(rec.pointer, existing.pointer);
      }
    }
    return kept;
  }

  return {
    people: deduplicateArray(people),
    families: deduplicateArray(families),
    redirects,
  };
}

// ── Redirect application ──────────────────────────────────────────────────────

function applyRedirects(people, families, redirects) {
  if (redirects.size === 0) return { people, families };

  function r(ptr) { return redirects.get(ptr) || ptr; }

  for (const p of people) {
    if (p.fams) p.fams = r(p.fams);
    if (p.famc) p.famc = r(p.famc);
  }
  for (const f of families) {
    if (f.husband) f.husband = r(f.husband);
    if (f.wife)    f.wife    = r(f.wife);
    f.children = f.children.map(r);
  }
  return { people, families };
}

// ── Main export ───────────────────────────────────────────────────────────────

function mergeGedcoms(gedcomTexts, rootId) {
  if (!gedcomTexts || gedcomTexts.length === 0) {
    return { rootId, people: [], families: [], stats: { inputs: [], duplicatesPeople: 0, duplicatesFamilies: 0 } };
  }

  let globalMaxPerson = 0;
  let globalMaxFamily = 0;
  const allPeople = [];
  const allFamilies = [];
  const inputStats = [];

  for (let i = 0; i < gedcomTexts.length; i++) {
    const raw = gedcomTexts[i];
    const range = scanIdRange(raw);

    let text = raw;
    if (i > 0) {
      const personShift = isFinite(range.minPerson)
        ? Math.max(0, globalMaxPerson - range.minPerson + 1) : 0;
      const familyShift = isFinite(range.minFamily)
        ? Math.max(0, globalMaxFamily - range.minFamily + 1) : 0;
      text = shiftIds(raw, personShift, familyShift);
    }

    const shiftedRange = scanIdRange(text);
    if (isFinite(shiftedRange.maxPerson)) globalMaxPerson = Math.max(globalMaxPerson, shiftedRange.maxPerson);
    if (isFinite(shiftedRange.maxFamily)) globalMaxFamily = Math.max(globalMaxFamily, shiftedRange.maxFamily);

    const { people, families } = gedcomTextToRecords(text);
    inputStats.push({ people: people.length, families: families.length });
    allPeople.push(...people);
    allFamilies.push(...families);
  }

  const { people, families, redirects } = deduplicate(allPeople, allFamilies);
  const result = applyRedirects(people, families, redirects);

  const stats = {
    inputs: inputStats,
    duplicatesPeople: allPeople.length - result.people.length,
    duplicatesFamilies: allFamilies.length - result.families.length,
  };

  return { rootId, people: result.people, families: result.families, stats };
}

function serializeToDataJs(result) {
  const { rootId, people, families } = result;
  return [
    `const rootId = ${JSON.stringify(rootId)}`,
    `const people = ${JSON.stringify(people, null, 2)}`,
    `const fams = ${JSON.stringify(families, null, 2)}`,
    `const images = {}`,
    `if (typeof module !== 'undefined') module.exports = { rootId, people, fams, images };`,
  ].join('\n\n');
}

if (typeof module !== 'undefined') {
  module.exports = { mergeGedcoms, serializeToDataJs, gedcomTextToRecords, shiftIds, scanIdRange };
}


    class Node {
  constructor(id, type, data, x, y, dataIndex, fams, famsArray) {
    this.id = id;
    this._x = x;
    this._y = y;
    this._mod = 0
    if (type === 'single') {
      this.width = 200;
    } else if (type === 'couple') {
      this.width = 2 * 200 + 50;
    } else if (type === 'chain') {
      const nSpouses = data.length - 1;
      this.width = (nSpouses + 1) * 200 + nSpouses * 50;
    } else {
      this.width = 200;
    }
    this.height = 100;
    this.children = [] // so later we can traverse the graph
    this._parent = null;
    this.type = type;
    this.data = data; // array with people
    this.dataIndex = dataIndex;
    this.fams = fams
    this.famsArray = famsArray || null;
  }

  getParent() {
    return this._parent;
  }
  setParent(parent) {
    this._parent = parent;
  }
  setX(x) {
    this._x += x;
  }
  setY(y) {
    this._y += y;
  }
  getX() {
    return this._x;
  }
  getFinalX() {
    let x = this._x;
    if (this._parent) {
      x += this._parent.getMod()
    }
    return x;
  }
  getFinalY() {
    return this._y;
  }
  getMod() {
    let mod = this._mod;
    if (this._parent) {
      mod += this._parent.getMod()
    }
    return mod;
  }

  isLeaf() {
    return this.children.length === 0;
  }

  isSingle() {
    return this._parent.children[0] === this && this._parent.children.length === 1;
  }

  isLeftMost() {
    if (this._parent === null) {
      return true;
    }
    return this._parent.children[0] === this;
  }

  isRightMost() {
    if (this._parent === null) {
      return true;
    }

    return this._parent.children[this._parent.children.length - 1] === this;
  }

  getPreviousSibling() {
    if (this._parent === null || this.isLeftMost()) {
      return null;
    }
    return this._parent.children[this._parent.children.indexOf(this) - 1];
  }

  getLeftMostChild() {
    if (this.children.length === 0) {
      return null;
    }
    return this.children[0];
  }

  getRightMostChild() {
    if (this.children.length === 0) {
      return null;
    }
    return this.children[this.children.length - 1];
  }

  getLeftMostSibling() {
    if (this._parent === null) {
      return null;
    }

    if (this.isLeftMost()) {
      return this;
    }

    return this._parent.children[0];
  }

  getNextSibling() {
    if (this._parent === null || this.isRightMost()) {
      return null;
    }
    const ownIndex = this._parent.children.indexOf(this)
    return this._parent.children[ownIndex + 1];
  }

}

const NODE_SIZE = 0;
const SIBLING_DISTANCE = 1;
const TREE_DISTANCE = 1


function addToLayer(node, layers) {
  for (const child of node.children) {
    addToLayer(child, layers)
  }
  if (!layers[node._y]) {
    layers[node._y] = [];
  }
  layers[node._y].push(node)
}

function printLayerByLayer(rootNode) {
  const layers = [];
  addToLayer(rootNode, layers)

  let coordinates = ''
  let dots = '';
  for (const layer of layers) {
    const dotsArray = []
    for (const node of layer) {
      coordinates += `${node.id} x:${node._x}/mod:${node._mod},   `
      const n = (node._x + 1) * 4;
      for (let i = 0; i < n; i++) {
        if (i < n - 1 && dotsArray[i] === undefined) {
          dotsArray.push(' ');
        } else if (i < n - 1 && dotsArray[i] !== undefined) {
          // do nothing
        } else {
          const nodeId = '' + node.id;
          dotsArray.push(' ' + nodeId.substring(0,1));
        }
      }
    }
    coordinates += '\n'
    dots += dotsArray.join('') + '\n'
  }
  console.log(coordinates)
  console.log(dots)
}

function initializeDepth(node, depth) {
  node._x = -1;
  node._y = depth;
  node._mod = 0;
  for (const child of node.children) {
    initializeDepth(child, depth + 1);
  }
}

function getLeftContour(node, modSum, contourMap) {
  if (contourMap[node._y] === undefined) {
    contourMap[node._y] = node._x + modSum;
  } else {
    contourMap[node._y] = Math.min(contourMap[node._y], node._x + modSum);
  }

  modSum += node._mod;
  for(const child of node.children) {
    getLeftContour(child, modSum, contourMap);
  }
}

function getRightContour(node, modSum, contourMap) {
  if (contourMap[node._y] === undefined) {
    contourMap[node._y] = node._x + modSum;
  } else {
    contourMap[node._y] = Math.max(contourMap[node._y], node._x + modSum);
  }

  modSum += node._mod;
  for(const child of node.children) {
    getRightContour(child, modSum, contourMap);
  }
}

function centerNodesBetween(leftNode, rightNode) {

    const children = leftNode._parent.children;
    const leftIndex = children.indexOf(leftNode);
    const rightIndex = children.indexOf(rightNode);
    const numNodesBetween = (rightIndex - leftIndex) - 1;
    if (numNodesBetween > 0) {
      const distanceBetweenNodes = (rightNode._x - leftNode._x) / (numNodesBetween + 1);
      let count = 1;
      for (let i = leftIndex + 1; i < rightIndex; i++) {
          const middleNode = children[i];
          const desiredX = leftNode._x + (distanceBetweenNodes * count);
          const offset = desiredX - middleNode._x;
          if (offset > 0) {
            middleNode._x += offset;
            middleNode._mod += offset;
          }
          count++;
      }
      checkForConflicts(rightNode);
    }
}

function checkForConflicts(node) {
  const minDistance = TREE_DISTANCE + NODE_SIZE;
  let shiftValue = 0;

  const nodeContourMap = {}
  getLeftContour(node, 0, nodeContourMap);
  let sibling = node.getLeftMostSibling();

  while (sibling !== null && sibling !== node) {
    const siblingContourMap = {};
    getRightContour(sibling, 0, siblingContourMap);
    const maxNodeContourLevels = Math.max(...Object.keys(nodeContourMap))
    const maxSiblingContourLevel = Math.max(...Object.keys(siblingContourMap))
    const maxLevel = Math.min(maxSiblingContourLevel, maxNodeContourLevels)
    for (let level = node._y + 1; level <= maxLevel; level++) {
      const distance = nodeContourMap[level] - siblingContourMap[level];
      if (distance + shiftValue < minDistance) {
        shiftValue = minDistance - distance;
      }
    }

    if (shiftValue > 0) {
      console.log('YES conflict with ' + sibling.id )
      console.log('shifting by ', shiftValue)
      node._x += shiftValue;
      node._mod += shiftValue;
      centerNodesBetween(sibling, node);
      shiftValue = 0;
    } else {
      console.log('NO conflict with ' + sibling.id)
    }

    sibling = sibling.getNextSibling();
  }
}

function calculateInitialX(node) {
  for (const child of node.children) {
    calculateInitialX(child);
  }
  console.log('==== Initial values for node ' + node.id)

  if (node.isLeaf()) {
    console.log('node is a leaf')
    if (node.isLeftMost()) {
      console.log('node is a left most')
      node._x = 0;
    } else {
      console.log('node is NOT a left most')
      node._x = node.getPreviousSibling()._x + NODE_SIZE + SIBLING_DISTANCE;
    }

  } else if (node.children.length === 1) {
    console.log('node has one child')

    // if this is the first node in a set, set it's X value equal to it's child's X value
    if (node.isLeftMost()) {
      console.log('node is a left most')
      node._x = node.children[0]._x;
    } else {
      console.log('node is NOT a left most')
      node._x = node.getPreviousSibling()._x + NODE_SIZE + SIBLING_DISTANCE;
      node._mod = node._x - node.children[0]._x;
    }

  } else {
    console.log('node has many children')

    const leftChild = node.getLeftMostChild();
    const rightChild = node.getRightMostChild();
    const mid = (leftChild._x + rightChild._x) / 2;

    if (node.isLeftMost()) {
      console.log('node is a left most')
      node._x = mid;
    } else {
      console.log('node is NOT a left most')
      node._x = node.getPreviousSibling()._x + NODE_SIZE + SIBLING_DISTANCE;
      node._mod = node._x - mid;
    }

  }

  if (node.children.length > 0 && !node.isLeftMost()) {
    console.log('node HAS children and it is NOT left most checking for conflicts')
    // Subtrees can overlap, check for conflicts and shift node and its children right
    checkForConflicts(node);
  }
}

function checkAllChildrenOnScreen(node) {
  var nodeContourMap = {}
  getLeftContour(node, 0, nodeContourMap);

  let shiftAmount = 0;
  for(const y of Object.keys(nodeContourMap)) {
    if (nodeContourMap[y] + shiftAmount < 0) {
      shiftAmount = nodeContourMap[y] * -1;
    }
  }

  if (shiftAmount > 0) {
    node._x += shiftAmount;
    node._mod += shiftAmount;
  }
}

function calculateFinalPositions(node, modSum) {
  node._x += modSum;
  modSum += node._mod;

  for (const child of node.children) {
    calculateFinalPositions(child, modSum);
  }
}

function computeLayout(rootNode) {
  initializeDepth(rootNode, 0);
  calculateInitialX(rootNode);
  checkAllChildrenOnScreen(rootNode);
  calculateFinalPositions(rootNode, 0);
}


if (typeof module !== 'undefined' && typeof module.exports !== 'undefined') {
  // for tests in nodejs
  module.exports = {
    Node,
    computeLayout,
    printLayerByLayer
  };
}

class Indyvidual {
  constructor(rootId, data) {
    this.rootId = rootId;
    this.id = data.pointer;
    this.fullname = data.fullname;
    this.givenname = data.givenname;
    this.surname = data.surname;
    this.famc = data.famc;
    this.fams = data.fams;
    this.dob = data.date_of_birth;
    this.dod = data.date_of_death;
    this.placeOfBirth = data.place_of_birth;
    this.sex = data.sex;
    const placeholder = data.sex === 'F' ? placeholderFemale : placeholderMale;
    this.placeholderBase64Img = placeholder;
    this.base64Img = data.img || placeholder;
  }

  async init() {
    if (!this.base64Img) {
      return
    }
    const img = new Image();
    img.src = this.base64Img;
    return new Promise((resolve) => {
      img.onload = () => {
        this.img = img
        resolve();
      };
      img.onerror = () => {
        resolve();
      };
    })
  }

  setX(x) {
    this._x = x
  }
  setY(y) {
    this._y = y
  }

  findPartners() {
    const partners = []
    for (const f of Object.values(fMap)) {
      if (f.wife === this.id && f.husband && pMap[f.husband]) {
        partners.push(pMap[f.husband])
      } else if (f.husband === this.id && f.wife && pMap[f.wife]) {
        partners.push(pMap[f.wife])
      }
    }
    // TODO: later improve sorting and sort by date of mariage if available
    partners.sort((p1, p2) => compareDatesDob(p1, p2))
    return partners;
  }

  isDesedantOfRoot(){
    if (this.id === this.rootId) {
      return true;
    }
    if (!this.famc || !fMap[this.famc]) {
      return false
    }
    let famc = fMap[this.famc];
    let motherD = false
    let fatherD = false

    const motherId = famc.wife;
    if (motherId && pMap[motherId]) {
      const mother = pMap[motherId];
      motherD = mother.isDesedantOfRoot();
    }
    const fatherId = famc.husband;
    if (fatherId && pMap[fatherId]) {
      const father = pMap[fatherId];
      fatherD = father.isDesedantOfRoot()
    }
    return motherD || fatherD
  }

  getDistanceFromRoot() {
    if (this._distance !== undefined) {
      return this._distance;
    }
    if (this.id === this.rootId) {
      return 0;
    }
    if (!this.famc || !fMap[this.famc]) {
      return undefined
    }
    let famc = fMap[this.famc];
    const motherId = famc.wife;
    if (motherId && pMap[motherId]) {
      const mother = pMap[motherId]
      if (mother.isDesedantOfRoot()) {
        this._distance = mother.getDistanceFromRoot() + 1;
        return this._distance;
      }
    }
    const fatherId = famc.husband;
    if (fatherId && pMap[fatherId]) {
      const father = pMap[fatherId];
      if (father.isDesedantOfRoot()) {
        this._distance = father.getDistanceFromRoot() + 1;
        return this._distance;
      }
    }
    return -1;
  }
}

    const MONTH_MAP = {
  // GEDCOM standard (English 3-letter abbreviations)
  JAN:1, FEB:2, MAR:3, APR:4, MAY:5, JUN:6,
  JUL:7, AUG:8, SEP:9, OCT:10, NOV:11, DEC:12,
  // Polish — abbreviated (diacritics already stripped via normToken)
  STY:1, LUT:2, /* MAR already above */ KWI:4, MAJ:5, CZE:6,
  LIP:7, SIE:8, WRZ:9, PAZ:10, LIS:11, GRU:12,
  // Polish — full nominative (diacritics stripped)
  STYCZEN:1, LUTY:2, MARZEC:3, KWIECIEN:4, CZERWIEC:6,
  LIPIEC:7, SIERPIEN:8, WRZESIEN:9, PAZDZIERNIK:10, LISTOPAD:11, GRUDZIEN:12,
  // Polish — genitive (the form most commonly used when writing dates: "20 maja 1979")
  STYCZNIA:1, LUTEGO:2, MARCA:3, KWIETNIA:4, MAJA:5, CZERWCA:6,
  LIPCA:7, SIERPNIA:8, WRZESNIA:9, PAZDZIERNIKA:10, LISTOPADA:11, GRUDNIA:12,
};

const QUALIFIER_MAP = { ABT:'~', EST:'~', CAL:'~', BEF:'<', AFT:'>' };

function pad2(n) { return String(n).padStart(2, '0'); }

// Strip diacritics and uppercase — handles Polish ą ę ó ś ź ż ć ń ł ź
function normToken(s) {
  return s.normalize('NFD').replace(/\p{Mn}/gu, '').toUpperCase();
}

function parseParts(str) {
  if (!str) return null;
  const tokens = str.trim().split(/\s+/).map(normToken);
  let day, month, year;
  for (const tok of tokens) {
    if (MONTH_MAP[tok]) {
      month = MONTH_MAP[tok];
    } else if (/^\d{4}$/.test(tok)) {
      year = parseInt(tok, 10);
    } else if (/^\d{1,2}$/.test(tok) && day === undefined) {
      day = parseInt(tok, 10);
    }
  }
  if (!year) return null;
  return { day, month, year };
}

function parseGedcomDate(str) {
  if (!str || typeof str !== 'string') return null;
  let s = str.trim();

  // INT — strip keyword and trailing bracketed annotation
  if (/^INT\s+/i.test(s)) {
    s = s.replace(/^INT\s+/i, '').replace(/\s*\([^)]*\)\s*$/, '').trim();
    return parseParts(s);
  }

  // BET ... AND ...
  const betMatch = s.match(/^BET\s+(.+?)\s+AND\s+(.+)$/i);
  if (betMatch) {
    const from = parseParts(betMatch[1]);
    const to   = parseParts(betMatch[2]);
    if (from || to) return { rangeFrom: from, rangeTo: to };
    return null;
  }

  // FROM ... TO ...
  const fromMatch = s.match(/^FROM\s+(.+?)\s+TO\s+(.+)$/i);
  if (fromMatch) {
    const from = parseParts(fromMatch[1]);
    const to   = parseParts(fromMatch[2]);
    if (from || to) return { rangeFrom: from, rangeTo: to };
    return null;
  }

  // Qualifier prefix
  const qualMatch = s.match(/^(ABT|EST|CAL|BEF|AFT)\s+(.+)$/i);
  if (qualMatch) {
    const qualifier = QUALIFIER_MAP[qualMatch[1].toUpperCase()];
    const parts = parseParts(qualMatch[2]);
    if (!parts) return null;
    return { qualifier, ...parts };
  }

  return parseParts(s);
}

function formatParts(parts) {
  if (!parts || !parts.year) return null;
  if (parts.day && parts.month) return `${pad2(parts.day)}-${pad2(parts.month)}-${parts.year}`;
  if (parts.month)              return `${pad2(parts.month)}-${parts.year}`;
  return String(parts.year);
}

// Returns a display string. Falls back to the original string for unrecognised input.
function formatGedcomDate(str) {
  const parsed = parseGedcomDate(str);
  if (!parsed) return str || '';

  if (parsed.rangeFrom !== undefined) {
    const from = formatParts(parsed.rangeFrom);
    const to   = formatParts(parsed.rangeTo);
    if (from && to) return `${from}–${to}`;
    return from || to || (str || '');
  }

  const base = formatParts(parsed);
  if (!base) return str || '';
  return parsed.qualifier ? parsed.qualifier + base : base;
}

// Returns an ISO-ish sort key: "YYYY", "YYYY-MM", or "YYYY-MM-DD". Empty string if unparseable.
function gedcomDateSortKey(str) {
  const parsed = parseGedcomDate(str);
  if (!parsed) return '';
  const parts = parsed.rangeFrom || parsed;
  if (!parts || !parts.year) return '';
  const segs = [String(parts.year)];
  if (parts.month) segs.push(pad2(parts.month));
  if (parts.month && parts.day) segs.push(pad2(parts.day));
  return segs.join('-');
}

if (typeof module !== 'undefined') module.exports = { parseGedcomDate, formatGedcomDate, gedcomDateSortKey };


    const coordinates = [];
const toggleAreas = [];
const addRelativeAreas = [];
const collapsedNodes = new Set();
const nodeMap = new Map();
const originalChildren = new Map();
let selectedPersonId = null;

const PERSON_WIDTH = 200
const PERSON_HEIGHT = 100
const PERSON_PAD = 5

const THEMES = {

  },

let currentTheme = THEMES.light;

const mx = 500
const my = 250;



function addPersonToCoordinates(id, x, y) {
  coordinates.push({ id, x, y, width: PERSON_WIDTH, height: PERSON_HEIGHT })
}

function drawParentsChildEdge(
  ctx,
  p1x, p1y,
  p2x, p2y,
  p3x, p3y,
  p4x, p4y,
  color, radius = 10, round
) {
  ctx.beginPath();
  ctx.moveTo(p1x, p1y);
  ctx.lineTo(p2x, p2y);
  if (round && p3x !== p2x) {
    if (p3x > p2x) {
      ctx.lineTo(p3x - radius, p3y);
    } else {
      ctx.lineTo(p3x + radius, p3y);
    }
    ctx.arcTo(p3x, p3y, p4x, p4y, radius);
    ctx.lineTo(p4x, p4y);
  } else {
    ctx.lineTo(p3x, p3y);
    ctx.lineTo(p4x, p4y);
  }
  ctx.lineWidth = 1;
  ctx.strokeStyle = color;
  ctx.stroke();
}

function drawLine(ctx, x1, y1, x2, y2, lineColor) {
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.closePath();
  ctx.lineWidth = 1;
  ctx.strokeStyle = lineColor;
  ctx.stroke();
}

function drawDashedLine(ctx, x1, y1, x2, y2, color) {
  ctx.save();
  ctx.setLineDash([6, 4]);
  drawLine(ctx, x1, y1, x2, y2, color);
  ctx.restore();
}

function drawCircle(ctx, x, y, radius, color) {
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, 2 * Math.PI);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.stroke();
}

function drawToggleButton(ctx, x, y, collapsed) {
  const r = 10;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, 2 * Math.PI);
  ctx.fillStyle = currentTheme.cardFill;
  ctx.fill();
  ctx.strokeStyle = currentTheme.edge;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = currentTheme.cardText;
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(collapsed ? '+' : '\u2212', x, y + 1);
}

function drawRoundedRect(ctx, x, y, width, height, radius, borderColor, lineWidth = 1) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();

  ctx.lineWidth = lineWidth;
  ctx.fillStyle = currentTheme.cardFill;
  ctx.fill();
  ctx.strokeStyle = borderColor;
  ctx.stroke();
}

function childConnectionX(child, parentFamPointer) {
  if (child.type === 'couple') {
    let idx = child.dataIndex;
    if (parentFamPointer !== undefined) {
      const found = child.data.findIndex(p => p.famc === parentFamPointer);
      if (found >= 0) idx = found;
    }
    return child._x * mx + (idx === 0 ? -125 : 125);
  }
  if (child.type === 'chain') {
    let idx = child.dataIndex;
    if (parentFamPointer !== undefined) {
      const found = child.data.findIndex(p => p.famc === parentFamPointer);
      if (found >= 0) idx = found;
    }
    const cLeftX = child._x * mx - child.width / 2;
    return cLeftX + idx * (PERSON_WIDTH + COUPLE_DIST) + PERSON_WIDTH / 2;
  }
  return child._x * mx;
}

function drawNode(ctx, node) {
  const isCollapsed = collapsedNodes.has(node.id);

  if (node.type === 'chain') {
    for (let k = 0; k < (node.famsArray || []).length; k++) {
      const famPointer = node.famsArray[k];
      if (!collapsedNodes.has(node.id + '_' + famPointer)) {
        const famChildren = (node.childrenByFam || {})[famPointer] || [];
        for (const child of famChildren) {
          drawNode(ctx, child);
        }
      }
    }
  } else if (!isCollapsed) {
    for (const child of node.children) {
      drawNode(ctx, child);
    }
  }

  const width = node.width;
  const height = node.height;
  const x = node._x * mx - width / 2;
  const y = node._y * my;
  const pChildren = {};

  if (node.type === 'single') {
    const p = node.data[0];
    drawPerson(ctx, x, y, p.givenname, p.surname, p.dob, p.dod, p.img, p.sex, p.id === selectedPersonId, p.id);
    addPersonToCoordinates(p.id, x, y);
  }

  if (node.type === 'couple') {
    const p1 = node.data[0];
    drawPerson(ctx, x, y, p1.givenname, p1.surname, p1.dob, p1.dod, p1.img, p1.sex, p1.id === selectedPersonId, p1.id);
    addPersonToCoordinates(p1.id, x, y);

    const p2 = node.data[1];
    drawPerson(ctx, x + PERSON_WIDTH + COUPLE_DIST, y, p2.givenname, p2.surname, p2.dob, p2.dod, p2.img, p2.sex, p2.id === selectedPersonId, p2.id);
    addPersonToCoordinates(p2.id, x + PERSON_WIDTH + COUPLE_DIST, y);

    drawLine(ctx, x + PERSON_WIDTH, y + PERSON_HEIGHT / 2, x + PERSON_WIDTH + COUPLE_DIST, y + PERSON_HEIGHT / 2, currentTheme.edge);
    pChildren.x = x + PERSON_WIDTH + COUPLE_DIST / 2;
    pChildren.y = y + PERSON_HEIGHT / 2;

    if (!isCollapsed) {
      for (const child of node.children) {
        const childX = childConnectionX(child, node.fams);
        const childY = child._y * my;
        const downDistance = childY - pChildren.y;
        const round = !child.isSingle() && (child.isLeftMost() || child.isRightMost());
        drawParentsChildEdge(ctx,
          pChildren.x, pChildren.y,
          pChildren.x, pChildren.y + downDistance / 2,
          childX, childY - downDistance / 2,
          childX, childY,
          currentTheme.edge, 10, round
        );
      }
    }

    if (node.children.length > 0) {
      const toggleX = pChildren.x;
      const toggleY = pChildren.y + 20;
      drawToggleButton(ctx, toggleX, toggleY, isCollapsed);
      toggleAreas.push({ nodeId: node.id, nodeRef: node, x: toggleX, y: toggleY, r: 14 });
    }
  }

  if (node.type === 'chain') {
    const nodeY    = node._y * my;
    const midY     = nodeY + PERSON_HEIGHT / 2;
    const leftX    = node._x * mx - node.width / 2;
    const sharedIdx = node.dataIndex;

    for (let k = 0; k < node.data.length; k++) {
      const p  = node.data[k];
      const px = leftX + k * (PERSON_WIDTH + COUPLE_DIST);
      drawPerson(ctx, px, nodeY, p.givenname, p.surname, p.dob, p.dod, p.img, p.sex, p.id === selectedPersonId, p.id);
      addPersonToCoordinates(p.id, px, nodeY);

      if (k < node.data.length - 1) {
        const x1 = px + PERSON_WIDTH;
        const x2 = x1 + COUPLE_DIST;
        const isDirect = k === sharedIdx || k + 1 === sharedIdx;
        if (isDirect) {
          drawLine(ctx, x1, midY, x2, midY, currentTheme.edge);
        } else {
          drawDashedLine(ctx, x1, midY, x2, midY, currentTheme.edge);
        }
      }
    }

    for (let k = 0; k < (node.famsArray || []).length; k++) {
      const famPointer     = node.famsArray[k];
      const famChildren    = (node.childrenByFam || {})[famPointer] || [];
      const isFamCollapsed = collapsedNodes.has(node.id + '_' + famPointer);
      const dropX = leftX + k * (PERSON_WIDTH + COUPLE_DIST) + PERSON_WIDTH + COUPLE_DIST / 2;

      if (!isFamCollapsed) {
        for (const child of famChildren) {
          const childX    = childConnectionX(child, famPointer);
          const childY    = child._y * my;
          const downDist  = childY - midY;
          const round     = !child.isSingle() && (child.isLeftMost() || child.isRightMost());
          drawParentsChildEdge(ctx,
            dropX, midY, dropX, midY + downDist / 2,
            childX, childY - downDist / 2, childX, childY,
            currentTheme.edge, 10, round
          );
        }
      }

      if (famChildren.length > 0) {
        drawToggleButton(ctx, dropX, midY + 20, isFamCollapsed);
        toggleAreas.push({ nodeId: node.id + '_' + famPointer, nodeRef: node, x: dropX, y: midY + 20, r: 14 });
      }
    }
  }
}

function drawPerson(ctx, x, y, name, surname, dob, dod, preloadedImg, sex, selected = false, personId = null) {
  // border
  let borderColor = currentTheme.cardBorderX;
  if (sex === "M") {
    borderColor = currentTheme.cardBorderM;
  } else if (sex === "F") {
    borderColor = currentTheme.cardBorderF;
  }

  drawRoundedRect(ctx, x, y, PERSON_WIDTH, PERSON_HEIGHT, PERSON_PAD, borderColor, selected ? 3 : 1)

  ctx.drawImage(preloadedImg, x + PERSON_PAD, y + PERSON_PAD, 90, 90)

  // name
  const fontHeight1 = 18;
  const fontHeight1b = 12;
  ctx.fillStyle = currentTheme.cardText;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const textX = x + PERSON_PAD + 90 + PERSON_PAD;
  const textY = y + PERSON_PAD + PERSON_PAD;

  const nameParts = (name || '').split(' ').filter(Boolean);
  ctx.font = fontHeight1 + 'px Arial';

    const firstWidth = ctx.measureText(nameParts[0] + ' ').width;
    ctx.font = fontHeight1b + 'px Arial';
    ctx.fillText(nameParts.slice(1).join(' '), textX + firstWidth, textY + (fontHeight1 - fontHeight1b));
