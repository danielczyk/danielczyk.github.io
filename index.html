    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('+', badgeX, badgeY + 1);
    addRelativeAreas.push({ personId, x: badgeX, y: badgeY, r: badgeR + 4 });
  }
}

function compareDatesDob(p1, p2, reverse = false) {
  const keyA = p1.dob ? gedcomDateSortKey(p1.dob) : '';
  const keyB = p2.dob ? gedcomDateSortKey(p2.dob) : '';
  const cmp  = keyA < keyB ? -1 : keyA > keyB ? 1 : 0;
  return reverse ? -cmp : cmp;
}


async function unwrapDek(slot, password, iterations) {
  if (!crypto.subtle) throw new Error('crypto.subtle not available');
  const keyMaterial = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
  );
  const kek = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: base64ToUint8Array(slot.salt), iterations, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    true,
    ['decrypt']
  );
  const rawDek = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: base64ToUint8Array(slot.nonce) },
    kek,
    base64ToUint8Array(slot.wrappedKey)
  );
  return new Uint8Array(rawDek);
}

async function decryptData(rawDek, nonce, cipherText) {
  const key = await crypto.subtle.importKey(
    'raw', rawDek, { name: 'AES-GCM' }, false, ['decrypt']
  );
  return crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, cipherText);
}

function base64ToUint8Array(base64String) {
  const binaryString = atob(base64String);
  const length = binaryString.length;
  const uint8Array = new Uint8Array(length);
  for (let i = 0; i < length; i++) {
      uint8Array[i] = binaryString.charCodeAt(i);
  }
  return uint8Array;
}

function uint8ArrayToBase64(bytes) {
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

async function inflate(buf) {
  const ds = new DecompressionStream('deflate-raw');
  const writer = ds.writable.getWriter();
  writer.write(new Uint8Array(buf));
  writer.close();
  return new Response(ds.readable).arrayBuffer();
}

async function deflate(bytes) {
  const cs = new CompressionStream('deflate-raw');
  const writer = cs.writable.getWriter();
  writer.write(bytes);
  writer.close();
  return new Uint8Array(await new Response(cs.readable).arrayBuffer());
}

async function encryptData(plaintext, password) {
  const enc        = new TextEncoder();
  const iterations = 5_000_000;

  const dek        = crypto.getRandomValues(new Uint8Array(32));
  const dataNonce  = crypto.getRandomValues(new Uint8Array(12));
  const dekKey     = await crypto.subtle.importKey('raw', dek, 'AES-GCM', false, ['encrypt']);
  const compressed = await deflate(enc.encode(plaintext));
  const cipherBuf  = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: dataNonce }, dekKey, compressed);

  const salt      = crypto.getRandomValues(new Uint8Array(32));
  const slotNonce = crypto.getRandomValues(new Uint8Array(12));
  const keyMat    = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const kek       = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
    keyMat,
    { name: 'AES-GCM', length: 256 },
    true,
    ['encrypt']
  );
  const rawKek    = await crypto.subtle.exportKey('raw', kek);
  const kekEnc    = await crypto.subtle.importKey('raw', rawKek, 'AES-GCM', false, ['encrypt']);
  const wrappedBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: slotNonce }, kekEnc, dek);

  return {
    iterations,
    compressed: true,
    nonce:      uint8ArrayToBase64(dataNonce),
    cipherText: uint8ArrayToBase64(new Uint8Array(cipherBuf)),
    slots: [{
      salt:       uint8ArrayToBase64(salt),
      nonce:      uint8ArrayToBase64(slotNonce),
      wrappedKey: uint8ArrayToBase64(new Uint8Array(wrappedBuf)),
    }],
  };
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const text = t(el.dataset.i18n);
    if (el.children.length === 0) {
      el.textContent = text;
    } else {
      // Element has child elements (e.g. label > input) — update only the leading text node
      let found = false;
      for (const node of el.childNodes) {
        if (node.nodeType === 3) { node.textContent = text; found = true; break; }
      }
      if (!found) el.insertBefore(document.createTextNode(text), el.firstChild);
    }
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
}

applyTranslations();

async function main(data, canvas) {
  const fams = data.fams
  const rootId = data.rootId;
  const images = data.images;

  const originalById = new Map(data.people.map(p => [p.pointer, p]));

  const EDITS_KEY         = 'familyTreeEdits';
  const WEBHOOK_EMAIL_KEY = 'familyTreeWebhookEmail';
  let edits = {};
  try { edits = JSON.parse(localStorage.getItem(EDITS_KEY) || '{}'); } catch (_) {}

  const IMAGES_KEY = 'familyTreeImages';
  let imageEdits = {};
  try { imageEdits = JSON.parse(localStorage.getItem(IMAGES_KEY) || '{}'); } catch (_) {}

  const NEW_PEOPLE_KEY = 'familyTreeNewPeople';
  const FAMILY_EDITS_KEY = 'familyTreeFamilyEdits';
  let newPeople = {};
  let familyEdits = {};
  try { newPeople   = JSON.parse(localStorage.getItem(NEW_PEOPLE_KEY)   || '{}'); } catch (_) {}
  try { familyEdits = JSON.parse(localStorage.getItem(FAMILY_EDITS_KEY) || '{}'); } catch (_) {}

  let root;
  let allPeopleByPointer = new Map();
  let searchIndex = [];

  const DATA_VERSION_KEY = 'familyTreeDataVersion';

  const FIELD_LABELS = {
    givenname:      'field.givenname',
    surname:        'field.surname',
    fullname:       'field.fullname',
    date_of_birth:  'field.date_of_birth',
    date_of_death:  'field.date_of_death',
    place_of_birth: 'field.place_of_birth',
    sex:            'field.sex',
  };

  function showConflictModal(conflicts) {
    return new Promise(resolve => {
      const modal   = document.getElementById('conflict-modal');
      const summary = document.getElementById('conflict-summary');
      const list    = document.getElementById('conflict-list');

      summary.textContent = t('conflict.summary', conflicts.length);

      list.innerHTML = '';
      for (const { personId, field, localValue, canonicalValue } of conflicts) {
        const person = originalById.get(personId);
        const name   = person ? `${person.givenname || ''} ${person.surname || ''}`.trim() || personId : personId;
        const label  = t(FIELD_LABELS[field] || field);
        const nameAttr = `c-${personId}-${field}`.replace(/[^a-zA-Z0-9-]/g, '_');
        const row = document.createElement('div');
        row.className = 'conflict-row';
        row.innerHTML = `
          <div class="conflict-person">${name}</div>
          <div class="conflict-field">${label}</div>
          <label class="conflict-choice">
            <input type="radio" name="${nameAttr}" value="local" checked>
            ${t('conflict.myEdit')} <strong>${localValue || t('conflict.empty')}</strong>
          </label>
          <label class="conflict-choice">
            <input type="radio" name="${nameAttr}" value="canonical">
            ${t('conflict.newData')} <strong>${canonicalValue || t('conflict.empty')}</strong>
          </label>`;
        list.appendChild(row);
      }

      document.getElementById('conflict-keep-all').onclick = () => {
        list.querySelectorAll('input[value="local"]').forEach(r => { r.checked = true; });
      };
      document.getElementById('conflict-accept-all').onclick = () => {
        list.querySelectorAll('input[value="canonical"]').forEach(r => { r.checked = true; });
      };
      document.getElementById('conflict-done').onclick = () => {
        for (const { personId, field } of conflicts) {
          const nameAttr = `c-${personId}-${field}`.replace(/[^a-zA-Z0-9-]/g, '_');
          const chosen = list.querySelector(`input[name="${nameAttr}"]:checked`)?.value;
          if (chosen === 'canonical') {
            if (edits[personId]) {
              delete edits[personId][field];
              if (Object.keys(edits[personId]).length === 0) delete edits[personId];
            }
          }
        }
        localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
        localStorage.setItem(DATA_VERSION_KEY, data.dataVersion);
        modal.style.display = 'none';
        resolve();
      };

      modal.style.display = 'flex';
    });
  }

  async function checkVersionConflicts() {
    const storedVersion  = parseInt(localStorage.getItem(DATA_VERSION_KEY) || '0', 10);
    const currentVersion = data.dataVersion || 0;
    const versionBumped  = currentVersion > storedVersion;

    const conflicts = [];
    let autoResolved = 0;

    for (const personId of Object.keys(edits)) {
      const original = originalById.get(personId);
      if (!original) continue;

      const deltaFields = { ...edits[personId] };
      for (const [field, localValue] of Object.entries(deltaFields)) {
        const canonicalValue = original[field];
        const canonicalEmpty = canonicalValue == null || canonicalValue === '';

        if (canonicalEmpty) continue;

        if (localValue === canonicalValue) {
          delete edits[personId][field];
          autoResolved++;
          continue;
        }

        if (versionBumped) conflicts.push({ personId, field, localValue, canonicalValue });
      }

      if (edits[personId] && Object.keys(edits[personId]).length === 0) delete edits[personId];
    }

    // Also clean up imageEdits entries that exactly match canonical data (baked-in images).
    let imageAutoResolved = 0;
    for (const id of Object.keys(imageEdits)) {
      if (imageEdits[id] !== '' && imageEdits[id] === data.images[id]) {
        delete imageEdits[id];
        imageAutoResolved++;
      }
    }
    if (imageAutoResolved > 0) localStorage.setItem(IMAGES_KEY, JSON.stringify(imageEdits));

    if (autoResolved > 0) localStorage.setItem(EDITS_KEY, JSON.stringify(edits));

    if (versionBumped) {
      if (conflicts.length > 0) {
        await showConflictModal(conflicts);
      } else {
        localStorage.setItem(DATA_VERSION_KEY, currentVersion);
      }
    }
  }

  await checkVersionConflicts();

  async function rebuildGraph() {
    // Merge base data with field edits + new people
    const effectivePeople = data.people.map(p => {
      const delta = edits[p.pointer];
      return delta ? { ...p, ...delta } : p;
    }).filter(p => !p.removed).concat(
      Object.entries(newPeople).map(([pointer, fields]) => ({ pointer, ...fields })).filter(p => !p.removed)
    );

    // Merge base families with patches + new families
    const allFamilies = data.fams.map(f => {
      const patch = familyEdits[f.pointer];
      return patch ? { ...f, ...patch } : f;
    }).concat(
      Object.entries(familyEdits)
        .filter(([, v]) => v._new)
        .map(([pointer, fields]) => {
          const { _new, ...rest } = fields;
          return { pointer, ...rest };
        })
    );

    // Raw pointer → record map for addRelative (before Indyvidual wrapping)
    allPeopleByPointer = new Map(effectivePeople.map(p => [p.pointer, p]));

    pMap = await effectivePeople.reduce(async (accPromise, obj) => {
      const acc = await accPromise;
      if (images[obj.pointer]) obj.img = images[obj.pointer];
      const p = new Indyvidual(rootId, obj);
      await p.init();
      acc[obj.pointer] = p;
      return acc;
    }, Promise.resolve({}));

    fMap = allFamilies.reduce((acc, obj) => {
      acc[obj.pointer] = obj;
      return acc;
    }, {});

    // Apply stored image overrides ('' = removal sentinel → placeholder)
    for (const [id, base64] of Object.entries(imageEdits)) {
      const person = pMap[id];
      if (!person) continue;
      const src = base64 === '' ? person.placeholderBase64Img : base64;
      person.base64Img = src;
      const img = new Image();
      img.src = src;
      await new Promise(resolve => { img.onload = img.onerror = resolve; });
      person.img = img;
    }

    // Split people by ancestry level from root
    const levelData = [];
    for (const i of Object.values(pMap)) {
      let dist = -1;
      try {
        dist = i.getDistanceFromRoot();
        if (dist !== undefined && dist !== -1) {
          if (!levelData[dist]) levelData[dist] = [];
          levelData[dist].push(i);
        } else {
          // Not a direct descendant — check if spouse of one
          if (i.fams && fMap[i.fams]) {
            const spouseFamily = fMap[i.fams];
            let partnerDist;
            if (spouseFamily.husband === i.id && spouseFamily.wife && pMap[spouseFamily.wife]) {
              partnerDist = pMap[spouseFamily.wife].getDistanceFromRoot();
            } else if (spouseFamily.wife === i.id && spouseFamily.husband && pMap[spouseFamily.husband]) {
              partnerDist = pMap[spouseFamily.husband].getDistanceFromRoot();
            }
            if (partnerDist !== undefined) {
              if (!levelData[partnerDist]) levelData[partnerDist] = [];
              levelData[partnerDist].push(i);
            }
          }
        }
      } catch (e) {
        console.log(i.fullname, e);
      }
    }

    // Sort each level by parent family order then DOB
    for (let i = 0; i < levelData.length; i++) {
      const level = levelData[i];
      let previousLevelOrder = null;
      if (i > 0) previousLevelOrder = levelData[i - 1].map(p => p.fams);
      level.sort((p1, p2) => {
        if (previousLevelOrder && p1.famc && p2.famc && p1.famc !== p2.famc) {
          return previousLevelOrder.indexOf(p1.famc) - previousLevelOrder.indexOf(p2.famc);
        }
        return compareDatesDob(p1, p2);
      });
    }

    // Build graph nodes
    const graph = [];
    let id = 1;

    function resolveFams(p, pp) {
      if (p.fams && !pp.fams) return p.fams;
      if (!p.fams && pp.fams) return pp.fams;
      if (!p.fams && !pp.fams) return undefined;
      const pf = fMap[p.fams];
      const ppf = fMap[pp.fams];
      if (pf && ((pf.wife === p.id && pf.husband === pp.id) || (pf.wife === pp.id && pf.husband === p.id))) return p.fams;
      if (ppf && ((ppf.wife === p.id && ppf.husband === pp.id) || (ppf.wife === pp.id && ppf.husband === p.id))) return pp.fams;
      return p.fams;
    }

    for (let i = 0; i < levelData.length; i++) {
      const level = levelData[i];
      const graphLayer = [];
      graph.push(graphLayer);
      let nodeIndex = 0;
      let prevFamc;

      const chainAnchors = new Set();
      for (const p of level) {
        if (p.findPartners().length >= 2) chainAnchors.add(p.id);
      }
      const processedInChain = new Set();
      const orderedLevel = [
        ...level.filter(p => chainAnchors.has(p.id)),
        ...level.filter(p => !chainAnchors.has(p.id)),
      ];

      for (const p of orderedLevel) {
        if (prevFamc !== undefined && p.famc !== undefined && prevFamc !== p.famc) nodeIndex = 0;
        prevFamc = p.famc;
        if (processedInChain.has(p.id)) continue;

        const partners = p.findPartners().filter(pp => !processedInChain.has(pp.id));

        if (partners.length === 0) {
          graphLayer.push(new Node(id, 'single', [p], nodeIndex, i, 0, p.fams));
          nodeIndex++; id++;
        } else if (partners.length === 1) {
          const pp = partners[0];
          const nodeFams = resolveFams(p, pp);
          let nodeData, dataIndex;
          if (p.sex === 'M') { dataIndex = 0; nodeData = [p, pp]; }
          else               { nodeData = [pp, p]; dataIndex = 1; }
          graphLayer.push(new Node(id, 'couple', nodeData, nodeIndex, i, dataIndex, nodeFams));
          processedInChain.add(p.id); processedInChain.add(pp.id);
          nodeIndex++; id++;
        } else {
          const sortedSpouses = [...partners].sort((a, b) => compareDatesDob(a, b));
          const famsArr = sortedSpouses.map(pp => resolveFams(p, pp));
          const isMale = p.sex !== 'F';
          const chainData = isMale ? [p, ...sortedSpouses] : [...sortedSpouses, p];
          const sharedPersonIndex = isMale ? 0 : chainData.length - 1;
          graphLayer.push(new Node(id, 'chain', chainData, nodeIndex, i, sharedPersonIndex, famsArr[0], famsArr));
          processedInChain.add(p.id);
          for (const pp of sortedSpouses) processedInChain.add(pp.id);
          nodeIndex++; id++;
        }
      }
    }

    function nodeOwnsFamily(node, famPointer) {
      if (node.fams === famPointer) return true;
      if (node.famsArray && node.famsArray.includes(famPointer)) return true;
      return false;
    }

    // Link children to parents
    for (let i = graph.length - 2; i >= 0; i--) {
      for (const parentNode of graph[i]) {
        for (const childNode of graph[i + 1]) {
          for (const child of childNode.data) {
            if (child.famc !== undefined && nodeOwnsFamily(parentNode, child.famc)) {
              if (!parentNode.children.includes(childNode)) {
                parentNode.children.push(childNode);
                childNode.setParent(parentNode);
              }
              if (!parentNode.childrenByFam) parentNode.childrenByFam = {};
              if (!parentNode.childrenByFam[child.famc]) parentNode.childrenByFam[child.famc] = [];
              if (!parentNode.childrenByFam[child.famc].includes(childNode))
                parentNode.childrenByFam[child.famc].push(childNode);
            }
          }
        }
      }
    }

    if (graph[0] && graph[0].length === 1) {
      root = graph[0][0];
    } else if (graph[0]) {
      root = new Node('rootId', 'fake', [], 0, 0);
      for (const c of graph[0]) { root.children.push(c); c.setParent(root); }
    }

    for (let y = 0; y < graph.length; y++) {
      for (const node of graph[y]) node._y = y + 1;
    }
    computeLayout(root);

    nodeMap.clear();
    originalChildren.clear();
    for (const layer of graph) {
      for (const node of layer) nodeMap.set(node.id, node);
    }
    if (root.type === 'fake') nodeMap.set(root.id, root);

    ;(function storeOriginalChildren(node) {
      originalChildren.set(node.id, [...node.children]);
      for (const child of node.children) storeOriginalChildren(child);
    })(root);

    // Prune stale collapsed-node entries
    for (const toggleId of [...collapsedNodes]) {
      const str = String(toggleId);
      const underscoreIdx = str.indexOf('_');
      const actualId = underscoreIdx >= 0 ? parseInt(str.substring(0, underscoreIdx)) : toggleId;
      if (!nodeMap.has(actualId)) collapsedNodes.delete(toggleId);
    }

    searchIndex = Array.from(allPeopleByPointer.values()).map(p => {
      const yearMatch = (p.date_of_birth || '').match(/\d{4}/);
      return {
        id: p.pointer,
        label: [p.givenname, p.surname].filter(Boolean).join(' '),
        year: yearMatch ? yearMatch[0] : '',
      };
    });

    recomputeLayout();
    redraw();
  }

  function applyDelta(personId, changedFields) {
    const original = originalById.get(personId);
    if (!original) {
      // New person lives in newPeople — update it directly
      updateNewPeopleOrEdits(personId, changedFields);
      return;
    }
    const existing = edits[personId] || {};
    const merged = { ...existing, ...changedFields };
    for (const [k, v] of Object.entries(merged)) {
      if (original[k] === v || (v === '' && original[k] == null)) delete merged[k];
    }
    if (Object.keys(merged).length === 0) delete edits[personId];
    else edits[personId] = merged;
    localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
  }

  function updateIndyvidual(personId, changedFields) {
    const person = pMap[personId];
    if (!person) return;
    if (changedFields.givenname    != null) person.givenname    = changedFields.givenname;
    if (changedFields.surname      != null) person.surname      = changedFields.surname;
    if (changedFields.fullname     != null) person.fullname     = changedFields.fullname;
    if (changedFields.date_of_birth != null) person.dob         = changedFields.date_of_birth;
    if (changedFields.date_of_death != null) person.dod         = changedFields.date_of_death;
    if (changedFields.place_of_birth != null) person.placeOfBirth = changedFields.place_of_birth;
    if (changedFields.sex          != null) person.sex          = changedFields.sex;
  }

  function recomputeLayout() {
    for (const toggleId of collapsedNodes) {
      const node = nodeMap.get(toggleId);
      if (node) {
        node.children = [];
      } else {
        const str = String(toggleId);
        const underscoreIdx = str.indexOf('_');
        if (underscoreIdx >= 0) {
          const actualNode = nodeMap.get(parseInt(str.substring(0, underscoreIdx)));
          const famPointer = str.substring(underscoreIdx + 1);
          if (actualNode && actualNode.childrenByFam && actualNode.childrenByFam[famPointer]) {
            const toRemove = new Set(actualNode.childrenByFam[famPointer].map(c => c.id));
            actualNode.children = actualNode.children.filter(c => !toRemove.has(c.id));
          }
        }
      }
    }
    computeLayout(root);
    for (const [nodeId, children] of originalChildren) {
      const node = nodeMap.get(nodeId);
      if (node) node.children = children;
    }
  }

  const ctx = canvas.getContext('2d');
  let panX = 0
  let panY = 0
  let scale = 1
  const MIN_SCALE = 0.15;
  const MAX_SCALE = 5;

  await rebuildGraph();

  function redraw() {
    coordinates.length = 0;
    toggleAreas.length = 0;
    addRelativeAreas.length = 0;
    ctx.save();
    ctx.fillStyle = currentTheme.canvasBg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.translate(panX, panY);
    ctx.scale(scale, scale);
    drawNode(ctx, root);
    ctx.restore();
  }


  // Handle panning with mouse
  let isPanning = false;
  let startX, startY;

  canvas.addEventListener('mousedown', (e) => {
      isPanning = true;
      startX = e.clientX - panX;
      startY = e.clientY - panY;
  });

  canvas.addEventListener('mousemove', async (e) => {
      if (!isPanning) return;
      panX = e.clientX - startX;
      panY = e.clientY - startY;
      scheduleSave();
      redraw();
  });

  canvas.addEventListener('mouseup', () => isPanning = false);
  canvas.addEventListener('mouseleave', () => isPanning = false);

  // zooming centering around mouse position
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();

    const zoomSpeed = 0.1;
    const mouseX = e.offsetX;  // Mouse position relative to canvas
    const mouseY = e.offsetY;

    const newScale = scale - e.deltaY * zoomSpeed / 100;

    // Ensure the new scale is within the desired range
    if (newScale >= MIN_SCALE && newScale <= MAX_SCALE) {
      // Calculate the scale ratio
      const scaleRatio = newScale / scale;

      // Adjust the translation to zoom around the mouse position
      panX -= (mouseX - panX) * (scaleRatio - 1);
      panY -= (mouseY - panY) * (scaleRatio - 1);

      scale = newScale;
      scheduleSave();
      redraw();
    }
  });

  function getMidpoint(touches) {
    const [touch1, touch2] = touches;
    return {
        x: (touch1.clientX + touch2.clientX) / 2,
        y: (touch1.clientY + touch2.clientY) / 2
    };
  }
  function getDistance(touches) {
    const [touch1, touch2] = touches;
    const dx = touch1.clientX - touch2.clientX;
    const dy = touch1.clientY - touch2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  let initialDistance;
  let lastMidpoint;

  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      initialDistance = getDistance(e.touches);
      lastMidpoint = getMidpoint(e.touches);
      isPanning = false;
    } else if (e.touches.length === 1) {
      startX = e.touches[0].clientX - panX;
      startY = e.touches[0].clientY - panY;
      isPanning = true;
    }
  });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();

    if (e.touches.length === 2) {
      const currentDistance = getDistance(e.touches);
      const midpoint = getMidpoint(e.touches);
      const rawRatio = currentDistance / initialDistance;
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * rawRatio));
      const actualRatio = newScale / scale;

      // Pan by midpoint delta, then zoom around new midpoint
      panX += midpoint.x - lastMidpoint.x;
      panY += midpoint.y - lastMidpoint.y;
      panX -= (midpoint.x - panX) * (actualRatio - 1);
      panY -= (midpoint.y - panY) * (actualRatio - 1);

      scale = newScale;
      initialDistance = currentDistance;
      lastMidpoint = midpoint;
      scheduleSave();
      redraw();
    } else if (e.touches.length === 1 && isPanning) {
      panX = e.touches[0].clientX - startX;
      panY = e.touches[0].clientY - startY;
      scheduleSave();
      redraw();
    }
  });

  canvas.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) {
      initialDistance = 0;
      lastMidpoint = null;
      isPanning = false;
    }
  });

  function getMousePosition(event) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = (event.clientX - rect.left - panX) / scale;
    const mouseY = (event.clientY - rect.top - panY) / scale;
    return { mouseX, mouseY };
}

  const panelEl = document.getElementById('person-panel');
  const panelCloseEl = document.getElementById('panel-close');
  const panelImgEl = document.getElementById('panel-img');
  const panelNameEl  = document.getElementById('panel-name');
  const panelIdEl    = document.getElementById('panel-id');
  const panelBirthEl = document.getElementById('panel-birth');
  const panelDeathEl = document.getElementById('panel-death');
  const panelEditBtn  = document.getElementById('panel-edit-btn');
  const panelViewEl   = document.getElementById('panel-view');
  const panelEditForm = document.getElementById('panel-edit-form');
  const editGivenname   = document.getElementById('edit-givenname');
  const editSurname     = document.getElementById('edit-surname');
  const editDob         = document.getElementById('edit-dob');
  const editDod         = document.getElementById('edit-dod');
  const editPob         = document.getElementById('edit-pob');
  const editSex         = document.getElementById('edit-sex');
  const editPhotoInput  = document.getElementById('edit-photo');
  const panelImgEditBtn    = document.getElementById('panel-img-edit-btn');
  const panelImgRemoveBtn  = document.getElementById('panel-img-remove-btn');
  const panelRemoveBtn     = document.getElementById('panel-remove-btn');
  const removeModal        = document.getElementById('remove-modal');
  const removeModalText    = document.getElementById('remove-modal-text');
  const removeModalCancel  = document.getElementById('remove-modal-cancel');
  const removeModalConfirm = document.getElementById('remove-modal-confirm');

  let currentPersonId = null;
  let pendingImageBase64 = null;

  const SELECTED_KEY = 'selected-' + rootId;

  function exitEditMode() {
    pendingImageBase64 = null;
    editPhotoInput.value = '';
    panelImgEditBtn.style.display = 'none';
    panelViewEl.style.display  = '';
    panelEditForm.style.display = 'none';
    panelRemoveBtn.style.display = 'none';
  }

  function enterEditMode(personId) {
    const p = pMap[personId];
    if (!p) return;
    pendingImageBase64 = null;
    editPhotoInput.value = '';
    editGivenname.value = p.givenname    || '';
    editSurname.value   = p.surname      || '';
    editDob.value       = p.dob          || '';
    editDod.value       = p.dod          || '';
    editPob.value       = p.placeOfBirth || '';
    editSex.value       = p.sex || 'other';
    panelImgEditBtn.style.display = 'flex';
    panelViewEl.style.display  = 'none';
    panelEditForm.style.display = '';
    panelRemoveBtn.style.display = isLeafPerson(personId) ? 'block' : 'none';
    editGivenname.focus();
  }

  // ── Crop modal ──────────────────────────────────────────────────────────────
  const CANVAS_SIZE = 280;
  const MASK_SIZE   = 220;
  const OUTPUT_SIZE = 300;
  const HALF_MASK   = MASK_SIZE / 2;

  const cropModal    = document.getElementById('crop-modal');
  const cropCanvas   = document.getElementById('crop-canvas');
  const cropCtx      = cropCanvas.getContext('2d');
  cropCanvas.width   = CANVAS_SIZE;
  cropCanvas.height  = CANVAS_SIZE;

  let cropImg   = null;
  let cropX     = 0;
  let cropY     = 0;
  let cropScale = 1;

  function cropMinScale() {
    return Math.max(MASK_SIZE / cropImg.width, MASK_SIZE / cropImg.height);
  }

  function clampCrop() {
    const hw = (cropImg.width  * cropScale) / 2;
    const hh = (cropImg.height * cropScale) / 2;
    cropX = Math.min(cropX,  hw - HALF_MASK);
    cropX = Math.max(cropX, -(hw - HALF_MASK));
    cropY = Math.min(cropY,  hh - HALF_MASK);
    cropY = Math.max(cropY, -(hh - HALF_MASK));
  }

  function drawCrop() {
    cropCtx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    cropCtx.save();
    cropCtx.translate(CANVAS_SIZE / 2 + cropX, CANVAS_SIZE / 2 + cropY);
    cropCtx.scale(cropScale, cropScale);
    cropCtx.drawImage(cropImg, -cropImg.width / 2, -cropImg.height / 2);
    cropCtx.restore();

    const mx = (CANVAS_SIZE - MASK_SIZE) / 2;
    const my = (CANVAS_SIZE - MASK_SIZE) / 2;
    cropCtx.fillStyle = 'rgba(0,0,0,0.55)';
    cropCtx.fillRect(0,  0,  CANVAS_SIZE, my);
    cropCtx.fillRect(0,  my + MASK_SIZE, CANVAS_SIZE, CANVAS_SIZE - my - MASK_SIZE);
    cropCtx.fillRect(0,  my, mx, MASK_SIZE);
    cropCtx.fillRect(mx + MASK_SIZE, my, CANVAS_SIZE - mx - MASK_SIZE, MASK_SIZE);

    cropCtx.strokeStyle = 'rgba(255,255,255,0.75)';
    cropCtx.lineWidth = 1.5;
    cropCtx.strokeRect(mx + 0.75, my + 0.75, MASK_SIZE - 1.5, MASK_SIZE - 1.5);
  }

  function openCropModal(base64) {
    cropImg = new Image();
    cropImg.onload = () => {
      cropScale = cropMinScale();
      cropX = 0;
      cropY = 0;
      cropModal.style.display = 'flex';
      drawCrop();
    };
    cropImg.src = base64;
  }

  // Mouse drag
  let cropDragStart = null;
  cropCanvas.addEventListener('mousedown', (e) => {
    cropDragStart = { x: e.clientX - cropX, y: e.clientY - cropY };
  });
  window.addEventListener('mousemove', (e) => {
    if (!cropDragStart) return;
    cropX = e.clientX - cropDragStart.x;
    cropY = e.clientY - cropDragStart.y;
    clampCrop();
    drawCrop();
  });
  window.addEventListener('mouseup', () => { cropDragStart = null; });

  // Mouse wheel zoom
  cropCanvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
    cropScale = Math.max(cropMinScale(), cropScale * factor);
    clampCrop();
    drawCrop();
  }, { passive: false });

  // Touch pan + pinch zoom
  let cropLastMidpoint = null;
  let cropInitialDist  = 0;
  cropCanvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 2) {
      cropInitialDist  = getDistance(e.touches);
      cropLastMidpoint = getMidpoint(e.touches);
    } else if (e.touches.length === 1) {
      cropDragStart = { x: e.touches[0].clientX - cropX, y: e.touches[0].clientY - cropY };
    }
  }, { passive: false });
  cropCanvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 2) {
      const dist     = getDistance(e.touches);
      const midpoint = getMidpoint(e.touches);
      const ratio    = dist / cropInitialDist;
      cropX += midpoint.x - cropLastMidpoint.x;
      cropY += midpoint.y - cropLastMidpoint.y;
      cropScale = Math.max(cropMinScale(), cropScale * ratio);
      cropInitialDist  = dist;
      cropLastMidpoint = midpoint;
      clampCrop();
      drawCrop();
    } else if (e.touches.length === 1 && cropDragStart) {
      cropX = e.touches[0].clientX - cropDragStart.x;
      cropY = e.touches[0].clientY - cropDragStart.y;
      clampCrop();
      drawCrop();
    }
  }, { passive: false });
  cropCanvas.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) { cropInitialDist = 0; cropLastMidpoint = null; }
    if (e.touches.length === 0) cropDragStart = null;
  });

    outCtx.scale(cropScale * factor, cropScale * factor);
    outCtx.drawImage(cropImg, -cropImg.width / 2, -cropImg.height / 2);

  function isLeafPerson(personId) {

  function cleanupFamilyEditsForPerson(personId) {
    for (const famPointer of Object.keys(familyEdits)) {
      const fam = familyEdits[famPointer];
      let changed = false;
      const updated = { ...fam };
      if (updated.husband === personId) { delete updated.husband; changed = true; }
      if (updated.wife    === personId) { delete updated.wife;    changed = true; }
      if (Array.isArray(updated.children) && updated.children.includes(personId)) {
        updated.children = updated.children.filter(c => c !== personId);
        changed = true;
      }
      if (!changed) continue;
      if (updated._new && !updated.husband && !updated.wife && !(updated.children || []).length) {
        delete familyEdits[famPointer];
      } else {
        familyEdits[famPointer] = updated;
      }
    }
    localStorage.setItem(FAMILY_EDITS_KEY, JSON.stringify(familyEdits));

  function nextPersonId() {
    const nums = [...data.people.map(p => p.pointer), ...Object.keys(newPeople)]
      .map(id => parseInt(id.match(/\d+/)?.[0] || 0));
    return `@I${Math.max(0, ...nums) + 1}@`;
  }

  function nextFamilyId() {
    const nums = [...data.fams.map(f => f.pointer), ...Object.keys(familyEdits)]
      .map(id => parseInt(id.match(/\d+/)?.[0] || 0));
    return `@F${Math.max(0, ...nums) + 1}@`;
  }

  function updateNewPeopleOrEdits(id, patch) {
    if (newPeople[id]) {
      Object.assign(newPeople[id], patch);

      edits[id] = { ...(edits[id] || {}), ...patch };

  }

  function getFamilyRecord(pointer) {
    const base  = data.fams.find(f => f.pointer === pointer) || {};

  async function addRelative(personId, rel, fields) {
    const anchorPerson = allPeopleByPointer.get(personId);
    if (!anchorPerson) return;
    const newId    = nextPersonId();
    const fullname = `${fields.givenname} /${fields.surname}/`;
    const newPerson = { ...fields, fullname, pointer: newId, fams: null, famc: null };

    if (rel === 'child') {
      let famPointer = anchorPerson.fams;
      if (!famPointer) {
        famPointer = nextFamilyId();
        familyEdits[famPointer] = { _new: true,
          husband: anchorPerson.sex === 'M' ? personId : null,
          wife:    anchorPerson.sex === 'F' ? personId : null,
          children: [] };
        anchorPerson.fams = famPointer;
        updateNewPeopleOrEdits(personId, { fams: famPointer });
      }
      const fam = getFamilyRecord(famPointer);
      familyEdits[famPointer] = { ...(familyEdits[famPointer] || {}), children: [...(fam.children || []), newId] };
      newPerson.famc = famPointer;

    } else if (rel === 'spouse') {
      const famPointer = nextFamilyId();
      const isHusband  = anchorPerson.sex !== 'F';
      familyEdits[famPointer] = { _new: true,
        husband:  isHusband ? personId : newId,
        wife:     isHusband ? newId    : personId,
        children: [] };
      newPerson.fams = famPointer;

    } else if (rel === 'parent') {
      let famPointer = anchorPerson.famc;
      if (!famPointer) {
        famPointer = nextFamilyId();
        familyEdits[famPointer] = { _new: true, husband: null, wife: null, children: [personId] };
        updateNewPeopleOrEdits(personId, { famc: famPointer });
        anchorPerson.famc = famPointer;
      }
      const fam  = getFamilyRecord(famPointer);
      const slot = !fam.husband ? 'husband' : (!fam.wife ? 'wife' : null);
      if (!slot) {
        addRelativeErrorEl.textContent = t('rel.errorParentSlotsFull');
        addRelativeErrorEl.style.display = '';
        return;
      }
      familyEdits[famPointer] = { ...(familyEdits[famPointer] || {}), [slot]: newId };
      newPerson.fams = famPointer;

    } else if (rel === 'sibling') {
      let famPointer = anchorPerson.famc;
      if (!famPointer) {
        famPointer = nextFamilyId();
        familyEdits[famPointer] = { _new: true, husband: null, wife: null, children: [personId] };
        updateNewPeopleOrEdits(personId, { famc: famPointer });
        anchorPerson.famc = famPointer;
      }
      const fam = getFamilyRecord(famPointer);
      familyEdits[famPointer] = { ...(familyEdits[famPointer] || {}), children: [...(fam.children || []), newId] };
      newPerson.famc = famPointer;
    }

    newPeople[newId] = newPerson;
    localStorage.setItem(NEW_PEOPLE_KEY,   JSON.stringify(newPeople));
    localStorage.setItem(FAMILY_EDITS_KEY, JSON.stringify(familyEdits));

    await rebuildGraph();
    updateSettingsEditCount();
  }

  function handleClick(event) {
    const { mouseX, mouseY } = getMousePosition(event);

    for (const area of addRelativeAreas) {
      const dx = mouseX - area.x;
      const dy = mouseY - area.y;
      if (dx * dx + dy * dy <= area.r * area.r) {
        showAddRelativePanel(area.personId);
        return;
      }
    }

    for (const area of toggleAreas) {
      const dx = mouseX - area.x;
      const dy = mouseY - area.y;
      if (dx * dx + dy * dy <= area.r * area.r) {
        if (collapsedNodes.has(area.nodeId)) {
          collapsedNodes.delete(area.nodeId);
        } else {
          collapsedNodes.add(area.nodeId);
        }
        const toggledNode = area.nodeRef || nodeMap.get(area.nodeId);
        const beforeX = toggledNode._x * mx;
        const beforeY = toggledNode._y * my + toggledNode.height / 2;
        recomputeLayout();
        panX += (beforeX - toggledNode._x * mx) * scale;
        panY += (beforeY - (toggledNode._y * my + toggledNode.height / 2)) * scale;
        scheduleSave();
        redraw();
        return;
      }
    }

    let hit = false;
    coordinates.forEach(rect => {
      if (
          mouseX >= rect.x &&
          mouseX <= rect.x + rect.width &&
          mouseY >= rect.y &&
          mouseY <= rect.y + rect.height
      ) {
        showPanel(rect.id);
        hit = true;
      }
    });
    if (!hit) closePanel();
  }

  canvas.addEventListener('click', handleClick);

  // before initial draw find the coordinates of root node and pan to it
  panX = canvas.width / 2 - root._x * mx;

  function getHomePan() {
    return { panX: canvas.width / 2 - root._x * mx, panY: root._y + 25 };
  }

  const VIEW_KEY = 'view-' + rootId;
  let saveTimer = null;
  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      localStorage.setItem(VIEW_KEY, JSON.stringify({ panX, panY, scale }));
    }, 400);
  }

  const savedView = localStorage.getItem(VIEW_KEY);
  if (savedView) {
    try {
      const v = JSON.parse(savedView);
      if (typeof v.panX === 'number' && typeof v.panY === 'number' && typeof v.scale === 'number') {
        panX = v.panX;
        panY = v.panY;
        scale = v.scale;
      }
    } catch (_) { /* corrupt entry — use default centred view */ }
  }

  const PAN_STEP = 150;
  const ZOOM_FACTOR = 1.2;

  function applyPan(dx, dy) {
    panX += dx;
    panY += dy;
    scheduleSave();
    redraw();
  }

  function applyZoom(factor) {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const newScale = scale * factor;
    if (newScale < MIN_SCALE || newScale > MAX_SCALE) return;
    panX -= (cx - panX) * (factor - 1);
    panY -= (cy - panY) * (factor - 1);
    scale = newScale;
    scheduleSave();
    redraw();
  }

  // Search
  const searchContainer   = document.getElementById('search-container');
  const searchInput       = document.getElementById('search-input');
  const searchSuggestions = document.getElementById('search-suggestions');
  let activeSearchIdx = -1;

  function normaliseSearch(str) {
    return str.normalize('NFD').replace(/\p{Mn}/gu, '').toLowerCase();
  }

  function hideSearchSuggestions() {
    searchSuggestions.style.display = 'none';
    activeSearchIdx = -1;
  }

  function renderSearchSuggestions(items) {
    searchSuggestions.innerHTML = '';
    if (items.length === 0) { hideSearchSuggestions(); return; }
    items.forEach(item => {
      const li = document.createElement('li');
      li.textContent = item.year ? `${item.label} (${item.year})` : item.label;
      li.dataset.personId = item.id;
      li.addEventListener('mousedown', e => { e.preventDefault(); selectSearchPerson(item.id); });
      searchSuggestions.appendChild(li);
    });
    searchSuggestions.style.display = 'block';
    activeSearchIdx = -1;
  }

  function setSearchActiveIdx(idx) {
    const lis = searchSuggestions.querySelectorAll('li');
    lis.forEach((li, i) => li.classList.toggle('active', i === idx));
    activeSearchIdx = idx;
  }

  function findPersonCanvasRect(personId) {
    const fromCoords = coordinates.find(r => r.id === personId);
    if (fromCoords) return fromCoords;
    for (const node of nodeMap.values()) {
      if (!node.data) continue;
      const k = node.data.findIndex(p => p.id === personId);
      if (k === -1) continue;
      const leftX = node._x * mx - node.width / 2;
      return { x: leftX + k * (PERSON_WIDTH + COUPLE_DIST), y: node._y * my, width: PERSON_WIDTH, height: PERSON_HEIGHT };
    }
    return null;
  }

  function selectSearchPerson(personId) {
    const rect = findPersonCanvasRect(personId);
    if (rect) {
      panX = canvas.width / 2 - (rect.x + rect.width / 2) * scale;
      panY = canvas.height / 2 - (rect.y + rect.height / 2) * scale;
      scheduleSave();
    }
    showPanel(personId);
    searchInput.value = '';
    hideSearchSuggestions();
    searchInput.blur();
  }

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    if (!q) { hideSearchSuggestions(); return; }
    const nq = normaliseSearch(q);
    const matches = searchIndex.filter(item => normaliseSearch(item.label).includes(nq)).slice(0, 10);
    renderSearchSuggestions(matches);
  });

  searchInput.addEventListener('keydown', e => {
    const lis = searchSuggestions.querySelectorAll('li');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setSearchActiveIdx(Math.min(activeSearchIdx + 1, lis.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setSearchActiveIdx(Math.max(activeSearchIdx - 1, 0));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      const target = lis[activeSearchIdx >= 0 ? activeSearchIdx : 0];
      if (target) selectSearchPerson(target.dataset.personId);
    } else if (e.key === 'Escape') {
      searchInput.value = '';
      hideSearchSuggestions();
      searchInput.blur();
    }
  });

  // About + Settings + Data panels
  const aboutBtn      = document.getElementById('about-btn');
  const aboutPanel    = document.getElementById('about-panel');
  const aboutClose    = document.getElementById('about-close');
  const settingsBtn   = document.getElementById('settings-btn');
  const settingsPanel = document.getElementById('settings-panel');
  const settingsClose = document.getElementById('settings-close');
  const dataBtnEl     = document.getElementById('data-btn');
  const dataPanel     = document.getElementById('data-panel');
  const dataClose     = document.getElementById('data-close');
  const gedFileInput  = document.getElementById('ged-file-input');
  const rootIdInput   = document.getElementById('settings-root-id');
  const mergeBtn      = document.getElementById('settings-merge-btn');
  const mergeStatus   = document.getElementById('settings-merge-status');
  const advancedAccordion     = document.getElementById('advanced-accordion');
  const advancedAccordionBody = document.getElementById('advanced-accordion-body');

  advancedAccordion.addEventListener('click', () => {
    const open = advancedAccordionBody.classList.toggle('open');
    advancedAccordion.classList.toggle('open', open);
  });

  aboutBtn.classList.add('visible');
  settingsBtn.classList.add('visible');
  dataBtnEl.classList.add('visible');
  rootIdInput.value = rootId;

  function openPanel(panel) {
    [aboutPanel, settingsPanel, dataPanel].forEach(p => p.classList.remove('open'));
    closePanel();
    panel.classList.add('open');
  }

  aboutBtn.addEventListener('click',    () =>
    aboutPanel.classList.contains('open')    ? aboutPanel.classList.remove('open')    : openPanel(aboutPanel)
  );
  settingsBtn.addEventListener('click', () =>
    settingsPanel.classList.contains('open') ? settingsPanel.classList.remove('open') : openPanel(settingsPanel)
  );
  dataBtnEl.addEventListener('click',   () =>
    dataPanel.classList.contains('open')     ? dataPanel.classList.remove('open')     : openPanel(dataPanel)
  );
  aboutClose.addEventListener('click',    () => aboutPanel.classList.remove('open'));
  settingsClose.addEventListener('click', () => settingsPanel.classList.remove('open'));
  dataClose.addEventListener('click',     () => dataPanel.classList.remove('open'));

  const darkToggle = document.getElementById('dark-mode-toggle');

  function applyTheme(dark) {
    currentTheme = dark ? THEMES.dark : THEMES.light;
    document.body.classList.toggle('dark', dark);
    darkToggle.checked = dark;
    redraw();
  }

  const storedTheme = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(storedTheme !== null ? storedTheme === 'dark' : prefersDark);

  darkToggle.addEventListener('change', () => {
    localStorage.setItem('theme', darkToggle.checked ? 'dark' : 'light');
    applyTheme(darkToggle.checked);
  });

  const langSelect = document.getElementById('lang-select');
  langSelect.value = getLang();
  langSelect.addEventListener('change', () => {
    setLang(langSelect.value);
    applyTranslations();
    updateSettingsEditCount();
    updateWebhookEmailState(true);
    redraw();
  });

  const editCountEl      = document.getElementById('settings-edit-count');
  const hasEditsDescEl   = document.getElementById('has-edits-desc');
  const resetEditsBtn    = document.getElementById('settings-reset-edits');
  const downloadEditsBtn  = document.getElementById('settings-download-edits');
  const sendWebhookBtn        = document.getElementById('settings-send-webhook');
  const webhookMessageEl      = document.getElementById('webhook-message');
  const webhookEmailEl        = document.getElementById('webhook-email');
  const webhookSuccessModal   = document.getElementById('webhook-success-modal');
  const webhookSuccessEmail   = document.getElementById('webhook-success-email');
  const webhookSuccessClose   = document.getElementById('webhook-success-close');

  webhookSuccessClose.addEventListener('click', () => { webhookSuccessModal.style.display = 'none'; });
  webhookSuccessModal.addEventListener('click', (e) => { if (e.target === webhookSuccessModal) webhookSuccessModal.style.display = 'none'; });

  const webhookEmailError = document.getElementById('webhook-email-error');

  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function updateWebhookEmailState(showError = false) {
    const val   = webhookEmailEl.value.trim();
    const empty = !val;
    const invalid = val && !EMAIL_RE.test(val);
    const error = empty ? t('data.emailRequired') : invalid ? t('data.emailInvalid') : '';
    sendWebhookBtn.disabled = !!error;
    webhookEmailEl.style.borderColor = (error && showError) ? '#c0392b' : '';
    webhookEmailError.textContent    = (error && showError) ? error : '';
  }

  webhookEmailEl.value = localStorage.getItem(WEBHOOK_EMAIL_KEY) || '';
  updateWebhookEmailState(true);

  webhookEmailEl.addEventListener('input', () => updateWebhookEmailState(true));
  webhookEmailEl.addEventListener('blur',  () => updateWebhookEmailState(true));

  function updateSettingsEditCount() {
    const ids = [...new Set([...Object.keys(edits), ...Object.keys(imageEdits), ...Object.keys(newPeople)])];
    if (ids.length === 0) {
      editCountEl.textContent = t('data.noEdits');
    } else {
      const ul = document.createElement('ul');
      for (const id of ids) {
        const p = pMap[id];
        const name = p ? `${p.givenname || ''} ${p.surname || ''}`.trim() || id : id;
        const li = document.createElement('li');
        li.textContent = name;
        ul.appendChild(li);
      }
      editCountEl.innerHTML = '';
      editCountEl.appendChild(ul);
    }
    resetEditsBtn.style.display  = ids.length === 0 ? 'none' : '';
    hasEditsDescEl.style.display = ids.length === 0 ? 'none' : '';
  }
  updateSettingsEditCount();

  downloadEditsBtn.addEventListener('click', () => {
    const mergedPeople = data.people.map(p => {
      const delta = edits[p.pointer];
      return delta ? { ...p, ...delta } : p;
    }).concat(
      Object.entries(newPeople).map(([pointer, fields]) => ({ pointer, ...fields }))
    );
    const mergedFams = data.fams.map(f => {
      const patch = familyEdits[f.pointer];
      if (!patch) return f;
      const { _new, ...rest } = patch;
      return { ...f, ...rest };
    }).concat(
      Object.entries(familyEdits)
        .filter(([, v]) => v._new)
        .map(([pointer, fields]) => { const { _new, ...rest } = fields; return { pointer, ...rest }; })
    );
    const mergedImages = { ...data.images };
    for (const [id, base64] of Object.entries(imageEdits)) {
      if (base64 === '') delete mergedImages[id];
      else mergedImages[id] = base64;
    }
    const lines = [
      `const dataVersion = ${JSON.stringify(data.dataVersion || 0)}`,
      `const rootId = ${JSON.stringify(data.rootId)}`,
      `const people = ${JSON.stringify(mergedPeople, null, 2)}`,
      `const fams = ${JSON.stringify(mergedFams, null, 2)}`,
      `const images = ${JSON.stringify(mergedImages, null, 2)}`,
      `window.familyTreeData = { dataVersion, rootId, people, fams, images }`,
      `if (typeof module !== 'undefined') module.exports = { dataVersion, rootId, people, fams, images };`,
    ];
    const blob = new Blob([lines.join('\n\n')], { type: 'text/javascript' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href: url, download: 'data.js' });
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  const resetEditsModal   = document.getElementById('reset-edits-modal');
  const resetEditsCancel  = document.getElementById('reset-edits-cancel');
  const resetEditsConfirm = document.getElementById('reset-edits-confirm');

  resetEditsBtn.addEventListener('click', () => {
    resetEditsModal.style.display = 'flex';
  });
  resetEditsCancel.addEventListener('click', () => {
    resetEditsModal.style.display = 'none';
  });
  resetEditsModal.addEventListener('click', (e) => {
    if (e.target === resetEditsModal) resetEditsModal.style.display = 'none';
  });
  resetEditsConfirm.addEventListener('click', () => {
    edits = {};
    imageEdits = {};
    newPeople = {};
    familyEdits = {};
    localStorage.removeItem(EDITS_KEY);
    localStorage.removeItem(IMAGES_KEY);
    localStorage.removeItem(NEW_PEOPLE_KEY);
    localStorage.removeItem(FAMILY_EDITS_KEY);
    location.reload();
  });

  sendWebhookBtn.addEventListener('click', async () => {
    const email = webhookEmailEl.value.trim();
    localStorage.setItem(WEBHOOK_EMAIL_KEY, email);
    const payload = { edits, newPeople, imageEdits, familyEdits, message: webhookMessageEl.value, email };
    sendWebhookBtn.disabled = true;
    sendWebhookBtn.textContent = t('data.sending');
    try {
      const res = await fetch('https://eo7btr8yojxeu9z.m.pipedream.net', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-edit-token': 'my-secret-token' },
        body: JSON.stringify(payload),
      });
      if (res.ok) {
        webhookSuccessEmail.innerHTML = `${t('webhook.notifiedAt')}<br><strong>${email}</strong>`;
        webhookSuccessModal.style.display = 'flex';
      } else {
        sendWebhookBtn.textContent = t('data.sendError');
      }
    } catch (err) {
      sendWebhookBtn.textContent = t('data.sendFailed');
    } finally {
      sendWebhookBtn.disabled = false;
      if (sendWebhookBtn.textContent !== t('data.sendToAdmin')) {
        setTimeout(() => { sendWebhookBtn.textContent = t('data.sendToAdmin'); }, 4000);
      }
    }
  });

  const exportPasswordInput = document.getElementById('export-password');
  const exportHtmlBtn       = document.getElementById('export-html-btn');
  const exportHtmlStatus    = document.getElementById('export-html-status');
  const exportPasswordError = document.getElementById('export-password-error');

  const validateExportPassword = () => {
    const val = exportPasswordInput.value;
    if (!val) return 'Enter a password (min. 8 characters).';
    if (val.length < 8) return `Password too short — ${8 - val.length} more character${8 - val.length === 1 ? '' : 's'} needed.`;
    return '';
  };

  exportPasswordError.textContent = validateExportPassword();
  exportHtmlBtn.disabled = true;

  exportPasswordInput.addEventListener('input', () => {
    const err = validateExportPassword();
    exportPasswordError.textContent = err;
    exportHtmlBtn.disabled = !!err;
  });

  exportHtmlBtn.addEventListener('click', async () => {
    const password = exportPasswordInput.value;
    if (validateExportPassword()) return;

    const shellEl = document.getElementById('page-shell');
    if (!shellEl || !shellEl.textContent.includes('__FAMILY_TREE_DATA__')) {
      exportHtmlStatus.textContent = 'Error: page shell not found — rebuild with yarn build.';
      return;
    }

    exportHtmlBtn.disabled       = true;
    exportHtmlStatus.textContent = 'Encrypting… (this takes ~10 s)';

    try {
      const mergedPeople = data.people.map(p => ({ ...p, ...(edits[p.pointer] || {}) }));
      const mergedImages = { ...data.images };
      for (const [id, b64] of Object.entries(imageEdits)) {
        if (b64 === '') delete mergedImages[id];
        else mergedImages[id] = b64;
      }
      const plaintext = JSON.stringify({ dataVersion: data.dataVersion || 0, rootId: data.rootId, people: mergedPeople, fams: data.fams, images: mergedImages });

      const encObj    = await encryptData(plaintext, password);
      const dataBlock = `const encryptedData = ${JSON.stringify(encObj, null, ' ')};`;

      // shell = HTML frame + CSS + data placeholder, #app-code is empty
      const shell = shellEl.textContent.replace(/<\\\/script>/g, '<' + '/script>');

      // Inject the live JS into the shell's empty #app-code tag to produce a
      // complete, working HTML. The shell stored in #page-shell stays JS-free
      // so the downloaded file doesn't duplicate the scripts a second time.
      const jsContent = document.getElementById('app-code').textContent;
      const shellWithJs = shell.replace(
        '<script id="app-code"><' + '/script>',
        '<script id="app-code">' + jsContent + '<' + '/script>'
      );

      // Re-embed the JS-free shell so the downloaded file can also self-export.
      const escapedShell = shell.split('<' + '/script>').join('<\\/' + 'script>');
      const newHtml = shellWithJs
        .replace(
          /\/\* __FAMILY_TREE_DATA_START__ \*\/__FAMILY_TREE_DATA__\/\* __FAMILY_TREE_DATA_END__ \*\//,
          `/* __FAMILY_TREE_DATA_START__ */\n${dataBlock}\n/* __FAMILY_TREE_DATA_END__ */`
        )
        .replace(
          '<script type="text/plain" id="page-shell"><' + '/script>',
          `<script type="text/plain" id="page-shell">${escapedShell}<` + '/script>'
        );

      const blob = new Blob([newHtml], { type: 'text/html' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: 'index.html' });
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);

      exportHtmlStatus.textContent = 'Done.';
    } catch (err) {
      exportHtmlStatus.textContent = 'Error: ' + err.message;
    }

    exportHtmlBtn.disabled = false;
  });

  mergeBtn.addEventListener('click', async () => {
    const files = Array.from(gedFileInput.files);
    if (files.length === 0) {
      mergeStatus.textContent = 'Select at least one .ged file.';
      return;
    }
    mergeBtn.disabled = true;
    mergeStatus.textContent = 'Processing...';
    try {
      const texts = await Promise.all(files.map(f => f.text()));
      const selectedRoot = rootIdInput.value.trim() || rootId;
      const result = mergeGedcoms(texts, selectedRoot);
      const content = serializeToDataJs(result);
      const blob = new Blob([content], { type: 'text/javascript' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'data.js';
      a.click();
      URL.revokeObjectURL(url);

      const lines = [];
      result.stats.inputs.forEach((s, i) => {
        lines.push(`${files[i].name}: ${s.people} people, ${s.families} families`);
      });
      if (result.stats.duplicatesPeople > 0 || result.stats.duplicatesFamilies > 0) {
        lines.push(`duplicates removed: ${result.stats.duplicatesPeople} people, ${result.stats.duplicatesFamilies} families`);
      }
      lines.push(`→ merged: ${result.people.length} people, ${result.families.length} families`);
      mergeStatus.textContent = lines.join('\n');
    } catch (err) {
      mergeStatus.textContent = 'Error: ' + err.message;
    }
    mergeBtn.disabled = false;
  });

  bindNavButton('nav-zoom-in',  () => applyZoom(ZOOM_FACTOR));
  bindNavButton('nav-zoom-out', () => applyZoom(1 / ZOOM_FACTOR));

  document.getElementById('nav-home').addEventListener('click', () => {
    const home = getHomePan();
    panX = home.panX;
    panY = home.panY;
    scale = homeScale;
    scheduleSave();
    redraw();
  });

  onResize();

  const savedSelected = localStorage.getItem('selected-' + rootId);
  if (savedSelected && pMap[savedSelected]) {
    panelEl.style.transition = 'none';
    showPanel(savedSelected);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      panelEl.style.transition = '';
    }));
  }
}

const loginEl = document.getElementById('login');
const passwordEl = document.getElementById('password');
const buttonEl = document.getElementById('start');

function setupCanvas() {
  loginEl.remove();
  const canvas = document.createElement('canvas');
  canvas.id = 'myCanvas';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.border = 'none';
  canvas.style.display = 'block'; // To remove any extra spacing (similar to using CSS reset)
  document.body.appendChild(canvas);
  return canvas;
}

if (window.familyTreeData) {
  const canvas = setupCanvas();
  main(window.familyTreeData, canvas);
} else {
  passwordEl.focus();
  passwordEl.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      buttonEl.click();
    }
  });
  buttonEl.addEventListener('click', async function () {
    const password = passwordEl.value;
    if (!password) {
      return alert('Provide password')
    }
    const button = this;
    let dotCount = 0;
    const interval = setInterval(() => {
        dotCount = (dotCount + 1) % 4; // Cycle through 0, 1, 2, 3
        let dots = '.'.repeat(dotCount); // Create a string with the appropriate number of dots
        button.textContent = `${t('login.btn')}${dots}`;
    }, 250);

    try {
      let dataString;
      const nonce = base64ToUint8Array(encryptedData.nonce);
      const cipherText = base64ToUint8Array(encryptedData.cipherText);

      const decode = async (buf) => {
        const bytes = encryptedData.compressed ? await inflate(buf) : buf;
        return new TextDecoder().decode(bytes);
      };

      if (encryptedData.slots) {
        // New multi-password format: try each slot until one opens
        for (const slot of encryptedData.slots) {
          try {
            const rawDek = await unwrapDek(slot, password, encryptedData.iterations);
            dataString = await decode(await decryptData(rawDek, nonce, cipherText));
            break;
          } catch (_) { /* wrong slot — try next */ }
        }
      } else {
        // Legacy single-password format: key derived directly from password
        const keyMaterial = await crypto.subtle.importKey(
          'raw', new TextEncoder().encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
        );
        const key = await crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: base64ToUint8Array(encryptedData.salt), iterations: encryptedData.iterations, hash: 'SHA-256' },
          keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
        );
        const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, cipherText);
        dataString = await decode(decrypted);
      }

      if (!dataString) throw new Error('no slot matched');

      const familyTreeData = JSON.parse(dataString);
      const canvas = setupCanvas();
      main(familyTreeData, canvas);
    } catch (err) {
      console.log(err);
      alert('Wrong password. Try again');
    }
    clearInterval(interval);
  });
}
