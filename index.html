        const row = document.createElement('div');
        row.className = 'conflict-row';
        row.innerHTML = `
          <div class="conflict-person">${name}</div>
          <div class="conflict-field">${label}</div>
          <label class="conflict-choice">
            <input type="radio" name="${nameAttr}" value="local" checked>
            ${t('conflict.myEdit')} <strong>${localValue || t('conflict.empty')}</strong>
          </label>
          <label class="conflict-choice">
            <input type="radio" name="${nameAttr}" value="canonical">
            ${t('conflict.newData')} <strong>${canonicalValue || t('conflict.empty')}</strong>
          </label>`;
        list.appendChild(row);
      }

      document.getElementById('conflict-keep-all').onclick = () => {
        list.querySelectorAll('input[value="local"]').forEach(r => { r.checked = true; });
      };
      document.getElementById('conflict-accept-all').onclick = () => {
        list.querySelectorAll('input[value="canonical"]').forEach(r => { r.checked = true; });
      };
      document.getElementById('conflict-done').onclick = () => {
        for (const { personId, field } of conflicts) {
          const nameAttr = `c-${personId}-${field}`.replace(/[^a-zA-Z0-9-]/g, '_');
          const chosen = list.querySelector(`input[name="${nameAttr}"]:checked`)?.value;
          if (chosen === 'canonical') {
            if (edits[personId]) {
              delete edits[personId][field];
              if (Object.keys(edits[personId]).length === 0) delete edits[personId];
            }
          }
        }
        localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
        localStorage.setItem(DATA_VERSION_KEY, data.dataVersion);
        modal.style.display = 'none';
        resolve();
      };

      modal.style.display = 'flex';
    });
  }

  async function checkVersionConflicts() {
    const storedVersion  = parseInt(localStorage.getItem(DATA_VERSION_KEY) || '0', 10);
    const currentVersion = data.dataVersion || 0;
    const versionBumped  = currentVersion > storedVersion;

    const conflicts = [];
    let autoResolved = 0;

    for (const personId of Object.keys(edits)) {
      const original = originalById.get(personId);
      if (!original) continue;

      const deltaFields = { ...edits[personId] };
      for (const [field, localValue] of Object.entries(deltaFields)) {
        const canonicalValue = original[field];
        const canonicalEmpty = canonicalValue == null || canonicalValue === '';

        if (canonicalEmpty) continue;

        if (localValue === canonicalValue) {
          delete edits[personId][field];
          autoResolved++;
          continue;
        }

        if (versionBumped) conflicts.push({ personId, field, localValue, canonicalValue });
      }

      if (edits[personId] && Object.keys(edits[personId]).length === 0) delete edits[personId];
    }

    // Also clean up imageEdits entries that exactly match canonical data (baked-in images).
    let imageAutoResolved = 0;
    for (const id of Object.keys(imageEdits)) {
      if (imageEdits[id] !== '' && imageEdits[id] === data.images[id]) {
        delete imageEdits[id];
        imageAutoResolved++;
      }
    }
    if (imageAutoResolved > 0) localStorage.setItem(IMAGES_KEY, JSON.stringify(imageEdits));

    if (autoResolved > 0) localStorage.setItem(EDITS_KEY, JSON.stringify(edits));

    if (versionBumped) {
      if (conflicts.length > 0) {
        await showConflictModal(conflicts);
      } else {
        localStorage.setItem(DATA_VERSION_KEY, currentVersion);
      }
    }
  }

  await checkVersionConflicts();

  async function rebuildGraph() {
    // Merge base data with field edits + new people
    const effectivePeople = data.people.map(p => {
      const delta = edits[p.pointer];
      return delta ? { ...p, ...delta } : p;
    }).filter(p => !p.removed).concat(
      Object.entries(newPeople).map(([pointer, fields]) => ({ pointer, ...fields })).filter(p => !p.removed)
    );

    // Merge base families with patches + new families
    const allFamilies = data.fams.map(f => {
      const patch = familyEdits[f.pointer];
      return patch ? { ...f, ...patch } : f;
    }).concat(
      Object.entries(familyEdits)
        .filter(([, v]) => v._new)
        .map(([pointer, fields]) => {
          const { _new, ...rest } = fields;
          return { pointer, ...rest };
        })
    );

    // Raw pointer → record map for addRelative (before Indyvidual wrapping)
    allPeopleByPointer = new Map(effectivePeople.map(p => [p.pointer, p]));

    pMap = await effectivePeople.reduce(async (accPromise, obj) => {
      const acc = await accPromise;
      if (images[obj.pointer]) obj.img = images[obj.pointer];
      const p = new Indyvidual(rootId, obj);
      await p.init();
      acc[obj.pointer] = p;
      return acc;
    }, Promise.resolve({}));

    fMap = allFamilies.reduce((acc, obj) => {
      acc[obj.pointer] = obj;
      return acc;
    }, {});

    // Apply stored image overrides ('' = removal sentinel → placeholder)
    for (const [id, base64] of Object.entries(imageEdits)) {
      const person = pMap[id];
      if (!person) continue;
      const src = base64 === '' ? person.placeholderBase64Img : base64;
      person.base64Img = src;
      const img = new Image();
      img.src = src;
      await new Promise(resolve => { img.onload = img.onerror = resolve; });
      person.img = img;
    }

    // Split people by ancestry level from root
    const levelData = [];
    for (const i of Object.values(pMap)) {
      let dist = -1;
      try {
        dist = i.getDistanceFromRoot();
        if (dist !== undefined && dist !== -1) {
          if (!levelData[dist]) levelData[dist] = [];
          levelData[dist].push(i);
        } else {
          // Not a direct descendant — check if spouse of one
          if (i.fams && fMap[i.fams]) {
            const spouseFamily = fMap[i.fams];
            let partnerDist;
            if (spouseFamily.husband === i.id && spouseFamily.wife && pMap[spouseFamily.wife]) {
              partnerDist = pMap[spouseFamily.wife].getDistanceFromRoot();
            } else if (spouseFamily.wife === i.id && spouseFamily.husband && pMap[spouseFamily.husband]) {
              partnerDist = pMap[spouseFamily.husband].getDistanceFromRoot();
            }
            if (partnerDist !== undefined) {
              if (!levelData[partnerDist]) levelData[partnerDist] = [];
              levelData[partnerDist].push(i);
            }
          }
        }
      } catch (e) {
        console.log(i.fullname, e);
      }
    }

    // Sort each level by parent family order then DOB
    for (let i = 0; i < levelData.length; i++) {
      const level = levelData[i];
      let previousLevelOrder = null;
      if (i > 0) previousLevelOrder = levelData[i - 1].map(p => p.fams);
      level.sort((p1, p2) => {
        if (previousLevelOrder && p1.famc && p2.famc && p1.famc !== p2.famc) {
          return previousLevelOrder.indexOf(p1.famc) - previousLevelOrder.indexOf(p2.famc);
        }
        return compareDatesDob(p1, p2);
      });
    }

    // Build graph nodes
    const graph = [];
    let id = 1;

    function resolveFams(p, pp) {
      if (p.fams && !pp.fams) return p.fams;
      if (!p.fams && pp.fams) return pp.fams;
      if (!p.fams && !pp.fams) return undefined;
      const pf = fMap[p.fams];
      const ppf = fMap[pp.fams];
      if (pf && ((pf.wife === p.id && pf.husband === pp.id) || (pf.wife === pp.id && pf.husband === p.id))) return p.fams;
      if (ppf && ((ppf.wife === p.id && ppf.husband === pp.id) || (ppf.wife === pp.id && ppf.husband === p.id))) return pp.fams;
      return p.fams;
    }

    for (let i = 0; i < levelData.length; i++) {
      const level = levelData[i];
      const graphLayer = [];
      graph.push(graphLayer);
      let nodeIndex = 0;
      let prevFamc;

      const chainAnchors = new Set();
      for (const p of level) {
        if (p.findPartners().length >= 2) chainAnchors.add(p.id);
      }
      const processedInChain = new Set();
      const orderedLevel = [
        ...level.filter(p => chainAnchors.has(p.id)),
        ...level.filter(p => !chainAnchors.has(p.id)),
      ];

      for (const p of orderedLevel) {
        if (prevFamc !== undefined && p.famc !== undefined && prevFamc !== p.famc) nodeIndex = 0;
        prevFamc = p.famc;
        if (processedInChain.has(p.id)) continue;

        const partners = p.findPartners().filter(pp => !processedInChain.has(pp.id));

        if (partners.length === 0) {
          graphLayer.push(new Node(id, 'single', [p], nodeIndex, i, 0, p.fams));
          nodeIndex++; id++;
        } else if (partners.length === 1) {
          const pp = partners[0];
          const nodeFams = resolveFams(p, pp);
          let nodeData, dataIndex;
          if (p.sex === 'M') { dataIndex = 0; nodeData = [p, pp]; }
          else               { nodeData = [pp, p]; dataIndex = 1; }
          graphLayer.push(new Node(id, 'couple', nodeData, nodeIndex, i, dataIndex, nodeFams));
          processedInChain.add(p.id); processedInChain.add(pp.id);
          nodeIndex++; id++;
        } else {
          const sortedSpouses = [...partners].sort((a, b) => compareDatesDob(a, b));
          const famsArr = sortedSpouses.map(pp => resolveFams(p, pp));
          const isMale = p.sex !== 'F';
          const chainData = isMale ? [p, ...sortedSpouses] : [...sortedSpouses, p];
          const sharedPersonIndex = isMale ? 0 : chainData.length - 1;
          graphLayer.push(new Node(id, 'chain', chainData, nodeIndex, i, sharedPersonIndex, famsArr[0], famsArr));
          processedInChain.add(p.id);
          for (const pp of sortedSpouses) processedInChain.add(pp.id);
          nodeIndex++; id++;
        }
      }
    }

    function nodeOwnsFamily(node, famPointer) {
      if (node.fams === famPointer) return true;
      if (node.famsArray && node.famsArray.includes(famPointer)) return true;
      return false;
    }

    // Link children to parents
    for (let i = graph.length - 2; i >= 0; i--) {
      for (const parentNode of graph[i]) {
        for (const childNode of graph[i + 1]) {
          for (const child of childNode.data) {
            if (child.famc !== undefined && nodeOwnsFamily(parentNode, child.famc)) {
              if (!parentNode.children.includes(childNode)) {
                parentNode.children.push(childNode);
                childNode.setParent(parentNode);
              }
              if (!parentNode.childrenByFam) parentNode.childrenByFam = {};
              if (!parentNode.childrenByFam[child.famc]) parentNode.childrenByFam[child.famc] = [];
              if (!parentNode.childrenByFam[child.famc].includes(childNode))
                parentNode.childrenByFam[child.famc].push(childNode);
            }
          }
        }
      }
    }

    if (graph[0] && graph[0].length === 1) {
      root = graph[0][0];
    } else if (graph[0]) {
      root = new Node('rootId', 'fake', [], 0, 0);
      for (const c of graph[0]) { root.children.push(c); c.setParent(root); }
    }

    for (let y = 0; y < graph.length; y++) {
      for (const node of graph[y]) node._y = y + 1;
    }
    currentLayout(root);

    nodeMap.clear();
    originalChildren.clear();
    for (const layer of graph) {
      for (const node of layer) nodeMap.set(node.id, node);
    }
    if (root.type === 'fake') nodeMap.set(root.id, root);

    ;(function storeOriginalChildren(node) {
      originalChildren.set(node.id, [...node.children]);
      for (const child of node.children) storeOriginalChildren(child);
    })(root);

    // Prune stale collapsed-node entries
    for (const toggleId of [...collapsedNodes]) {
      const str = String(toggleId);
      const underscoreIdx = str.indexOf('_');
      const actualId = underscoreIdx >= 0 ? parseInt(str.substring(0, underscoreIdx)) : toggleId;
      if (!nodeMap.has(actualId)) collapsedNodes.delete(toggleId);
    }

    searchIndex = Array.from(allPeopleByPointer.values()).map(p => {
      const yearMatch = (p.date_of_birth || '').match(/\d{4}/);
      return {
        id: p.pointer,
        label: [p.givenname, p.surname].filter(Boolean).join(' '),
        year: yearMatch ? yearMatch[0] : '',
      };
    });

    recomputeLayout();
    redraw();
    updateDataBadge();
  }

  function applyDelta(personId, changedFields) {
    const original = originalById.get(personId);
    if (!original) {
      // New person lives in newPeople — update it directly
      updateNewPeopleOrEdits(personId, changedFields);
      return;
    }
    const existing = edits[personId] || {};
    const merged = { ...existing, ...changedFields };
    for (const [k, v] of Object.entries(merged)) {
      if (original[k] === v || (v === '' && original[k] == null)) delete merged[k];
    }
    if (Object.keys(merged).length === 0) delete edits[personId];
    else edits[personId] = merged;
    localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
  }

  function updateIndyvidual(personId, changedFields) {
    const person = pMap[personId];
    if (!person) return;
    if (changedFields.givenname    != null) person.givenname    = changedFields.givenname;
    if (changedFields.surname      != null) person.surname      = changedFields.surname;
    if (changedFields.fullname     != null) person.fullname     = changedFields.fullname;
    if (changedFields.date_of_birth != null) person.dob         = changedFields.date_of_birth;
    if (changedFields.date_of_death != null) person.dod         = changedFields.date_of_death;
    if (changedFields.place_of_birth != null) person.placeOfBirth = changedFields.place_of_birth;
    if (changedFields.sex          != null) person.sex          = changedFields.sex;
  }

  function recomputeLayout() {
    for (const toggleId of collapsedNodes) {
      const node = nodeMap.get(toggleId);
      if (node) {
        node.children = [];
      } else {
        const str = String(toggleId);
        const underscoreIdx = str.indexOf('_');
        if (underscoreIdx >= 0) {
          const actualNode = nodeMap.get(parseInt(str.substring(0, underscoreIdx)));
          const famPointer = str.substring(underscoreIdx + 1);
          if (actualNode && actualNode.childrenByFam && actualNode.childrenByFam[famPointer]) {
            const toRemove = new Set(actualNode.childrenByFam[famPointer].map(c => c.id));
            actualNode.children = actualNode.children.filter(c => !toRemove.has(c.id));
          }
        }
      }
    }
    currentLayout(root);
    for (const [nodeId, children] of originalChildren) {
      const node = nodeMap.get(nodeId);
      if (node) node.children = children;
    }
  }

  const ctx = canvas.getContext('2d');
  let panX = 0;
  let panY = 0;
  let scale = 1;
  const MIN_SCALE = 0.05;
  const MAX_SCALE = 5;

  const LAYOUT_KEY    = 'familyTreeLayout';
  const _savedLayout  = localStorage.getItem(LAYOUT_KEY) || 'TD';
  layoutDirection     = _savedLayout;
  let currentLayout   = _savedLayout === 'LR' ? computeLayoutLR : computeLayout;

  await rebuildGraph();

  function getUpcomingBirthdays(people, windowDays = 7) {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const results = [];
    for (const p of Object.values(people)) {
      if (!p.dob) continue;
      const parsed = parseGedcomDate(p.dob);
      if (!parsed || parsed.rangeFrom !== undefined) continue;
      if (!parsed.month || !parsed.day) continue;
      const { month, day, year } = parsed;
      let bday = new Date(today.getFullYear(), month - 1, day);
      if (bday < today) bday = new Date(today.getFullYear() + 1, month - 1, day);
      const diffDays = Math.round((bday - today) / 86400000);
      if (diffDays >= 0 && diffDays < windowDays) {
        const age = year ? bday.getFullYear() - year : null;
        const alive = !p.dod;
        results.push({ person: p, daysUntil: diffDays, age, alive });
      }
    }
    return results.sort((a, b) => a.daysUntil - b.daysUntil);
  }

  function renderBirthdayPanel() {
    const entries = getUpcomingBirthdays(pMap);
    const list = document.getElementById('birthday-list');

    list.innerHTML = entries.map(({ person, daysUntil, age, alive }) => {

        <div style="font-size:13px;font-weight:600;color:var(--text)">${name}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${when}${ageStr ? ' · ' + ageStr : ''}</div>
      </div>`;

  }

  function updateDataBadge() {
    const hasChanges =
      Object.keys(edits).length > 0 ||
      Object.keys(imageEdits).length > 0 ||
      Object.keys(newPeople).length > 0 ||
      Object.keys(familyEdits).length > 0;

  }

  function redraw() {
    const dpr = window.devicePixelRatio || 1;
    coordinates.length = 0;
    toggleAreas.length = 0;
    addRelativeAreas.length = 0;
    ctx.save();
    ctx.fillStyle = currentTheme.canvasBg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.scale(dpr, dpr);
    ctx.translate(panX, panY);
    ctx.scale(scale, scale);
    drawNode(ctx, root);
    ctx.restore();
  }


  // Handle panning with mouse
  let isPanning = false;
  let startX, startY;

  canvas.addEventListener('mousedown', (e) => {
      isPanning = true;
      startX = e.clientX - panX;
      startY = e.clientY - panY;
  });

  canvas.addEventListener('mousemove', async (e) => {
      if (!isPanning) return;
      panX = e.clientX - startX;
      panY = e.clientY - startY;
      scheduleSave();
      redraw();
  });

  canvas.addEventListener('mouseup', () => isPanning = false);
  canvas.addEventListener('mouseleave', () => isPanning = false);

  // zooming centering around mouse position
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();

    const zoomSpeed = 0.1;
    const mouseX = e.offsetX;  // Mouse position relative to canvas
    const mouseY = e.offsetY;

    const newScale = scale - e.deltaY * zoomSpeed / 100;

    // Ensure the new scale is within the desired range
    if (newScale >= MIN_SCALE && newScale <= MAX_SCALE) {
      // Calculate the scale ratio
      const scaleRatio = newScale / scale;

      // Adjust the translation to zoom around the mouse position
      panX -= (mouseX - panX) * (scaleRatio - 1);
      panY -= (mouseY - panY) * (scaleRatio - 1);

      scale = newScale;
      scheduleSave();
      redraw();
    }
  });

  function getMidpoint(touches) {
    const [touch1, touch2] = touches;
    return {
        x: (touch1.clientX + touch2.clientX) / 2,
        y: (touch1.clientY + touch2.clientY) / 2
    };
  }
  function getDistance(touches) {
    const [touch1, touch2] = touches;
    const dx = touch1.clientX - touch2.clientX;
    const dy = touch1.clientY - touch2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  let initialDistance;
  let lastMidpoint;

  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      initialDistance = getDistance(e.touches);
      lastMidpoint = getMidpoint(e.touches);
      isPanning = false;
    } else if (e.touches.length === 1) {
      startX = e.touches[0].clientX - panX;
      startY = e.touches[0].clientY - panY;
      isPanning = true;
    }
  });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();

    if (e.touches.length === 2) {
      const currentDistance = getDistance(e.touches);
      const midpoint = getMidpoint(e.touches);
      const rawRatio = currentDistance / initialDistance;
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * rawRatio));
      const actualRatio = newScale / scale;

      // Pan by midpoint delta, then zoom around new midpoint
      panX += midpoint.x - lastMidpoint.x;
      panY += midpoint.y - lastMidpoint.y;
      panX -= (midpoint.x - panX) * (actualRatio - 1);
      panY -= (midpoint.y - panY) * (actualRatio - 1);

      scale = newScale;
      initialDistance = currentDistance;
      lastMidpoint = midpoint;
      scheduleSave();
      redraw();
    } else if (e.touches.length === 1 && isPanning) {
      panX = e.touches[0].clientX - startX;
      panY = e.touches[0].clientY - startY;
      scheduleSave();
      redraw();
    }
  });

  canvas.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) {
      initialDistance = 0;
      lastMidpoint = null;
      isPanning = false;
    }
  });

  function getMousePosition(event) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = (event.clientX - rect.left - panX) / scale;
    const mouseY = (event.clientY - rect.top - panY) / scale;
    return { mouseX, mouseY };
}

  function validateEditDates() {
    const currentYear = new Date().getFullYear();
    const dobYear = extractYear(editDob.value.trim());
    const dodYear = extractYear(editDod.value.trim());
    let valid = true;
    if (dobYear !== null && dobYear > currentYear) {
      editDobWarnEl.textContent = 'The date of birth is in the future — please check the date.';
      editDobWarnEl.style.display = '';
      valid = false;
    } else {
      editDobWarnEl.style.display = 'none';
    }
    if (dodYear !== null && dodYear > currentYear) {
      editDodWarnEl.textContent = 'The date of death is in the future — please check the date.';
      editDodWarnEl.style.display = '';
      valid = false;
    } else {

  function enterEditMode(personId) {

  // ── Crop modal ──────────────────────────────────────────────────────────────
  const CANVAS_SIZE = 280;
  const MASK_SIZE   = 220;
  const OUTPUT_SIZE = 300;
  const HALF_MASK   = MASK_SIZE / 2;

  const cropModal    = document.getElementById('crop-modal');
  const cropCanvas   = document.getElementById('crop-canvas');
  const cropCtx      = cropCanvas.getContext('2d');
  cropCanvas.width   = CANVAS_SIZE;
  cropCanvas.height  = CANVAS_SIZE;

  let cropImg   = null;
  let cropX     = 0;
  let cropY     = 0;
  let cropScale = 1;

  function cropMinScale() {
    return Math.max(MASK_SIZE / cropImg.width, MASK_SIZE / cropImg.height);
  }

  function clampCrop() {
    const hw = (cropImg.width  * cropScale) / 2;
    const hh = (cropImg.height * cropScale) / 2;
    cropX = Math.min(cropX,  hw - HALF_MASK);
    cropX = Math.max(cropX, -(hw - HALF_MASK));
    cropY = Math.min(cropY,  hh - HALF_MASK);
    cropY = Math.max(cropY, -(hh - HALF_MASK));
  }

  function drawCrop() {
    cropCtx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    cropCtx.save();
    cropCtx.translate(CANVAS_SIZE / 2 + cropX, CANVAS_SIZE / 2 + cropY);
    cropCtx.scale(cropScale, cropScale);
    cropCtx.drawImage(cropImg, -cropImg.width / 2, -cropImg.height / 2);
    cropCtx.restore();

    const mx = (CANVAS_SIZE - MASK_SIZE) / 2;
    const my = (CANVAS_SIZE - MASK_SIZE) / 2;
    cropCtx.fillStyle = 'rgba(0,0,0,0.55)';
    cropCtx.fillRect(0,  0,  CANVAS_SIZE, my);
    cropCtx.fillRect(0,  my + MASK_SIZE, CANVAS_SIZE, CANVAS_SIZE - my - MASK_SIZE);
    cropCtx.fillRect(0,  my, mx, MASK_SIZE);
    cropCtx.fillRect(mx + MASK_SIZE, my, CANVAS_SIZE - mx - MASK_SIZE, MASK_SIZE);

    cropCtx.strokeStyle = 'rgba(255,255,255,0.75)';
    cropCtx.lineWidth = 1.5;
    cropCtx.strokeRect(mx + 0.75, my + 0.75, MASK_SIZE - 1.5, MASK_SIZE - 1.5);
  }

  function openCropModal(base64) {
    cropImg = new Image();
    cropImg.onload = () => {
      cropScale = cropMinScale();
      cropX = 0;
      cropY = 0;
      cropModal.style.display = 'flex';
      drawCrop();
    };
    cropImg.src = base64;
  }

  // Mouse drag
  let cropDragStart = null;
  cropCanvas.addEventListener('mousedown', (e) => {
    cropDragStart = { x: e.clientX - cropX, y: e.clientY - cropY };
  });
  window.addEventListener('mousemove', (e) => {
    if (!cropDragStart) return;
    cropX = e.clientX - cropDragStart.x;
    cropY = e.clientY - cropDragStart.y;
    clampCrop();
    drawCrop();
  });
  window.addEventListener('mouseup', () => { cropDragStart = null; });

  // Mouse wheel zoom
  cropCanvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
    cropScale = Math.max(cropMinScale(), cropScale * factor);
    clampCrop();
    drawCrop();
  }, { passive: false });

  // Touch pan + pinch zoom
  let cropLastMidpoint = null;
  let cropInitialDist  = 0;
  cropCanvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 2) {
      cropInitialDist  = getDistance(e.touches);
      cropLastMidpoint = getMidpoint(e.touches);
    } else if (e.touches.length === 1) {
      cropDragStart = { x: e.touches[0].clientX - cropX, y: e.touches[0].clientY - cropY };
    }
  }, { passive: false });
  cropCanvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 2) {
      const dist     = getDistance(e.touches);
      const midpoint = getMidpoint(e.touches);
      const ratio    = dist / cropInitialDist;
      cropX += midpoint.x - cropLastMidpoint.x;
      cropY += midpoint.y - cropLastMidpoint.y;
      cropScale = Math.max(cropMinScale(), cropScale * ratio);
      cropInitialDist  = dist;
      cropLastMidpoint = midpoint;
      clampCrop();
      drawCrop();
    } else if (e.touches.length === 1 && cropDragStart) {
      cropX = e.touches[0].clientX - cropDragStart.x;
      cropY = e.touches[0].clientY - cropDragStart.y;
      clampCrop();
      drawCrop();
    }
  }, { passive: false });
  cropCanvas.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) { cropInitialDist = 0; cropLastMidpoint = null; }
    if (e.touches.length === 0) cropDragStart = null;
  });

  // Zoom buttons
  document.getElementById('crop-zoom-in').addEventListener('click', () => {
    cropScale = Math.min(cropScale * 1.2, cropMinScale() * 10);
    clampCrop(); drawCrop();
  });
  document.getElementById('crop-zoom-out').addEventListener('click', () => {
    cropScale = Math.max(cropMinScale(), cropScale / 1.2);
    clampCrop(); drawCrop();
  });

  // Apply — export cropped region
  document.getElementById('crop-apply').addEventListener('click', () => {
    const out    = document.createElement('canvas');
    out.width    = OUTPUT_SIZE;
    out.height   = OUTPUT_SIZE;
    const outCtx = out.getContext('2d');
    const factor = OUTPUT_SIZE / MASK_SIZE;
    outCtx.translate(OUTPUT_SIZE / 2 + cropX * factor, OUTPUT_SIZE / 2 + cropY * factor);
    outCtx.scale(cropScale * factor, cropScale * factor);
    outCtx.drawImage(cropImg, -cropImg.width / 2, -cropImg.height / 2);
    pendingImageBase64 = out.toDataURL('image/jpeg', 0.85);
    panelImgEl.src = pendingImageBase64;
    cropModal.style.display = 'none';
    editPhotoInput.value = '';
    cropImg = null;
  });

  // Cancel
  document.getElementById('crop-cancel').addEventListener('click', () => {
    cropModal.style.display = 'none';
    editPhotoInput.value = '';
    cropImg = null;
  });

  // File picked → open modal instead of direct use
  editPhotoInput.addEventListener('change', () => {
    const file = editPhotoInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => openCropModal(e.target.result);

  panelImgRemoveBtn.addEventListener('click', () => {
    pendingImageBase64 = '';
    editPhotoInput.value = '';
    panelImgEl.src = pMap[currentPersonId].placeholderBase64Img;
  });

  function isLeafPerson(personId) {
    for (const fam of Object.values(fMap)) {
      if (fam.husband !== personId && fam.wife !== personId) continue;
      const activeChildren = (fam.children ?? []).filter(id => allPeopleByPointer.has(id));
      if (activeChildren.length > 0) return false;
    }
    return true;
  }

  function cleanupFamilyEditsForPerson(personId) {
    for (const famPointer of Object.keys(familyEdits)) {
      const fam = familyEdits[famPointer];
      let changed = false;
      const updated = { ...fam };
      if (updated.husband === personId) { delete updated.husband; changed = true; }
      if (updated.wife    === personId) { delete updated.wife;    changed = true; }
      if (Array.isArray(updated.children) && updated.children.includes(personId)) {
        updated.children = updated.children.filter(c => c !== personId);
        changed = true;
      }
      if (!changed) continue;
      if (updated._new && !updated.husband && !updated.wife && !(updated.children || []).length) {
        delete familyEdits[famPointer];
      } else {
        familyEdits[famPointer] = updated;
      }
    }
    localStorage.setItem(FAMILY_EDITS_KEY, JSON.stringify(familyEdits));
  }

  function removePerson(personId) {
    if (newPeople[personId]) {
      delete newPeople[personId];
      localStorage.setItem(NEW_PEOPLE_KEY, JSON.stringify(newPeople));
      delete edits[personId];
      localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
      cleanupFamilyEditsForPerson(personId);
    } else {
      edits[personId] = { ...(edits[personId] || {}), removed: true };

  panelEditForm.addEventListener('submit', async (e) => {

    applyDelta(currentPersonId, changedFields);

  function nextPersonId() {
    const nums = [...data.people.map(p => p.pointer), ...Object.keys(newPeople)]
      .map(id => parseInt(id.match(/\d+/)?.[0] || 0));
    return `@I${Math.max(0, ...nums) + 1}@`;
  }

  function nextFamilyId() {
    const nums = [...data.fams.map(f => f.pointer), ...Object.keys(familyEdits)]
      .map(id => parseInt(id.match(/\d+/)?.[0] || 0));
    return `@F${Math.max(0, ...nums) + 1}@`;
  }

  function updateNewPeopleOrEdits(id, patch) {
    if (newPeople[id]) {
      Object.assign(newPeople[id], patch);
      localStorage.setItem(NEW_PEOPLE_KEY, JSON.stringify(newPeople));
    } else {
      edits[id] = { ...(edits[id] || {}), ...patch };
      localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
    }
  }

  function getFamilyRecord(pointer) {
    const base  = data.fams.find(f => f.pointer === pointer) || {};
    const patch = familyEdits[pointer] || {};
    return { ...base, ...patch };
  }

  const addRelativePanelEl  = document.getElementById('add-relative-panel');
  const addRelativeTitleEl  = document.getElementById('add-relative-title');
  const addRelativeFormEl   = document.getElementById('add-relative-form');
  const addRelativeErrorEl  = document.getElementById('add-relative-error');
  const addRelativeCloseEl  = document.getElementById('add-relative-close');
  const addRelativeCancelEl = document.getElementById('add-relative-cancel');
  const arDobEl             = document.getElementById('ar-dob');
  const arDobWarnEl         = document.getElementById('ar-dob-warning');
  const addRelativeSaveEl   = document.getElementById('add-relative-save');

  function extractYear(dateStr) {
    if (!dateStr) return null;
    const m = dateStr.match(/\b(\d{4})\b/);
    return m ? parseInt(m[1], 10) : null;
  }

  function validateChildDob() {
    const rel = document.querySelector('input[name="rel"]:checked').value;
    if (rel !== 'child') {
      arDobWarnEl.style.display = 'none';
      addRelativeSaveEl.disabled = false;
      return;
    }
    const parentPerson = pMap[addingRelativeToId];
    const parentYear = parentPerson ? extractYear(parentPerson.dob) : null;
    const childYear  = extractYear(arDobEl.value.trim());
    let warning = null;
    const currentYear = new Date().getFullYear();
    if (childYear !== null && childYear > currentYear) {
      warning = 'The date of birth is in the future — please check the date.';
    } else if (parentYear !== null && childYear !== null) {
      if (childYear < parentYear) {
        warning = 'The child was born before the parent — please check the date.';
      } else if (childYear < parentYear + 10) {
        warning = `The child was born when the parent was only ${childYear - parentYear} year(s) old — please check the date.`;
      }
    }
    if (warning) {
      arDobWarnEl.textContent = warning;
      arDobWarnEl.style.display = '';
      addRelativeSaveEl.disabled = true;
    } else {
      arDobWarnEl.style.display = 'none';
      addRelativeSaveEl.disabled = false;
    }
  }

  let addingRelativeToId = null;

  function showAddRelativePanel(personId) {
    addingRelativeToId = personId;
    const p = pMap[personId];
    addRelativeTitleEl.textContent = `${t('rel.title')} ${p ? p.givenname + ' ' + p.surname : personId}`;
    addRelativeErrorEl.style.display = 'none';
    arDobWarnEl.style.display = 'none';

    addRelativeFormEl.reset();
    closePanel();
    addRelativePanelEl.classList.add('open');
  }

  arDobEl.addEventListener('input', validateChildDob);
  document.querySelectorAll('input[name="rel"]').forEach(r => r.addEventListener('change', validateChildDob));

  addRelativeCloseEl.addEventListener('click',  () => addRelativePanelEl.classList.remove('open'));
  addRelativeCancelEl.addEventListener('click', () => addRelativePanelEl.classList.remove('open'));

  addRelativeFormEl.addEventListener('submit', async (e) => {
    e.preventDefault();
    const rel       = document.querySelector('input[name="rel"]:checked').value;
    const givenname = document.getElementById('ar-givenname').value.trim();
    const surname   = document.getElementById('ar-surname').value.trim();
    const sex       = document.getElementById('ar-sex').value;
    const dob       = document.getElementById('ar-dob').value.trim();
    const dod       = document.getElementById('ar-dod').value.trim();
    const pob       = document.getElementById('ar-pob').value.trim();

    if (!givenname && !surname) {
      addRelativeErrorEl.textContent = t('rel.errorNameRequired');
      addRelativeErrorEl.style.display = '';
      return;
    }

    await addRelative(addingRelativeToId, rel, { givenname, surname, sex,
      date_of_birth: dob, date_of_death: dod, place_of_birth: pob });
    addRelativePanelEl.classList.remove('open');
  });

  async function addRelative(personId, rel, fields) {
    const anchorPerson = allPeopleByPointer.get(personId);
    if (!anchorPerson) return;
    const newId    = nextPersonId();
    const fullname = `${fields.givenname} /${fields.surname}/`;
    const newPerson = { ...fields, fullname, pointer: newId, fams: null, famc: null };

    if (rel === 'child') {
      let famPointer = anchorPerson.fams;
      if (!famPointer) {
        famPointer = nextFamilyId();
        familyEdits[famPointer] = { _new: true,
          husband: anchorPerson.sex === 'M' ? personId : null,
          wife:    anchorPerson.sex === 'F' ? personId : null,
          children: [] };
        anchorPerson.fams = famPointer;
        updateNewPeopleOrEdits(personId, { fams: famPointer });
      }
      const fam = getFamilyRecord(famPointer);
      familyEdits[famPointer] = { ...(familyEdits[famPointer] || {}), children: [...(fam.children || []), newId] };
      newPerson.famc = famPointer;

    } else if (rel === 'spouse') {
      const famPointer = nextFamilyId();
      const isHusband  = anchorPerson.sex !== 'F';
      familyEdits[famPointer] = { _new: true,
        husband:  isHusband ? personId : newId,
        wife:     isHusband ? newId    : personId,
        children: [] };
      newPerson.fams = famPointer;

    } else if (rel === 'parent') {
      let famPointer = anchorPerson.famc;
      if (!famPointer) {
        famPointer = nextFamilyId();
        familyEdits[famPointer] = { _new: true, husband: null, wife: null, children: [personId] };
        updateNewPeopleOrEdits(personId, { famc: famPointer });
        anchorPerson.famc = famPointer;
      }
      const fam  = getFamilyRecord(famPointer);
      const slot = !fam.husband ? 'husband' : (!fam.wife ? 'wife' : null);
      if (!slot) {
        addRelativeErrorEl.textContent = t('rel.errorParentSlotsFull');
        addRelativeErrorEl.style.display = '';
        return;
      }
      familyEdits[famPointer] = { ...(familyEdits[famPointer] || {}), [slot]: newId };
      newPerson.fams = famPointer;

    } else if (rel === 'sibling') {
      let famPointer = anchorPerson.famc;
      if (!famPointer) {
        famPointer = nextFamilyId();
        familyEdits[famPointer] = { _new: true, husband: null, wife: null, children: [personId] };
        updateNewPeopleOrEdits(personId, { famc: famPointer });
        anchorPerson.famc = famPointer;
      }
      const fam = getFamilyRecord(famPointer);
      familyEdits[famPointer] = { ...(familyEdits[famPointer] || {}), children: [...(fam.children || []), newId] };
      newPerson.famc = famPointer;
    }

    newPeople[newId] = newPerson;
    localStorage.setItem(NEW_PEOPLE_KEY,   JSON.stringify(newPeople));
    localStorage.setItem(FAMILY_EDITS_KEY, JSON.stringify(familyEdits));

    await rebuildGraph();
    updateSettingsEditCount();
  }

  function handleClick(event) {
    const { mouseX, mouseY } = getMousePosition(event);

    for (const area of addRelativeAreas) {
      const dx = mouseX - area.x;
      const dy = mouseY - area.y;
      if (dx * dx + dy * dy <= area.r * area.r) {
        showAddRelativePanel(area.personId);
        return;
      }
    }

    for (const area of toggleAreas) {
      const dx = mouseX - area.x;
      const dy = mouseY - area.y;
      if (dx * dx + dy * dy <= area.r * area.r) {
        if (collapsedNodes.has(area.nodeId)) {
          collapsedNodes.delete(area.nodeId);
        } else {
          collapsedNodes.add(area.nodeId);
        }
        const toggledNode = area.nodeRef || nodeMap.get(area.nodeId);
        const effectiveMy = layoutDirection === 'LR' ? LR_MY : my;
        const beforeX = toggledNode._x * mx;
        const beforeY = toggledNode._y * effectiveMy + toggledNode.height / 2;
        recomputeLayout();
        panX += (beforeX - toggledNode._x * mx) * scale;
        panY += (beforeY - (toggledNode._y * effectiveMy + toggledNode.height / 2)) * scale;
        scheduleSave();
        redraw();
        return;
      }
    }

    let hit = false;
    coordinates.forEach(rect => {
      if (
          mouseX >= rect.x &&
          mouseX <= rect.x + rect.width &&
          mouseY >= rect.y &&
          mouseY <= rect.y + rect.height
      ) {
        showPanel(rect.id);
        hit = true;
      }
    });
    if (!hit) closePanel();
  }

  canvas.addEventListener('click', handleClick);

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }

  function onResize() {
    resizeCanvas();
    redraw();
  }

  window.addEventListener('resize', onResize);
  window.addEventListener('orientationchange', onResize);

  const homeScale = scale;
  function getHomePan() {
    const pinnedId = localStorage.getItem(PINNED_KEY);
    if (pinnedId) {
      const rect = findPersonCanvasRect(pinnedId);
      if (rect) {
        return {
          panX: window.innerWidth  / 2 - (rect.x + rect.width  / 2) * homeScale,
          panY: window.innerHeight / 2 - (rect.y + rect.height / 2) * homeScale,
        };
      }
    }
    let rootCenterX, rootCenterY;
    if (layoutDirection === 'LR') {
      rootCenterX = (root._x * mx + root.width  / 2) * homeScale;
      rootCenterY = root._y * LR_MY * homeScale;
    } else {
      rootCenterX = root._x * mx * homeScale;
      rootCenterY = (root._y * my + root.height / 2) * homeScale;
    }
    return {
      panX: window.innerWidth  / 2 - rootCenterX,
      panY: window.innerHeight / 2 - rootCenterY,
    };
  }

  // before initial draw find the coordinates of root node and pan to it
  const home = getHomePan();
  panX = home.panX;
  panY = home.panY;

  const VIEW_KEY = 'view-' + rootId;
  let saveTimer = null;
  function scheduleSave() {
    clearTimeout(saveTimer);

      if (typeof v.panX === 'number' && typeof v.panY === 'number' && typeof v.scale === 'number') {

  function applyPan(dx, dy) {

  }

  function applyZoom(factor) {
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2;
    const newScale = scale * factor;
    if (newScale < MIN_SCALE || newScale > MAX_SCALE) return;
    panX -= (cx - panX) * (factor - 1);
    panY -= (cy - panY) * (factor - 1);
    scale = newScale;
    scheduleSave();
    redraw();
  }

  function normaliseSearch(str) {
    return str.normalize('NFD').replace(/\p{Mn}/gu, '').toLowerCase();
  }

  function hideSearchSuggestions() {
    searchSuggestions.style.display = 'none';

    searchSuggestions.innerHTML = '';
    if (items.length === 0) { hideSearchSuggestions(); return; }
    items.forEach(item => {
      const li = document.createElement('li');

  function setSearchActiveIdx(idx) {
    const lis = searchSuggestions.querySelectorAll('li');
    lis.forEach((li, i) => li.classList.toggle('active', i === idx));
    activeSearchIdx = idx;
  }

  function findPersonCanvasRect(personId) {
    const fromCoords = coordinates.find(r => r.id === personId);
    if (fromCoords) return fromCoords;
    for (const node of nodeMap.values()) {
      if (!node.data) continue;
      const k = node.data.findIndex(p => p.id === personId);
      if (k === -1) continue;
      if (layoutDirection === 'LR') {
        const leftX = node._x * mx;
        const topY  = node.type === 'couple'
          ? node._y * LR_MY - COUPLE_VERT_HEIGHT / 2 + (k === 1 ? PERSON_HEIGHT + COUPLE_DIST : 0)
          : node._y * LR_MY - node.height / 2;
        return { x: leftX, y: topY, width: PERSON_WIDTH, height: PERSON_HEIGHT };
      } else {
        const leftX = node._x * mx - node.width / 2;
        return { x: leftX + k * (PERSON_WIDTH + COUPLE_DIST), y: node._y * my, width: PERSON_WIDTH, height: PERSON_HEIGHT };
      }
    }
    return null;
  }

  function selectSearchPerson(personId) {
    const rect = findPersonCanvasRect(personId);
    if (rect) {
      scale = Math.min(MAX_SCALE, Math.max(scale, 1));
      panX = window.innerWidth  / 2 - (rect.x + rect.width  / 2) * scale;
      panY = window.innerHeight / 2 - (rect.y + rect.height / 2) * scale;
      scheduleSave();

    searchInput.value = '';

    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setSearchActiveIdx(Math.max(activeSearchIdx - 1, 0));
    } else if (e.key === 'Enter') {

      const target = lis[activeSearchIdx >= 0 ? activeSearchIdx : 0];

      // shell = HTML frame + CSS + data placeholder, #app-code is empty
      const shell = shellEl.textContent.replace(/<\\\/script>/g, '<' + '/script>');

      // Inject the live JS into the shell's empty #app-code tag to produce a

      const jsContent = document.getElementById('app-code').textContent;

      // Re-embed the JS-free shell so the downloaded file can also self-export.

        .replace(

          `<script type="text/plain" id="page-shell">${escapedShell}<` + '/script>'

      relationNameB.textContent = (person.givenname + ' ' + person.surname).trim();
      relationSelectedB.style.display = 'flex';
      relationSearchB.style.display = 'none';
      relationInputB.value = '';
    }
    computeRelation();
  }

  function clearRelationSlot(slot) {
    if (slot === 'a') {
      relationA = null;
      localStorage.removeItem(RELATION_A_KEY);
      relationSelectedA.style.display = 'none';
      relationSearchA.style.display = '';
    } else {
      relationB = null;
      localStorage.removeItem(RELATION_B_KEY);
      relationSelectedB.style.display = 'none';
      relationSearchB.style.display = '';
    }
    computeRelation();
  }

  function restoreRelationSlots() {
    if (relationA && pMap[relationA]) renderRelationSlot('a', relationA);
    else { relationA = null; localStorage.removeItem(RELATION_A_KEY); }
    if (relationB && pMap[relationB]) renderRelationSlot('b', relationB);
    else { relationB = null; localStorage.removeItem(RELATION_B_KEY); }
  }

  function formatRelationLabel(label) {
    if (!label) return null;
    const { type, greats, degree, removal } = label;
    const great = (n) => (t('relation.greatPrefix')).repeat(n > 0 ? n : 0);
    switch (type) {
      case 'same':       return t('relation.same');
      case 'child':      return t('relation.child');
      case 'grandchild': return great(greats) + t('relation.grandchild');
      case 'parent':     return t('relation.parent');
      case 'grandparent':return great(greats) + t('relation.grandparent');
      case 'sibling':    return t('relation.sibling');
      case 'uncle':      return t('relation.uncle');
      case 'nephew':     return t('relation.nephew');
      case 'cousin': {
        const degStr = degree === 1 ? t('relation.cousin1st')
                     : degree === 2 ? t('relation.cousin2nd')
                     : t('relation.cousinNth', degree);
        if (removal === 0) return degStr;
        const remStr = removal === 1 ? t('relation.removed1') : t('relation.removedN', removal);
        return degStr + ', ' + remStr;
      }
      default: return null;
    }
  }

  function renderRelationSteps(path) {
    relationStepsEl.innerHTML = '';
    for (let i = 0; i < path.length; i++) {
      const id = path[i];
      const person = pMap[id];
      const name = person ? (person.givenname + ' ' + person.surname).trim() || id : id;
      const li = document.createElement('li');
      if (i < path.length - 1) {
        const next = path[i + 1];
        const nb = getNeighbours(id, pMap, fMap).find(n => n.id === next);
        const via = nb ? nb.via : '—';
        const viaLabel = via === 'parent' ? t('relation.parent')
                       : via === 'child'  ? t('relation.child')
                       : t('relation.spouse');
        li.textContent = `${name} (${viaLabel} →)`;
      } else {
        li.textContent = name;
      }
      relationStepsEl.appendChild(li);
    }
  }

  function makeRelationSuggestionHandler(slot, inputEl, suggestionsEl) {
    let activeSuggIdx = -1;

    function hideSuggestions() {
      suggestionsEl.style.display = 'none';
      activeSuggIdx = -1;
    }

    function renderSuggestions(items) {
      suggestionsEl.innerHTML = '';
      if (items.length === 0) { hideSuggestions(); return; }
      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item.year ? `${item.label} (${item.year})` : item.label;
        li.addEventListener('mousedown', e => {
          e.preventDefault();
          if (slot === 'a') { relationA = item.id; localStorage.setItem(RELATION_A_KEY, item.id); }
          else              { relationB = item.id; localStorage.setItem(RELATION_B_KEY, item.id); }
          renderRelationSlot(slot, item.id);
          hideSuggestions();
        });
        suggestionsEl.appendChild(li);
      });
      suggestionsEl.style.display = 'block';
      activeSuggIdx = -1;
    }

    inputEl.addEventListener('input', () => {
      const q = inputEl.value.trim();
      if (!q) { hideSuggestions(); return; }
      const nq = normaliseSearch(q);
      renderSuggestions(searchIndex.filter(item => normaliseSearch(item.label).includes(nq)).slice(0, 10));
    });

    inputEl.addEventListener('keydown', e => {
      const lis = suggestionsEl.querySelectorAll('li');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeSuggIdx = Math.min(activeSuggIdx + 1, lis.length - 1);
        lis.forEach((li, i) => li.classList.toggle('active', i === activeSuggIdx));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeSuggIdx = Math.max(activeSuggIdx - 1, 0);
        lis.forEach((li, i) => li.classList.toggle('active', i === activeSuggIdx));
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const target = lis[activeSuggIdx >= 0 ? activeSuggIdx : 0];
        if (target) target.dispatchEvent(new MouseEvent('mousedown'));
      } else if (e.key === 'Escape') {
        inputEl.value = '';
        hideSuggestions();
      }
    });

    inputEl.addEventListener('blur', () => setTimeout(hideSuggestions, 150));
  }

  makeRelationSuggestionHandler('a', relationInputA, relationSuggestionsA);
  makeRelationSuggestionHandler('b', relationInputB, relationSuggestionsB);

  relationClearA.addEventListener('click', () => clearRelationSlot('a'));
  relationClearB.addEventListener('click', () => clearRelationSlot('b'));

  document.getElementById('relation-swap-btn').addEventListener('click', () => {
    [relationA, relationB] = [relationB, relationA];
    localStorage.setItem(RELATION_A_KEY, relationA || '');
    localStorage.setItem(RELATION_B_KEY, relationB || '');
    if (!relationA) localStorage.removeItem(RELATION_A_KEY);
    if (!relationB) localStorage.removeItem(RELATION_B_KEY);
    // Re-render both slots from scratch
    relationSelectedA.style.display = 'none';
    relationSearchA.style.display = '';
    relationSelectedB.style.display = 'none';
    relationSearchB.style.display = '';
    if (relationA) renderRelationSlot('a', relationA);
    if (relationB) renderRelationSlot('b', relationB);
    computeRelation();
  });

  relationClearAllEl.addEventListener('click', () => {
    clearRelationSlot('a');
    clearRelationSlot('b');
  });

  relationCloseEl.addEventListener('click', () => relationPanelEl.classList.remove('open'));

  relationBtn.style.display = 'flex';
  relationBtn.addEventListener('click', () => {
    if (relationPanelEl.classList.contains('open')) {
      relationPanelEl.classList.remove('open');
    } else {
      [birthdayPanel, aboutPanel, settingsPanel, dataPanel].forEach(p => p.classList.remove('open'));
      restoreRelationSlots();
      relationPanelEl.classList.add('open');
    }
  });

  panelRelationBtn.addEventListener('click', () => {
    if (!currentPersonId) return;
    let slot;
    if (!relationA) {
      slot = 'a';
      relationA = currentPersonId;
      localStorage.setItem(RELATION_A_KEY, currentPersonId);
    } else {
      slot = 'b';
      relationB = currentPersonId;
      localStorage.setItem(RELATION_B_KEY, currentPersonId);
    }
    renderRelationSlot(slot, currentPersonId);

    // Brief visual feedback on the button
    panelRelationBtn.textContent = slot === 'a' ? t('relation.addedAsA') : t('relation.addedAsB');
    setTimeout(() => { panelRelationBtn.textContent = t('relation.addBtn'); }, 1500);
  });

  restoreRelationSlots();

  onResize();

  const savedSelected = localStorage.getItem('selected-' + rootId);
  if (savedSelected && pMap[savedSelected]) {
    panelEl.style.transition = 'none';
    showPanel(savedSelected);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      panelEl.style.transition = '';
    }));
  }
}

const loginEl = document.getElementById('login');
const passwordEl = document.getElementById('password');
const buttonEl = document.getElementById('start');

function setupCanvas() {
  loginEl.remove();
  document.getElementById('login-bg')?.remove();
  const canvas = document.createElement('canvas');
  canvas.id = 'myCanvas';
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  canvas.style.border = 'none';
  canvas.style.display = 'block'; // To remove any extra spacing (similar to using CSS reset)
  document.body.appendChild(canvas);
  return canvas;
}

if (window.familyTreeData) {
  const canvas = setupCanvas();
  main(window.familyTreeData, canvas);
} else {
  passwordEl.focus();
  passwordEl.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      buttonEl.click();
    }
  });
  buttonEl.addEventListener('click', async function () {
    const password = passwordEl.value;
    if (!password) {
      return alert('Provide password')
    }
    const button = this;
    let dotCount = 0;
    const interval = setInterval(() => {
        dotCount = (dotCount + 1) % 4; // Cycle through 0, 1, 2, 3
        let dots = '.'.repeat(dotCount); // Create a string with the appropriate number of dots
        button.textContent = `${t('login.btn')}${dots}`;
    }, 250);

    try {
      let dataString;
      const nonce = base64ToUint8Array(encryptedData.nonce);
      const cipherText = base64ToUint8Array(encryptedData.cipherText);

      const decode = async (buf) => {
        const bytes = encryptedData.compressed ? await inflate(buf) : buf;
        return new TextDecoder().decode(bytes);
      };

      if (encryptedData.slots) {
        // New multi-password format: try each slot until one opens
        for (const slot of encryptedData.slots) {
          try {
            const rawDek = await unwrapDek(slot, password, encryptedData.iterations);
            dataString = await decode(await decryptData(rawDek, nonce, cipherText));
            break;
          } catch (_) { /* wrong slot — try next */ }
        }
      } else {
        // Legacy single-password format: key derived directly from password
        const keyMaterial = await crypto.subtle.importKey(
          'raw', new TextEncoder().encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
        );
        const key = await crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: base64ToUint8Array(encryptedData.salt), iterations: encryptedData.iterations, hash: 'SHA-256' },
          keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
        );
        const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, cipherText);
        dataString = await decode(decrypted);
      }

      if (!dataString) throw new Error('no slot matched');

      const familyTreeData = JSON.parse(dataString);
      const canvas = setupCanvas();
      main(familyTreeData, canvas);
    } catch (err) {
      console.log(err);
      alert('Wrong password. Try again');
    }
    clearInterval(interval);
  });
}
