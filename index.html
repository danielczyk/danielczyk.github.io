<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Drzewo Genealogiczne</title>
  <style type="text/css">
    :root {
      --bg:          #ffffff;
      --surface:     #ffffff;
      --surface-2:   #efefef;
      --border:      #cccccc;
      --text:        #000000;
      --text-muted:  #555555;
      --text-mono:   #333333;
      --btn-primary: #333333;
      --btn-hover:   #555555;
      --btn-disabled:#999999;
      --shadow:      rgba(0,0,0,0.2);
      --nav-btn-bg:  rgba(255,255,255,0.9);
      --nav-btn-active: rgba(220,220,220,0.95);
    }
    body.dark {
      --bg:          #16213e;
      --surface:     #1f2d47;
      --surface-2:   #0f3460;
      --border:      #3a4a6b;
      --text:        #e0e0e0;
      --text-muted:  #9aaabb;
      --text-mono:   #b0c0d0;
      --btn-primary: #4a90d9;
      --btn-hover:   #6aaaf0;
      --btn-disabled:#556070;
      --shadow:      rgba(0,0,0,0.5);
      --nav-btn-bg:  rgba(31,45,71,0.95);
      --nav-btn-active: rgba(15,52,96,0.95);
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
    }
    #login-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      opacity: 0.8;
      pointer-events: none;
    }
    #login {
      position: relative;
      z-index: 1;
      background-color: var(--surface-2);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 24px var(--shadow);
    }
    #login input {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 14px;
    }
    #login button {
      background: var(--btn-primary);
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-left: 6px;
    }
    #login button:hover { background: var(--btn-hover); }
    #myCanvas {
      cursor: pointer;
    }
    #person-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      background: var(--surface);
      color: var(--text);
      box-shadow: -2px 0 8px var(--shadow);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 30;
    }
    #person-panel.open {
      transform: translateX(0);
    }
    #panel-close {
      font-size: 24px;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }
    #panel-img {
      width: 100%;
      max-width: 200px;
      display: block;
      margin: 0 auto 16px;
      border-radius: 4px;
    }
    #panel-name {
      text-align: center;
      margin: 0 0 12px;
      font-size: 18px;
      font-family: Arial, sans-serif;
      color: var(--text);
    }
    #panel-id {
      text-align: center;
      margin: -8px 0 10px;
      font-size: 11px;
      font-family: Monaco, monospace;
      color: var(--text-muted);
    }
    #panel-details p {
      margin: 4px 0;
      font-size: 13px;
      font-family: Monaco, monospace;
      color: var(--text-mono);
    }
    #nav-widget {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 5;
      display: none;
      flex-direction: row;
      gap: 6px;
      align-items: center;
      will-change: transform;
    }
    #nav-widget.visible {
      display: flex;
    }
    .nav-zoom {
      display: flex;
      flex-direction: row;
      gap: 6px;
    }
    #nav-widget button {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--nav-btn-bg);
      color: var(--text);
      box-shadow: 0 1px 4px var(--shadow);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      touch-action: none;
      user-select: none;
    }
    #nav-widget button:active {
      background: var(--nav-btn-active);
    }
    #birthday-btn,
    #about-btn,
    #settings-btn,
    #data-btn {
      position: fixed;
      right: 16px;
      z-index: 5;
      display: none;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--nav-btn-bg);
      color: var(--text);
      box-shadow: 0 1px 4px var(--shadow);
      cursor: pointer;
      font-size: 18px;
      align-items: center;
      justify-content: center;
      will-change: transform;
    }
    #birthday-btn { top: 16px; right: 148px; position: fixed; }
    #about-btn    { top: 16px; right: 104px; }
    #settings-btn { top: 16px; right: 60px; }
    #data-btn     { top: 16px; right: 16px; }
    #birthday-btn.visible,
    #about-btn.visible,
    #settings-btn.visible,
    #data-btn.visible {
      display: flex;
    }
    #data-badge {
      display: none;
      position: absolute;
      top: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      background: #e74c3c;
      border-radius: 50%;
      pointer-events: none;
    }
    #birthday-panel,
    #about-panel,
    #settings-panel,
    #data-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 300px;
      height: 100%;
      background: var(--surface);
      color: var(--text);
      box-shadow: -2px 0 8px var(--shadow);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 30;
    }
    #birthday-panel.open,
    #about-panel.open,
    #settings-panel.open,
    #data-panel.open {
      transform: translateX(0);
    }
    #birthday-close,
    #about-close,
    #settings-close,
    #data-close {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 24px;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      line-height: 1;
    }
    #birthday-panel h2,
    #about-panel h2,
    #settings-panel h2,
    #data-panel h2 {
      font-family: Arial, sans-serif;
      font-size: 16px;
      margin: 0 0 16px;
      padding-right: 24px;
      color: var(--text);
    }
    #birthday-panel hr,
    #about-panel hr,
    #settings-panel hr,
    #data-panel hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }
    #data-panel label {
      display: block;
      font-family: Arial, sans-serif;
      font-size: 12px;
      margin-bottom: 4px;
      color: var(--text-muted);
    }
    #data-panel input[type="text"],
    #data-panel input[type="email"],
    #data-panel textarea {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      font-size: 13px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: Arial, sans-serif;
      background: var(--surface-2);
      color: var(--text);
    }
    #data-panel textarea {
      resize: vertical;
      min-height: 72px;
    }
    #data-panel input[type="file"] {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    #data-panel h3 {
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 6px;
      color: var(--text);
    }
    .data-panel-desc {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      margin: 0 0 10px;
      line-height: 1.5;
    }
    .data-panel-accordion {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      margin: 0 0 0;
    }
    .data-panel-accordion::after {
      content: '▸';
      font-size: 11px;
      color: var(--text-muted);
      transition: transform 0.15s ease;
    }
    .data-panel-accordion.open::after {
      transform: rotate(90deg);
    }
    .data-panel-accordion-body {
      display: none;
      margin-top: 12px;
    }
    .data-panel-accordion-body.open {
      display: block;
    }
    #data-panel button:not(#data-close) {
      padding: 9px;
      font-size: 13px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      box-sizing: border-box;
    }
    #settings-merge-btn {
      width: 100%;
      background: var(--btn-primary);
      color: #fff;
    }
    #settings-merge-btn:hover    { background: var(--btn-hover); }
    #settings-merge-btn:disabled { background: var(--btn-disabled); cursor: default; }
    #settings-merge-status {
      margin-top: 8px;
      font-size: 11px;
      font-family: Arial, sans-serif;
      color: var(--text-muted);
      min-height: 16px;
      white-space: pre-line;
      line-height: 1.5;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
    }
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--btn-primary); }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }
    #panel-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 8px;
      min-height: 32px;
    }
    #panel-edit-btn,
    #panel-crosshair-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 7px;
      font-size: 12px;
      font-family: Arial, sans-serif;
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }
    #panel-edit-btn {
      background: var(--btn-primary, #3498db);
      color: #fff;
      border-color: var(--btn-primary, #3498db);
      font-weight: 600;
    }
    #panel-edit-btn:hover { background: var(--btn-hover, #2980b9); border-color: var(--btn-hover, #2980b9); color: #fff; }
    #panel-crosshair-btn:hover { color: var(--text); border-color: var(--text-muted); }
    #panel-crosshair-btn.pinned { color: var(--btn-primary, #3498db); border-color: var(--btn-primary, #3498db); }
    #panel-img-wrap {
      position: relative;
      width: fit-content;
      margin: 0 auto 4px;
    }
    #panel-img-edit-btn {
      display: none;
      width: 100%;
      max-width: 200px;
      margin: 0 auto 4px;
      box-sizing: border-box;
      gap: 6px;
      justify-content: center;
    }
    #panel-img-change-label {
      flex: 1;
      padding: 5px;
      background: var(--surface-2);
      border: 1px dashed var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 12px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      text-align: center;
    }
    #panel-img-change-label:hover { color: var(--text); border-color: var(--text-muted); }
    #panel-img-remove-btn {
      padding: 5px 8px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 12px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      white-space: nowrap;
    }
    #panel-img-remove-btn:hover { color: #c0392b; border-color: #c0392b; }
    #panel-edit-form {
      font-family: Arial, sans-serif;
    }
    #panel-edit-form label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
      margin-top: 8px;
    }
    #panel-edit-form input[type="text"],
    #panel-edit-form select {
      width: 100%;
      box-sizing: border-box;
      font-size: 13px;
      padding: 5px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface-2);
      color: var(--text);
      font-family: Monaco, monospace;
    }
    .edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .edit-actions button {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-family: Arial, sans-serif;
    }
    #edit-save-btn,
    #add-relative-save   { background: var(--btn-primary); color: #fff; }
    #edit-save-btn:hover,
    #add-relative-save:hover { background: var(--btn-hover); }
    #add-relative-save:disabled { background: var(--btn-disabled); cursor: default; }
    #edit-cancel-btn,
    #add-relative-cancel { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .settings-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .settings-row button {
      flex: 1;
    }
    #settings-send-webhook { width: 100%; background: var(--btn-primary); color: #fff; }
    #settings-send-webhook:hover:not(:disabled) { background: var(--btn-hover); }
    #settings-send-webhook:disabled { background: var(--btn-disabled); cursor: default; }
    #webhook-email-error { font-size: 11px; font-family: Arial, sans-serif; color: #c0392b; margin: -6px 0 8px; min-height: 14px; }
    #settings-download-edits { width: 100%; background: var(--btn-primary); color: #fff; }
    #export-html-btn { width: 100%; background: var(--btn-primary); color: #fff; }
    #export-html-btn:hover { background: var(--btn-hover); }
    #export-html-btn:disabled { background: var(--btn-disabled); cursor: default; }
    #export-password-error {
      font-size: 11px;
      font-family: Arial, sans-serif;
      margin: 2px 0 6px;
      color: #c0392b;
      min-height: 14px;
    }
    #export-html-status {
      font-size: 11px;
      font-family: Arial, sans-serif;
      margin: 4px 0 0;
      color: var(--text-muted);
    }
    #settings-download-edits:hover { background: var(--btn-hover); }
    #settings-reset-edits { background: #c0392b; color: #fff; border: none; }
    #settings-reset-edits:hover { background: #a93226; }
    #settings-edit-count {
      font-size: 11px;
      font-family: Arial, sans-serif;
      color: var(--text-muted);
      margin: 4px 0 0;
      line-height: 1.5;
    }
    #settings-edit-count ul {
      margin: 4px 0 0;
      padding: 0 0 0 14px;
      list-style: disc;
    }
    #settings-edit-count li {
      margin: 1px 0;
      color: var(--text);
    }
    #crop-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #crop-canvas {
      display: block;
      border-radius: 8px;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
    #crop-canvas:active { cursor: grabbing; }
    #crop-actions {
      display: flex;
      gap: 10px;
    }
    #crop-actions button {
      padding: 9px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      cursor: pointer;
    }
    #crop-cancel  { background: rgba(255,255,255,0.15); color: #fff; }
    #crop-cancel:hover { background: rgba(255,255,255,0.25); }
    #crop-zoom-out,
    #crop-zoom-in { background: rgba(255,255,255,0.15); color: #fff; font-size: 20px; padding: 7px 16px; }
    #crop-zoom-out:hover,
    #crop-zoom-in:hover { background: rgba(255,255,255,0.25); }
    #crop-apply   { background: var(--btn-primary); color: #fff; }
    #crop-apply:hover { background: var(--btn-hover); }
    #conflict-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 201;
      align-items: center;
      justify-content: center;
    }
    #conflict-box {
      background: var(--surface);
      color: var(--text);
      padding: 24px;
      border-radius: 8px;
      max-width: 560px;
      width: calc(100vw - 48px);
      max-height: 80vh;
      overflow-y: auto;
      font-family: Arial, sans-serif;
      box-shadow: 0 4px 24px var(--shadow);
    }
    #conflict-box h2 { margin: 0 0 8px; font-size: 18px; }
    #conflict-summary { margin: 0 0 16px; color: var(--text-muted); font-size: 13px; }
    .conflict-row {
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }
    .conflict-row:last-of-type { border-bottom: none; }
    .conflict-person { font-weight: bold; font-size: 14px; margin-bottom: 2px; }
    .conflict-field { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .conflict-choice {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      cursor: pointer;
    }
    .conflict-choice input { margin-right: 6px; cursor: pointer; }
    .conflict-choice strong { color: var(--text); }
    #conflict-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    #conflict-done {
      background: var(--btn-primary);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      margin-left: auto;
    }
    #conflict-done:hover { background: var(--btn-hover); }
    #conflict-keep-all,
    #conflict-accept-all {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
    }
    #conflict-keep-all:hover,
    #conflict-accept-all:hover { color: var(--text); border-color: var(--text-muted); }
    #panel-remove-btn {
      display: none;
      margin-top: 40px;
      width: 100%;
      padding: 10px;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      cursor: pointer;
    }
    #panel-remove-btn:hover { background: #a93226; }
    #search-container {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: 280px;
      display: none;
    }
    #search-container.visible { display: block; }
    #search-input {
      width: 100%;
      box-sizing: border-box;
      height: 36px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--nav-btn-bg);
      color: var(--text);
      font-size: 14px;
      font-family: Arial, sans-serif;
      outline: none;
      box-shadow: 0 1px 4px var(--shadow);
    }
    #search-input:focus { border-color: var(--btn-primary); }
    #search-suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 0;
      margin: 0;
      list-style: none;
      max-height: 260px;
      overflow-y: auto;
      box-shadow: 0 4px 12px var(--shadow);
    }
    #search-suggestions li {
      padding: 8px 12px;
      font-size: 13px;
      font-family: Arial, sans-serif;
      color: var(--text);
      cursor: pointer;
    }
    #search-suggestions li:hover,
    #search-suggestions li.active { background: var(--surface-2); }
    #remove-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 201;
      align-items: center;
      justify-content: center;
    }
    #remove-modal-box {
      background: var(--surface);
      color: var(--text);
      padding: 24px;
      border-radius: 8px;
      max-width: 360px;
      width: calc(100vw - 48px);
      font-family: Arial, sans-serif;
      box-shadow: 0 4px 24px var(--shadow);
    }
    #remove-modal-box p { margin: 0 0 20px; font-size: 15px; line-height: 1.4; }
    #remove-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    #remove-modal-cancel {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    #remove-modal-cancel:hover { color: var(--text); border-color: var(--text-muted); }
    #remove-modal-confirm {
      background: #c0392b;
      color: #fff;
      border: none;

    <input
      id="password"
      name="password"
      type="password"
      autocomplete="new-password"
      autocorrect="off"
      autocapitalize="none"
      spellcheck="false"
      inputmode="text"
      required
      data-i18n-placeholder="login.placeholder"

  <script type="text/plain" id="page-shell"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Drzewo Genealogiczne</title>
  <style type="text/css">
    :root {
      --bg:          #ffffff;
      --surface:     #ffffff;
      --surface-2:   #efefef;
      --border:      #cccccc;
      --text:        #000000;
      --text-muted:  #555555;
      --text-mono:   #333333;
      --btn-primary: #333333;
      --btn-hover:   #555555;
      --btn-disabled:#999999;
      --shadow:      rgba(0,0,0,0.2);
      --nav-btn-bg:  rgba(255,255,255,0.9);
      --nav-btn-active: rgba(220,220,220,0.95);
    }
    body.dark {
      --bg:          #16213e;
      --surface:     #1f2d47;
      --surface-2:   #0f3460;
      --border:      #3a4a6b;
      --text:        #e0e0e0;
      --text-muted:  #9aaabb;
      --text-mono:   #b0c0d0;
      --btn-primary: #4a90d9;
      --btn-hover:   #6aaaf0;
      --btn-disabled:#556070;
      --shadow:      rgba(0,0,0,0.5);
      --nav-btn-bg:  rgba(31,45,71,0.95);
      --nav-btn-active: rgba(15,52,96,0.95);
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
    }
    #login-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      opacity: 0.8;
      pointer-events: none;
    }
    #login {
      position: relative;
      z-index: 1;
      background-color: var(--surface-2);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 24px var(--shadow);
    }
    #login input {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 14px;
    }
    #login button {
      background: var(--btn-primary);
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-left: 6px;
    }
    #login button:hover { background: var(--btn-hover); }
    #myCanvas {
      cursor: pointer;
    }
    #person-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      background: var(--surface);
      color: var(--text);
      box-shadow: -2px 0 8px var(--shadow);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 30;
    }
    #person-panel.open {
      transform: translateX(0);
    }
    #panel-close {
      font-size: 24px;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }
    #panel-img {
      width: 100%;
      max-width: 200px;
      display: block;
      margin: 0 auto 16px;
      border-radius: 4px;
    }
    #panel-name {
      text-align: center;
      margin: 0 0 12px;
      font-size: 18px;
      font-family: Arial, sans-serif;
      color: var(--text);
    }
    #panel-id {
      text-align: center;
      margin: -8px 0 10px;
      font-size: 11px;
      font-family: Monaco, monospace;
      color: var(--text-muted);
    }
    #panel-details p {
      margin: 4px 0;
      font-size: 13px;
      font-family: Monaco, monospace;
      color: var(--text-mono);
    }
    #nav-widget {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 5;
      display: none;
      flex-direction: row;
      gap: 6px;
      align-items: center;
      will-change: transform;
    }
    #nav-widget.visible {
      display: flex;
    }
    .nav-zoom {
      display: flex;
      flex-direction: row;
      gap: 6px;
    }
    #nav-widget button {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--nav-btn-bg);
      color: var(--text);
      box-shadow: 0 1px 4px var(--shadow);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      touch-action: none;
      user-select: none;
    }
    #nav-widget button:active {
      background: var(--nav-btn-active);
    }
    #birthday-btn,
    #about-btn,
    #settings-btn,
    #data-btn {
      position: fixed;
      right: 16px;
      z-index: 5;
      display: none;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--nav-btn-bg);
      color: var(--text);
      box-shadow: 0 1px 4px var(--shadow);
      cursor: pointer;
      font-size: 18px;
      align-items: center;
      justify-content: center;
      will-change: transform;
    }
    #birthday-btn { top: 16px; right: 148px; position: fixed; }
    #about-btn    { top: 16px; right: 104px; }
    #settings-btn { top: 16px; right: 60px; }
    #data-btn     { top: 16px; right: 16px; }
    #birthday-btn.visible,
    #about-btn.visible,
    #settings-btn.visible,
    #data-btn.visible {
      display: flex;
    }
    #data-badge {
      display: none;
      position: absolute;
      top: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      background: #e74c3c;
      border-radius: 50%;

      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: var(--surface-2);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .relation-thumb {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .relation-name {
      flex: 1;
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .relation-clear-slot {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      flex-shrink: 0;
    }
    .relation-clear-slot:hover { color: var(--text); }
    .relation-search-box {
      position: relative;
    }
    .relation-search-input {
      width: 100%;
      box-sizing: border-box;
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text);
      font-size: 13px;
      font-family: Arial, sans-serif;
      outline: none;
    }
    .relation-search-input:focus { border-color: var(--btn-primary); }
    .relation-suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 0;
      margin: 0;
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 4px 12px var(--shadow);
      z-index: 10;
    }
    .relation-suggestions li {
      padding: 7px 10px;
      font-size: 13px;
      font-family: Arial, sans-serif;
      color: var(--text);
      cursor: pointer;
    }
    .relation-suggestions li:hover,
    .relation-suggestions li.active { background: var(--surface-2); }
    #relation-result {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    #relation-summary {
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 12px;
      line-height: 1.4;
    }
    #relation-steps {
      margin: 6px 0 0 0;
      padding: 0 0 0 18px;
      color: var(--text);
      line-height: 1.8;
    }
    #relation-clear-all {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-family: Arial, sans-serif;
      cursor: pointer;
    }
    #relation-clear-all:hover { color: var(--text); border-color: var(--text-muted); }
    #panel-relation-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 7px;
      font-size: 12px;
      font-family: Arial, sans-serif;
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }
    #panel-relation-btn:hover { color: var(--text); border-color: var(--text-muted); }
    @media (max-width: 600px) {
      #search-container {
        top: 62px;
        left: 16px;
        right: 16px;
        width: auto;
        transform: none;
      }
      #person-panel,
      #add-relative-panel,
      #birthday-panel,
      #about-panel,
      #settings-panel,
      #data-panel,
      #relation-panel {
        width: 100%;
      }
    }
  </style>
</head>

// ── ID scanning ──────────────────────────────────────────────────────────────

function scanIdRange(text) {
  const re = /(@I|@F)(\d+)@/g;
  let minPerson = Infinity, maxPerson = -Infinity;
  let minFamily = Infinity, maxFamily = -Infinity;

    const n = parseInt(m[2], 10);
    if (m[1] === '@I') {
      if (n < minPerson) minPerson = n;
      if (n > maxPerson) maxPerson = n;
    } else {
      if (n < minFamily) minFamily = n;
      if (n > maxFamily) maxFamily = n;
    }
  }

// ── ID shifting ───────────────────────────────────────────────────────────────

        else if (p.tag === 'FAMS')  { person.fams = p.data; }

        else if (p.tag === 'SEX')   { person.sex = p.data; }

    contourMap[node._x] = node._y + modSum;
  } else {
    contourMap[node._x] = Math.max(contourMap[node._x], node._y + modSum);
  }
  modSum += node._modY;
  for (const child of node.children) lrGetBottomContour(child, modSum, contourMap);
}

function lrCenterNodesBetween(topNode, bottomNode) {
  const children = topNode._parent.children;
  const topIndex = children.indexOf(topNode);
  const bottomIndex = children.indexOf(bottomNode);
  const numNodesBetween = (bottomIndex - topIndex) - 1;
  if (numNodesBetween > 0) {
    const distanceBetweenNodes = (bottomNode._y - topNode._y) / (numNodesBetween + 1);
    let count = 1;
    for (let i = topIndex + 1; i < bottomIndex; i++) {
      const middleNode = children[i];
      const desiredY = topNode._y + (distanceBetweenNodes * count);
      const offset = desiredY - middleNode._y;
      if (offset > 0) {
        middleNode._y += offset;
        middleNode._modY += offset;
      }
      count++;
    }
    lrCheckForConflicts(bottomNode);
  }
}

function lrCheckForConflicts(node) {
  const minDistance = LR_TREE_DISTANCE + LR_NODE_SIZE;
  let shiftValue = 0;
  const nodeContourMap = {};
  lrGetTopContour(node, 0, nodeContourMap);
  let sibling = node.getLeftMostSibling(); // "leftmost" = topmost in LR orientation
  while (sibling !== null && sibling !== node) {
    const siblingContourMap = {};
    lrGetBottomContour(sibling, 0, siblingContourMap);
    const maxLevel = Math.min(
      Math.max(...Object.keys(siblingContourMap)),
      Math.max(...Object.keys(nodeContourMap))
    );
    for (let level = node._x + 1; level <= maxLevel; level++) {
      const distance = nodeContourMap[level] - siblingContourMap[level];
      if (distance + shiftValue < minDistance) shiftValue = minDistance - distance;
    }
    if (shiftValue > 0) {
      node._y += shiftValue;
      node._modY += shiftValue;
      lrCenterNodesBetween(sibling, node);
      shiftValue = 0;
    }
    sibling = sibling.getNextSibling();
  }
}

function lrCalculateInitialY(node) {
  for (const child of node.children) lrCalculateInitialY(child);

  if (node.isLeaf()) {
    node._y = node.isLeftMost() ? 0 : node.getPreviousSibling()._y + LR_NODE_SIZE + LR_SIBLING_DISTANCE;
  } else if (node.children.length === 1) {
    if (node.isLeftMost()) {
      node._y = node.children[0]._y;
    } else {
      node._y = node.getPreviousSibling()._y + LR_NODE_SIZE + LR_SIBLING_DISTANCE;
      node._modY = node._y - node.children[0]._y;
    }
  } else {
    const topChild    = node.getLeftMostChild();
    const bottomChild = node.getRightMostChild();
    const mid = (topChild._y + bottomChild._y) / 2;
    if (node.isLeftMost()) {
      node._y = mid;
    } else {
      node._y = node.getPreviousSibling()._y + LR_NODE_SIZE + LR_SIBLING_DISTANCE;
      node._modY = node._y - mid;
    }
  }

  if (node.children.length > 0 && !node.isLeftMost()) lrCheckForConflicts(node);
}

function lrCheckAllChildrenOnScreen(node) {
  const nodeContourMap = {};
  lrGetTopContour(node, 0, nodeContourMap);
  let shiftAmount = 0;
  for (const x of Object.keys(nodeContourMap)) {
    if (nodeContourMap[x] + shiftAmount < 0) shiftAmount = nodeContourMap[x] * -1;
  }
  if (shiftAmount > 0) {
    node._y += shiftAmount;
    node._modY += shiftAmount;
  }
}

function lrCalculateFinalPositions(node, modSum) {
  node._y += modSum;
  modSum += node._modY;
  for (const child of node.children) lrCalculateFinalPositions(child, modSum);
}

function lrInitializeDepth(node, depth) {
  node._x = depth;  // depth IS the x coordinate in LR layout
  node._y = -1;
  node._modY = 0;
  for (const child of node.children) lrInitializeDepth(child, depth + 1);
}

function computeLayoutLR(rootNode) {
  lrInitializeDepth(rootNode, 0);
  lrCalculateInitialY(rootNode);
  lrCheckAllChildrenOnScreen(rootNode);
  lrCalculateFinalPositions(rootNode, 0);
}

if (typeof module !== 'undefined' && typeof module.exports !== 'undefined') {
  module.exports = { computeLayoutLR };

class Indyvidual {
  constructor(rootId, data) {
    this.rootId = rootId;
    this.id = data.pointer;
    this.fullname = data.fullname;
    this.givenname = data.givenname;
    this.surname = data.surname;
    this.famc = data.famc;
    this.fams = data.fams;
    this.dob = data.date_of_birth;
    this.dod = data.date_of_death;
    this.placeOfBirth = data.place_of_birth;
    this.sex = data.sex;
    const placeholder = data.sex === 'F' ? placeholderFemale : placeholderMale;
    this.placeholderBase64Img = placeholder;
    this.base64Img = data.img || placeholder;
  }

  async init() {
    if (!this.base64Img) {
      return
    }
    const img = new Image();
    img.src = this.base64Img;
    return new Promise((resolve) => {
      img.onload = () => {
        this.img = img
        resolve();
      };
      img.onerror = () => {
        resolve();
      };
    })
  }

  setX(x) {
    this._x = x
  }
  setY(y) {
    this._y = y
  }

  findPartners() {
    const partners = []
    for (const f of Object.values(fMap)) {
      if (f.wife === this.id && f.husband && pMap[f.husband]) {
        partners.push(pMap[f.husband])
      } else if (f.husband === this.id && f.wife && pMap[f.wife]) {
        partners.push(pMap[f.wife])
      }
    }
    // TODO: later improve sorting and sort by date of mariage if available
    partners.sort((p1, p2) => compareDatesDob(p1, p2))
    return partners;
  }

  isDesedantOfRoot(){
    if (this.id === this.rootId) {
      return true;
    }
    if (!this.famc || !fMap[this.famc]) {
      return false
    }
    let famc = fMap[this.famc];
    let motherD = false
    let fatherD = false

    const motherId = famc.wife;
    if (motherId && pMap[motherId]) {
      const mother = pMap[motherId];
      motherD = mother.isDesedantOfRoot();
    }
    const fatherId = famc.husband;
    if (fatherId && pMap[fatherId]) {
      const father = pMap[fatherId];
      fatherD = father.isDesedantOfRoot()
    }
    return motherD || fatherD
  }

  getDistanceFromRoot() {
    if (this._distance !== undefined) {
      return this._distance;
    }
    if (this.id === this.rootId) {
      return 0;
    }
    if (!this.famc || !fMap[this.famc]) {
      return undefined
    }
    let famc = fMap[this.famc];
    const motherId = famc.wife;
    if (motherId && pMap[motherId]) {
      const mother = pMap[motherId]
      if (mother.isDesedantOfRoot()) {
        this._distance = mother.getDistanceFromRoot() + 1;
        return this._distance;
      }
    }
    const fatherId = famc.husband;
    if (fatherId && pMap[fatherId]) {
      const father = pMap[fatherId];
      if (father.isDesedantOfRoot()) {
        this._distance = father.getDistanceFromRoot() + 1;
        return this._distance;
      }
    }
    return -1;
  }
}

    Indyvidual

    const MONTH_MAP = {
  // GEDCOM standard (English 3-letter abbreviations)
  JAN:1, FEB:2, MAR:3, APR:4, MAY:5, JUN:6,
  JUL:7, AUG:8, SEP:9, OCT:10, NOV:11, DEC:12,
  // Polish — abbreviated (diacritics already stripped via normToken)
  STY:1, LUT:2, /* MAR already above */ KWI:4, MAJ:5, CZE:6,
  LIP:7, SIE:8, WRZ:9, PAZ:10, LIS:11, GRU:12,
  // Polish — full nominative (diacritics stripped)
  STYCZEN:1, LUTY:2, MARZEC:3, KWIECIEN:4, CZERWIEC:6,
  LIPIEC:7, SIERPIEN:8, WRZESIEN:9, PAZDZIERNIK:10, LISTOPAD:11, GRUDZIEN:12,
  // Polish — genitive (the form most commonly used when writing dates: "20 maja 1979")
  STYCZNIA:1, LUTEGO:2, MARCA:3, KWIETNIA:4, MAJA:5, CZERWCA:6,
  LIPCA:7, SIERPNIA:8, WRZESNIA:9, PAZDZIERNIKA:10, LISTOPADA:11, GRUDNIA:12,
};

const QUALIFIER_MAP = { ABT:'~', EST:'~', CAL:'~', BEF:'<', AFT:'>' };

function pad2(n) { return String(n).padStart(2, '0'); }

// Strip diacritics and uppercase — handles Polish ą ę ó ś ź ż ć ń ł ź
function normToken(s) {
  return s.normalize('NFD').replace(/\p{Mn}/gu, '').toUpperCase();
}

function parseParts(str) {
  if (!str) return null;
  const tokens = str.trim().replace(/[\/\.]/g, ' ').split(/\s+/).map(normToken);
  let day, month, year;
  for (const tok of tokens) {
    if (MONTH_MAP[tok]) {
      month = MONTH_MAP[tok];
    } else if (/^\d{4}$/.test(tok)) {
      year = parseInt(tok, 10);
    } else if (/^\d{1,2}$/.test(tok)) {
      if (day === undefined)        day   = parseInt(tok, 10);
      else if (month === undefined) month = parseInt(tok, 10);
    }
  }
  if (!year) return null;
  return { day, month, year };
}

function parseGedcomDate(str) {
  if (!str || typeof str !== 'string') return null;
  let s = str.trim();

  // INT — strip keyword and trailing bracketed annotation
  if (/^INT\s+/i.test(s)) {
    s = s.replace(/^INT\s+/i, '').replace(/\s*\([^)]*\)\s*$/, '').trim();
    return parseParts(s);
  }

  // BET ... AND ...
  const betMatch = s.match(/^BET\s+(.+?)\s+AND\s+(.+)$/i);
  if (betMatch) {
    const from = parseParts(betMatch[1]);
    const to   = parseParts(betMatch[2]);
    if (from || to) return { rangeFrom: from, rangeTo: to };
    return null;
  }

  // FROM ... TO ...
  const fromMatch = s.match(/^FROM\s+(.+?)\s+TO\s+(.+)$/i);
  if (fromMatch) {
    const from = parseParts(fromMatch[1]);
    const to   = parseParts(fromMatch[2]);
    if (from || to) return { rangeFrom: from, rangeTo: to };
    return null;
  }

  // Qualifier prefix
  const qualMatch = s.match(/^(ABT|EST|CAL|BEF|AFT)\s+(.+)$/i);
  if (qualMatch) {
    const qualifier = QUALIFIER_MAP[qualMatch[1].toUpperCase()];
    const parts = parseParts(qualMatch[2]);
    if (!parts) return null;
    return { qualifier, ...parts };
  }

  return parseParts(s);
}

function formatParts(parts) {
  if (!parts || !parts.year) return null;
  if (parts.day && parts.month) return `${pad2(parts.day)}-${pad2(parts.month)}-${parts.year}`;
  if (parts.month)              return `${pad2(parts.month)}-${parts.year}`;
  return String(parts.year);
}

// Returns a display string. Falls back to the original string for unrecognised input.
function formatGedcomDate(str) {
  const parsed = parseGedcomDate(str);
  if (!parsed) return str || '';

  if (parsed.rangeFrom !== undefined) {
    const from = formatParts(parsed.rangeFrom);
    const to   = formatParts(parsed.rangeTo);
    if (from && to) return `${from}–${to}`;
    return from || to || (str || '');
  }

  const base = formatParts(parsed);
  if (!base) return str || '';
  return parsed.qualifier ? parsed.qualifier + base : base;
}

// Returns an ISO-ish sort key: "YYYY", "YYYY-MM", or "YYYY-MM-DD". Empty string if unparseable.
function gedcomDateSortKey(str) {
  const parsed = parseGedcomDate(str);
  if (!parsed) return '';
  const parts = parsed.rangeFrom || parsed;
  if (!parts || !parts.year) return '';
  const segs = [String(parts.year)];
  if (parts.month) segs.push(pad2(parts.month));
  if (parts.month && parts.day) segs.push(pad2(parts.day));
  return segs.join('-');
}

if (typeof module !== 'undefined') module.exports = { parseGedcomDate, formatGedcomDate, gedcomDateSortKey };


    function getNeighbours(personId, pMap, fMap) {
  const person = pMap[personId];
  if (!person) return [];
  const results = [];
  for (const famsPointer of [].concat(person.fams || [])) {
    const fam = fMap[famsPointer];
    if (!fam) continue;
    if (fam.husband && fam.husband !== personId && pMap[fam.husband])
      results.push({ id: fam.husband, via: 'spouse' });
    if (fam.wife && fam.wife !== personId && pMap[fam.wife])
      results.push({ id: fam.wife, via: 'spouse' });
    for (const childId of (fam.children || [])) {
      if (pMap[childId]) results.push({ id: childId, via: 'child' });
    }
  }
  const famc = person.famc ? fMap[person.famc] : null;
  if (famc) {
    if (famc.husband && pMap[famc.husband]) results.push({ id: famc.husband, via: 'parent' });
    if (famc.wife    && pMap[famc.wife   ]) results.push({ id: famc.wife,   via: 'parent' });
  }
  return results;
}

function findRelationPath(fromId, toId, pMap, fMap) {
  if (fromId === toId) return [fromId];
  const visited = new Set([fromId]);
  const queue = [[fromId]];
  while (queue.length) {
    const path = queue.shift();
    if (path.length > 20) continue;
    const current = path[path.length - 1];
    for (const { id } of getNeighbours(current, pMap, fMap)) {
      if (visited.has(id)) continue;
      const newPath = [...path, id];
      if (id === toId) return newPath;
      visited.add(id);
      queue.push(newPath);
    }
  }
  return null;
}

function classifyPath(path, pMap, fMap) {
  const steps = [];
  for (let i = 0; i < path.length - 1; i++) {
    const xId = path[i];
    const yId = path[i + 1];
    const x = pMap[xId];
    const famcOfX = x && x.famc ? fMap[x.famc] : null;
    if (famcOfX && (famcOfX.husband === yId || famcOfX.wife === yId)) {
      steps.push('UP');
    } else {
      const isChild = [].concat((x && x.fams) || []).some(
        fp => fMap[fp] && (fMap[fp].children || []).includes(yId)
      );
      steps.push(isChild ? 'DOWN' : 'SPOUSE');
    }
  }
  const lastUp    = steps.lastIndexOf('UP');
  const pivotIdx  = lastUp === -1 ? 0 : lastUp + 1;
  const genA = steps.slice(0, pivotIdx).filter(s => s === 'UP').length;
  const genB = steps.slice(pivotIdx).filter(s => s === 'DOWN').length;
  const hasSpouseLink = steps.includes('SPOUSE');
  return { genA, genB, pivotIdx, hasSpouseLink, steps };
}

// Returns a structured label object — translate to human text in the caller.
// type: 'same'|'child'|'grandchild'|'parent'|'grandparent'|'sibling'|'uncle'|'nephew'|'cousin'
// grandchild/grandparent include `greats` (0=grand, 1=great-grand, …)
// cousin includes `degree` (1=first, 2=second, …) and `removal` (0, 1, …)
// genA = steps from A UP to the LCA; genB = steps from LCA DOWN to B.
// The returned label describes what A IS from B's perspective
// (for use in the template "{A} is {B}'s {label}").
function formalRelationshipLabel(genA, genB) {
  if (genA === 0 && genB === 0) return { type: 'same' };
  // A is an ancestor of B — A is above B
  if (genA === 0 && genB === 1) return { type: 'parent' };
  if (genA === 0) return { type: 'grandparent', greats: genB - 2 };
  // A is a descendant of B — A is below B
  if (genB === 0 && genA === 1) return { type: 'child' };
  if (genB === 0) return { type: 'grandchild', greats: genA - 2 };
  if (genA === 1 && genB === 1) return { type: 'sibling' };
  if (genA === 1 && genB === 2) return { type: 'uncle' };
  if (genA === 2 && genB === 1) return { type: 'nephew' };
  const degree  = Math.min(genA, genB) - 1;
  const removal = Math.abs(genA - genB);
  return { type: 'cousin', degree, removal };
}

if (typeof module !== 'undefined' && typeof module.exports !== 'undefined') {
  module.exports = { getNeighbours, findRelationPath, classifyPath, formalRelationshipLabel };
}

function drawParentsChildEdge(
  ctx,
  p1x, p1y,
  p2x, p2y,
  p3x, p3y,
  p4x, p4y,
  color, radius = 10, round
) {
  ctx.beginPath();
  ctx.moveTo(p1x, p1y);
  ctx.lineTo(p2x, p2y);
  if (round && p3x !== p2x) {
    if (p3x > p2x) {
      ctx.lineTo(p3x - radius, p3y);
    } else {
      ctx.lineTo(p3x + radius, p3y);
    }
    ctx.arcTo(p3x, p3y, p4x, p4y, radius);
    ctx.lineTo(p4x, p4y);
  } else {
    ctx.lineTo(p3x, p3y);
    ctx.lineTo(p4x, p4y);
  }
  ctx.lineWidth = 1;
  ctx.strokeStyle = color;
  ctx.stroke();
}

function drawLine(ctx, x1, y1, x2, y2, lineColor) {
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.closePath();
  ctx.lineWidth = 1;
  ctx.strokeStyle = lineColor;
  ctx.stroke();
}

function drawDashedLine(ctx, x1, y1, x2, y2, color) {
  ctx.save();
  ctx.setLineDash([6, 4]);
  drawLine(ctx, x1, y1, x2, y2, color);
  ctx.restore();
}

function drawCircle(ctx, x, y, radius, color) {
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, 2 * Math.PI);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.stroke();
}

function drawToggleButton(ctx, x, y, collapsed) {
  const r = 10;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, 2 * Math.PI);
  ctx.fillStyle = currentTheme.cardFill;
  ctx.fill();
  ctx.strokeStyle = currentTheme.edge;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = currentTheme.cardText;
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(collapsed ? '+' : '\u2212', x, y + 1);
}

function drawRoundedRect(ctx, x, y, width, height, radius, borderColor, lineWidth = 1) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();

  ctx.lineWidth = lineWidth;
  ctx.fillStyle = currentTheme.cardFill;
  ctx.fill();
  ctx.strokeStyle = borderColor;
  ctx.stroke();
}

function childConnectionX(child, parentFamPointer) {
  if (child.type === 'couple') {
    let idx = child.dataIndex;
    if (parentFamPointer !== undefined) {
      const found = child.data.findIndex(p => p.famc === parentFamPointer);
      if (found >= 0) idx = found;
    }
    return child._x * mx + (idx === 0 ? -125 : 125);
  }
  if (child.type === 'chain') {
    let idx = child.dataIndex;
    if (parentFamPointer !== undefined) {
      const found = child.data.findIndex(p => p.famc === parentFamPointer);
      if (found >= 0) idx = found;
    }
    const cLeftX = child._x * mx - child.width / 2;
    return cLeftX + idx * (PERSON_WIDTH + COUPLE_DIST) + PERSON_WIDTH / 2;
  }
  return child._x * mx;
}

function drawNode(ctx, node) {
  const isCollapsed = collapsedNodes.has(node.id);

  if (node.type === 'chain') {
    for (let k = 0; k < (node.famsArray || []).length; k++) {
      const famPointer = node.famsArray[k];
      if (!collapsedNodes.has(node.id + '_' + famPointer)) {
        const famChildren = (node.childrenByFam || {})[famPointer] || [];
        for (const child of famChildren) {
          drawNode(ctx, child);
        }
      }
    }
  } else if (!isCollapsed) {
    for (const child of node.children) {
      drawNode(ctx, child);
    }
  }

  const width = node.width;
  const height = node.height;
  const isLR = layoutDirection === 'LR';
  const x = isLR ? node._x * mx                        : node._x * mx - width / 2;
  const y = isLR ? node._y * LR_MY - height / 2        : node._y * my;
  const pChildren = {};

  if (node.type === 'single') {
    const p = node.data[0];
    drawPerson(ctx, x, y, p.givenname, p.surname, p.dob, p.dod, p.img, p.sex, p.id === selectedPersonId, p.id);
    addPersonToCoordinates(p.id, x, y);

    if (node.children.length > 0) {
      let parentX, parentY;
      if (isLR) {
        parentX = x + PERSON_WIDTH;
        parentY = node._y * LR_MY;
      } else {
        parentX = x + PERSON_WIDTH / 2;
        parentY = y + PERSON_HEIGHT;
      }

      if (!isCollapsed) {
        for (const child of node.children) {
          if (isLR) {
            const childLeft = child._x * mx;
            let childY;
            if (child.type === 'couple') {
              const lrPersonOffset = COUPLE_VERT_HEIGHT / 2 - PERSON_HEIGHT / 2;
              const idx = child.data[0].famc === node.fams ? 0 : 1;
              childY = child._y * LR_MY + (idx === 0 ? -lrPersonOffset : lrPersonOffset);
            } else if (child.type === 'chain') {
              const lrSlot    = PERSON_HEIGHT + COUPLE_DIST;
              const totalH    = child.data.length * PERSON_HEIGHT + (child.data.length - 1) * COUPLE_DIST;
              const chainTopY = child._y * LR_MY - totalH / 2;
              const idx       = child.data.findIndex(cp => cp.famc === node.fams);
              childY = chainTopY + (idx >= 0 ? idx : 0) * lrSlot + PERSON_HEIGHT / 2;
            } else {
              childY = child._y * LR_MY;
            }
            const midX = (x + PERSON_WIDTH + childLeft) / 2;
            drawParentsChildEdge(ctx,
              parentX, parentY, midX, parentY, midX, childY, childLeft, childY,
              currentTheme.edge, 10, false);
          } else {
            const childX = childConnectionX(child, node.fams);
            const childY = child._y * my;
            const downDistance = childY - parentY;
            const round = !child.isSingle() && (child.isLeftMost() || child.isRightMost());
            drawParentsChildEdge(ctx,
              parentX, parentY,
              parentX, parentY + downDistance / 2,
              childX,  childY - downDistance / 2,
              childX,  childY,
              currentTheme.edge, 10, round);
          }
        }
      }

      const toggleX = isLR ? parentX + 20 : parentX;
      const toggleY = isLR ? parentY       : parentY + 20;
      drawToggleButton(ctx, toggleX, toggleY, isCollapsed);
      toggleAreas.push({ nodeId: node.id, nodeRef: node, x: toggleX, y: toggleY, r: 14 });
    }
  }

  if (node.type === 'couple') {
    const p1 = node.data[0];
    const p2 = node.data[1];

    if (isLR) {
      // Vertical arrangement: husband on top, wife below
      const coupleTopY = node._y * LR_MY - COUPLE_VERT_HEIGHT / 2;
      const wifeY      = coupleTopY + PERSON_HEIGHT + COUPLE_DIST;
      drawPerson(ctx, x, coupleTopY, p1.givenname, p1.surname, p1.dob, p1.dod, p1.img, p1.sex, p1.id === selectedPersonId, p1.id);
      addPersonToCoordinates(p1.id, x, coupleTopY);
      drawPerson(ctx, x, wifeY, p2.givenname, p2.surname, p2.dob, p2.dod, p2.img, p2.sex, p2.id === selectedPersonId, p2.id);
      addPersonToCoordinates(p2.id, x, wifeY);
      // Vertical bond line between the two persons
      drawLine(ctx, x + PERSON_WIDTH / 2, coupleTopY + PERSON_HEIGHT, x + PERSON_WIDTH / 2, wifeY, currentTheme.edge);
      pChildren.x = x + PERSON_WIDTH / 2;
      pChildren.y = node._y * LR_MY;
    } else {
      drawPerson(ctx, x, y, p1.givenname, p1.surname, p1.dob, p1.dod, p1.img, p1.sex, p1.id === selectedPersonId, p1.id);
      addPersonToCoordinates(p1.id, x, y);
      drawPerson(ctx, x + PERSON_WIDTH + COUPLE_DIST, y, p2.givenname, p2.surname, p2.dob, p2.dod, p2.img, p2.sex, p2.id === selectedPersonId, p2.id);
      addPersonToCoordinates(p2.id, x + PERSON_WIDTH + COUPLE_DIST, y);
      drawLine(ctx, x + PERSON_WIDTH, y + PERSON_HEIGHT / 2, x + PERSON_WIDTH + COUPLE_DIST, y + PERSON_HEIGHT / 2, currentTheme.edge);
      pChildren.x = x + PERSON_WIDTH + COUPLE_DIST / 2;
      pChildren.y = y + PERSON_HEIGHT / 2;
    }

    if (!isCollapsed) {
      for (const child of node.children) {
        if (isLR) {
          const childLeft = child._x * mx;
          const childX = childLeft;
          let childY;
          if (child.type === 'couple') {
            const lrPersonOffset = COUPLE_VERT_HEIGHT / 2 - PERSON_HEIGHT / 2;
            const idx = child.data[0].famc === node.fams ? 0 : 1;
            childY = child._y * LR_MY + (idx === 0 ? -lrPersonOffset : lrPersonOffset);
          } else if (child.type === 'chain') {
            const lrSlot    = PERSON_HEIGHT + COUPLE_DIST;
            const totalH    = child.data.length * PERSON_HEIGHT + (child.data.length - 1) * COUPLE_DIST;
            const chainTopY = child._y * LR_MY - totalH / 2;
            const idx       = child.data.findIndex(p => p.famc === node.fams);
            childY = chainTopY + (idx >= 0 ? idx : 0) * lrSlot + PERSON_HEIGHT / 2;
          } else {
            childY = child._y * LR_MY;
          }
          const midX = (x + PERSON_WIDTH + childLeft) / 2;
          drawParentsChildEdge(ctx,
            pChildren.x, pChildren.y,
            midX, pChildren.y,
            midX, childY,
            childX, childY,
            currentTheme.edge, 10, false
          );
        } else {
          const childX = childConnectionX(child, node.fams);
          const childY = child._y * my;
          const downDistance = childY - pChildren.y;
          const round = !child.isSingle() && (child.isLeftMost() || child.isRightMost());
          drawParentsChildEdge(ctx,
            pChildren.x, pChildren.y,
            pChildren.x, pChildren.y + downDistance / 2,
            childX, childY - downDistance / 2,
            childX, childY,
            currentTheme.edge, 10, round
          );
        }
      }
    }

    if (node.children.length > 0) {
      const toggleX = isLR ? pChildren.x + 20 : pChildren.x;
      const toggleY = isLR ? pChildren.y       : pChildren.y + 20;
      drawToggleButton(ctx, toggleX, toggleY, isCollapsed);
      toggleAreas.push({ nodeId: node.id, nodeRef: node, x: toggleX, y: toggleY, r: 14 });
    }
  }

  if (node.type === 'chain') {
    const n         = node.data.length;
    const sharedIdx = node.dataIndex;

    if (isLR) {
      // LR mode: stack persons vertically, bond lines vertical, children exit right
      const lrSlot    = PERSON_HEIGHT + COUPLE_DIST;          // 150px per person slot
      const totalH    = n * PERSON_HEIGHT + (n - 1) * COUPLE_DIST;
      const chainTopY = node._y * LR_MY - totalH / 2;

      for (let k = 0; k < n; k++) {
        const p  = node.data[k];
        const py = chainTopY + k * lrSlot;
        drawPerson(ctx, x, py, p.givenname, p.surname, p.dob, p.dod, p.img, p.sex, p.id === selectedPersonId, p.id);
        addPersonToCoordinates(p.id, x, py);

        if (k < n - 1) {
          const isDirect = k === sharedIdx || k + 1 === sharedIdx;
          const bondFromY = py + PERSON_HEIGHT;
          const bondToY   = py + lrSlot;
          if (isDirect) {
            drawLine(ctx, x + PERSON_WIDTH / 2, bondFromY, x + PERSON_WIDTH / 2, bondToY, currentTheme.edge);
          } else {
            drawDashedLine(ctx, x + PERSON_WIDTH / 2, bondFromY, x + PERSON_WIDTH / 2, bondToY, currentTheme.edge);
          }
        }
      }

      for (let k = 0; k < (node.famsArray || []).length; k++) {
        const famPointer     = node.famsArray[k];
        const famChildren    = (node.childrenByFam || {})[famPointer] || [];
        const isFamCollapsed = collapsedNodes.has(node.id + '_' + famPointer);
        // Bond center Y for family k = gap between person k and k+1
        const bondCenterY = chainTopY + (k + 1) * lrSlot - COUPLE_DIST / 2;
        const connX       = x + PERSON_WIDTH / 2;

        if (!isFamCollapsed) {
          for (const child of famChildren) {
            const childLeft = child._x * mx;
            const lrPersonOffset = COUPLE_VERT_HEIGHT / 2 - PERSON_HEIGHT / 2;
            const lrCoupleChildIdx = child.type === 'couple'
              ? (child.data[0].famc === famPointer ? 0 : 1)
              : 0;
            const childY = child.type === 'couple'
              ? child._y * LR_MY + (lrCoupleChildIdx === 0 ? -lrPersonOffset : lrPersonOffset)
              : child._y * LR_MY;
            const midX = (x + PERSON_WIDTH + childLeft) / 2;
            drawParentsChildEdge(ctx,
              connX, bondCenterY, midX, bondCenterY, midX, childY, childLeft, childY,
              currentTheme.edge, 10, false
            );
          }
        }
        if (famChildren.length > 0) {
          drawToggleButton(ctx, connX + 20, bondCenterY, isFamCollapsed);
          toggleAreas.push({ nodeId: node.id + '_' + famPointer, nodeRef: node, x: connX + 20, y: bondCenterY, r: 14 });
        }
      }
    } else {
      // TD mode: persons side by side, bond lines horizontal, children exit downward
      const nodeY  = y;
      const midY   = nodeY + PERSON_HEIGHT / 2;
      const leftX  = x;

      for (let k = 0; k < n; k++) {
        const p  = node.data[k];
        const px = leftX + k * (PERSON_WIDTH + COUPLE_DIST);
        drawPerson(ctx, px, nodeY, p.givenname, p.surname, p.dob, p.dod, p.img, p.sex, p.id === selectedPersonId, p.id);
        addPersonToCoordinates(p.id, px, nodeY);

        if (k < n - 1) {
          const x1 = px + PERSON_WIDTH;
          const x2 = x1 + COUPLE_DIST;
          const isDirect = k === sharedIdx || k + 1 === sharedIdx;
          if (isDirect) {
            drawLine(ctx, x1, midY, x2, midY, currentTheme.edge);
          } else {
            drawDashedLine(ctx, x1, midY, x2, midY, currentTheme.edge);
          }
        }
      }

      for (let k = 0; k < (node.famsArray || []).length; k++) {
        const famPointer     = node.famsArray[k];
        const famChildren    = (node.childrenByFam || {})[famPointer] || [];
        const isFamCollapsed = collapsedNodes.has(node.id + '_' + famPointer);
        const dropX = leftX + k * (PERSON_WIDTH + COUPLE_DIST) + PERSON_WIDTH + COUPLE_DIST / 2;

        if (!isFamCollapsed) {
          for (const child of famChildren) {
            const childX   = childConnectionX(child, famPointer);
            const childY   = child._y * my;
            const downDist = childY - midY;
            const round    = !child.isSingle() && (child.isLeftMost() || child.isRightMost());
            drawParentsChildEdge(ctx,
              dropX, midY, dropX, midY + downDist / 2,
              childX, childY - downDist / 2, childX, childY,
              currentTheme.edge, 10, round
            );
          }
        }
        if (famChildren.length > 0) {
          drawToggleButton(ctx, dropX, midY + 20, isFamCollapsed);
          toggleAreas.push({ nodeId: node.id + '_' + famPointer, nodeRef: node, x: dropX, y: midY + 20, r: 14 });
        }
      }
    }
  }
}

function drawPerson(ctx, x, y, name, surname, dob, dod, preloadedImg, sex, selected = false, personId = null) {
  // border
  let borderColor = currentTheme.cardBorderX;
  if (sex === "M") {
    borderColor = currentTheme.cardBorderM;
  } else if (sex === "F") {
    borderColor = currentTheme.cardBorderF;
  }

  drawRoundedRect(ctx, x, y, PERSON_WIDTH, PERSON_HEIGHT, PERSON_PAD, borderColor, selected ? 3 : 1)

  ctx.drawImage(preloadedImg, x + PERSON_PAD, y + PERSON_PAD, 90, 90)

  // name
  const fontHeight1 = 18;
  const fontHeight1b = 12;
  ctx.fillStyle = currentTheme.cardText;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const textX = x + PERSON_PAD + 90 + PERSON_PAD;
  const textY = y + PERSON_PAD + PERSON_PAD;

  const nameParts = (name || '').split(' ').filter(Boolean);
  ctx.font = fontHeight1 + 'px Arial';
  ctx.fillText(nameParts[0], textX, textY);
  if (nameParts.length > 1) {
    const firstWidth = ctx.measureText(nameParts[0] + ' ').width;
    ctx.font = fontHeight1b + 'px Arial';
    ctx.fillText(nameParts.slice(1).join(' '), textX + firstWidth, textY + (fontHeight1 - fontHeight1b));
    ctx.font = fontHeight1 + 'px Arial';
  }
  ctx.fillText(surname, textX, textY + fontHeight1);

  // dates
  const fontHeight2 = 11;
  ctx.font = fontHeight2 + 'px Monaco';
  if (dob) {
    ctx.fillText(t('person.born') + formatGedcomDate(dob), textX, textY + PERSON_PAD + 2 * fontHeight1 + PERSON_PAD);
  }
  if (dod) {
    ctx.fillText(t('person.died') + formatGedcomDate(dod), textX, textY + PERSON_PAD + 2 * fontHeight1 + PERSON_PAD + fontHeight2);
  }

  if (personId) {
    const badgeX = x + PERSON_WIDTH - 10;
    const badgeY = y + PERSON_HEIGHT - 10;
    const badgeR = 9;
    ctx.beginPath();
    ctx.arc(badgeX, badgeY, badgeR, 0, 2 * Math.PI);
    ctx.fillStyle = '#999999';
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('+', badgeX, badgeY + 1);
    addRelativeAreas.push({ personId, x: badgeX, y: badgeY, r: badgeR + 4 });
  }
}

function compareDatesDob(p1, p2, reverse = false) {
  const keyA = p1.dob ? gedcomDateSortKey(p1.dob) : '';
  const keyB = p2.dob ? gedcomDateSortKey(p2.dob) : '';
  const cmp  = keyA < keyB ? -1 : keyA > keyB ? 1 : 0;
  return reverse ? -cmp : cmp;
}


async function unwrapDek(slot, password, iterations) {
  if (!crypto.subtle) throw new Error('crypto.subtle not available');
  const keyMaterial = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
  );
  const kek = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: base64ToUint8Array(slot.salt), iterations, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    true,
    ['decrypt']
  );
  const rawDek = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: base64ToUint8Array(slot.nonce) },
    kek,
    base64ToUint8Array(slot.wrappedKey)
  );
  return new Uint8Array(rawDek);
}

async function decryptData(rawDek, nonce, cipherText) {
  const key = await crypto.subtle.importKey(
    'raw', rawDek, { name: 'AES-GCM' }, false, ['decrypt']
  );
  return crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, cipherText);
}

function base64ToUint8Array(base64String) {
  const binaryString = atob(base64String);
  const length = binaryString.length;
  const uint8Array = new Uint8Array(length);
  for (let i = 0; i < length; i++) {
      uint8Array[i] = binaryString.charCodeAt(i);
  }
  return uint8Array;
}

function uint8ArrayToBase64(bytes) {
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

async function inflate(buf) {
  const ds = new DecompressionStream('deflate-raw');
  const writer = ds.writable.getWriter();
  writer.write(new Uint8Array(buf));
  writer.close();
  return new Response(ds.readable).arrayBuffer();
}

async function deflate(bytes) {
  const cs = new CompressionStream('deflate-raw');
  const writer = cs.writable.getWriter();
  writer.write(bytes);
  writer.close();
  return new Uint8Array(await new Response(cs.readable).arrayBuffer());
}

async function encryptData(plaintext, password) {
  const enc        = new TextEncoder();
  const iterations = 5_000_000;

  const dek        = crypto.getRandomValues(new Uint8Array(32));
  const dataNonce  = crypto.getRandomValues(new Uint8Array(12));
  const dekKey     = await crypto.subtle.importKey('raw', dek, 'AES-GCM', false, ['encrypt']);
  const compressed = await deflate(enc.encode(plaintext));
  const cipherBuf  = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: dataNonce }, dekKey, compressed);

  const salt      = crypto.getRandomValues(new Uint8Array(32));
  const slotNonce = crypto.getRandomValues(new Uint8Array(12));
  const keyMat    = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const kek       = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
    keyMat,
    { name: 'AES-GCM', length: 256 },
    true,
    ['encrypt']
  );
  const rawKek    = await crypto.subtle.exportKey('raw', kek);
  const kekEnc    = await crypto.subtle.importKey('raw', rawKek, 'AES-GCM', false, ['encrypt']);
  const wrappedBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: slotNonce }, kekEnc, dek);

  return {
    iterations,
    compressed: true,
    nonce:      uint8ArrayToBase64(dataNonce),
    cipherText: uint8ArrayToBase64(new Uint8Array(cipherBuf)),
    slots: [{
      salt:       uint8ArrayToBase64(salt),
      nonce:      uint8ArrayToBase64(slotNonce),
      wrappedKey: uint8ArrayToBase64(new Uint8Array(wrappedBuf)),
    }],
  };
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const text = t(el.dataset.i18n);
    if (el.children.length === 0) {
      el.textContent = text;
    } else {
      // Element has child elements (e.g. label > input) — update only the leading text node
      let found = false;
      for (const node of el.childNodes) {
        if (node.nodeType === 3) { node.textContent = text; found = true; break; }
      }
      if (!found) el.insertBefore(document.createTextNode(text), el.firstChild);
    }
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
}

applyTranslations();
