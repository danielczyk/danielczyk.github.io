<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Drzewo Genealogiczne</title>
  <link rel="manifest" href="data:application/manifest+json,{&quot;name&quot;:&quot;Family Tree&quot;,&quot;short_name&quot;:&quot;Family Tree&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23ffffff&quot;,&quot;theme_color&quot;:&quot;%233498db&quot;,&quot;icons&quot;:[]}">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Family Tree">
  <style type="text/css">
    :root {
      --bg:          #ffffff;
      --surface:     #ffffff;
      --surface-2:   #efefef;
      --border:      #cccccc;
      --text:        #000000;
      --text-muted:  #555555;
      --text-mono:   #333333;
      --btn-primary: #333333;
      --btn-hover:   #555555;
      --btn-disabled:#999999;
      --shadow:      rgba(0,0,0,0.2);
      --nav-btn-bg:  rgba(255,255,255,0.9);
      --nav-btn-active: rgba(220,220,220,0.95);
    }
    body.dark {
      --bg:          #16213e;
      --surface:     #1f2d47;
      --surface-2:   #0f3460;
      --border:      #3a4a6b;
      --text:        #e0e0e0;
      --text-muted:  #9aaabb;
      --text-mono:   #b0c0d0;
      --btn-primary: #4a90d9;
      --btn-hover:   #6aaaf0;
      --btn-disabled:#556070;
      --shadow:      rgba(0,0,0,0.5);
      --nav-btn-bg:  rgba(31,45,71,0.95);
      --nav-btn-active: rgba(15,52,96,0.95);
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
    }
    #login-bg {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      opacity: 0.8;
      pointer-events: none;
    }
    #login {
      display: none;
      position: relative;
      z-index: 1;
      background-color: var(--surface-2);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 24px var(--shadow);
    }
    #login input {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 14px;
    }
    #login button {
      background: var(--btn-primary);
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-left: 6px;
    }
    #login button:hover { background: var(--btn-hover); }
    #myCanvas {
      cursor: pointer;
    }
    #person-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      background: var(--surface);
      color: var(--text);
      box-shadow: -2px 0 8px var(--shadow);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 30;
    }
    #person-panel.open {
      transform: translateX(0);
    }
    #panel-close {
      font-size: 24px;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }
    #panel-img {
      width: 100%;
      max-width: 200px;
      display: block;
      margin: 0 auto 16px;
      border-radius: 4px;
    }
    #panel-name {
      text-align: center;
      margin: 0 0 12px;
      font-size: 18px;
      font-family: Arial, sans-serif;
      color: var(--text);
    }
    #panel-id {
      text-align: center;
      margin: -8px 0 10px;
      font-size: 11px;
      font-family: Monaco, monospace;
      color: var(--text-muted);
    }
    #panel-details p {
      margin: 4px 0;
      font-size: 13px;
      font-family: Monaco, monospace;
      color: var(--text-mono);
    }
    #nav-widget {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 5;
      display: none;
      flex-direction: row;
      gap: 6px;
      align-items: center;
      will-change: transform;
    }
    #nav-widget.visible {
      display: flex;
    }
    .nav-zoom {
      display: flex;
      flex-direction: row;
      gap: 6px;
    }
    #nav-widget button {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--nav-btn-bg);
      color: var(--text);
      box-shadow: 0 1px 4px var(--shadow);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      touch-action: none;
      user-select: none;
    }
    #nav-widget button:active {
      background: var(--nav-btn-active);
    }
    #birthday-btn,
    #about-btn,
    #settings-btn,
    #data-btn,
    #relation-btn {
      position: fixed;
      right: 16px;
      z-index: 5;
      display: none;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--nav-btn-bg);
      color: var(--text);
      box-shadow: 0 1px 4px var(--shadow);
      cursor: pointer;
      font-size: 18px;
      align-items: center;
      justify-content: center;
      will-change: transform;
    }
    #birthday-btn { top: 16px; right: 148px; }
    #about-btn    { top: 16px; right: 104px; }
    #settings-btn { top: 16px; right: 60px; }
    #data-btn     { top: 16px; right: 16px; }
    #relation-btn { top: 16px; right: 192px; font-size: 15px; }
    #birthday-btn.visible,
    #about-btn.visible,
    #settings-btn.visible,
    #data-btn.visible,
    #relation-btn.visible {
      display: flex;
    }
    #data-badge {
      display: none;
      position: absolute;
      top: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      background: #e74c3c;
      border-radius: 50%;
      pointer-events: none;
    }
    #birthday-panel,
    #about-panel,
    #settings-panel,
    #data-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 300px;
      height: 100%;
      background: var(--surface);
      color: var(--text);
      box-shadow: -2px 0 8px var(--shadow);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 30;
    }
    #birthday-panel.open,
    #about-panel.open,
    #settings-panel.open,
    #data-panel.open {
      transform: translateX(0);
    }
    #birthday-close,
    #about-close,
    #settings-close,
    #data-close {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 24px;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      line-height: 1;
    }
    #birthday-panel h2,
    #about-panel h2,
    #settings-panel h2,
    #data-panel h2 {
      font-family: Arial, sans-serif;
      font-size: 16px;
      margin: 0 0 16px;
      padding-right: 24px;
      color: var(--text);
    }
    #birthday-panel hr,
    #about-panel hr,
    #settings-panel hr,
    #data-panel hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }
    .about-text {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      margin: 0 0 12px;
    }
    .about-text-muted {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
      margin: 0;
    }
    #birthday-btn span { filter: grayscale(1); }
    #data-panel label {
      display: block;
      font-family: Arial, sans-serif;
      font-size: 12px;
      margin-bottom: 4px;
      color: var(--text-muted);
    }
    #data-panel input[type="text"],
    #data-panel input[type="email"],
    #data-panel input[type="password"],
    #data-panel textarea {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      font-size: 13px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: Arial, sans-serif;
      background: var(--surface-2);
      color: var(--text);
    }
    #data-panel textarea {
      resize: vertical;
      min-height: 72px;
    }
    #data-panel input[type="file"] {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    #data-panel h3 {
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 6px;
      color: var(--text);
    }
    .data-panel-desc {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      margin: 0 0 10px;
      line-height: 1.5;
    }
    .data-panel-accordion {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      margin: 0 0 0;
    }
    .data-panel-accordion::after {
      content: '▸';
      font-size: 11px;
      color: var(--text-muted);
      transition: transform 0.15s ease;
    }
    .data-panel-accordion.open::after {
      transform: rotate(90deg);
    }
    .data-panel-accordion-body {
      display: none;
      margin-top: 12px;
    }
    .data-panel-accordion-body.open {
      display: block;
    }
    #data-panel button:not(#data-close) {
      padding: 9px;
      font-size: 13px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      box-sizing: border-box;
    }
    #settings-merge-btn {
      width: 100%;
      background: var(--btn-primary);
      color: #fff;
    }
    #settings-merge-btn:hover    { background: var(--btn-hover); }
    #settings-merge-btn:disabled { background: var(--btn-disabled); cursor: default; }
    #settings-merge-status {
      margin-top: 8px;
      font-size: 11px;
      font-family: Arial, sans-serif;
      color: var(--text-muted);
      min-height: 16px;
      white-space: pre-line;
      line-height: 1.5;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
    }
    hr + .toggle-row { margin-top: 4px; }
    .panel-select {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 13px;
      font-family: Arial, sans-serif;
      cursor: pointer;
    }
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--btn-primary); }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }
    #panel-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 8px;
      min-height: 32px;
    }
    #panel-edit-btn,
    #panel-crosshair-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 7px;
      font-size: 12px;
      font-family: Arial, sans-serif;
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }
    #panel-edit-btn {
      background: var(--btn-primary, #3498db);
      color: #fff;
      border-color: var(--btn-primary, #3498db);
      font-weight: 600;
    }
    #panel-edit-btn:hover { background: var(--btn-hover, #2980b9); border-color: var(--btn-hover, #2980b9); color: #fff; }
    #panel-crosshair-btn:hover { color: var(--text); border-color: var(--text-muted); }
    #panel-crosshair-btn.pinned { color: var(--btn-primary, #3498db); border-color: var(--btn-primary, #3498db); }
    #panel-img-wrap {
      position: relative;
      width: fit-content;
      margin: 0 auto 4px;
    }
    #panel-img-edit-btn {
      display: none;
      width: 100%;
      max-width: 200px;
      margin: 0 auto 4px;
      box-sizing: border-box;
      gap: 6px;
      justify-content: center;
    }
    #panel-img-change-label {
      flex: 1;
      padding: 5px;
      background: var(--surface-2);
      border: 1px dashed var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 12px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      text-align: center;
    }
    #panel-img-change-label:hover { color: var(--text); border-color: var(--text-muted); }
    #panel-img-remove-btn {
      padding: 5px 8px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 12px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      white-space: nowrap;
    }
    #panel-img-remove-btn:hover { color: #c0392b; border-color: #c0392b; }
    #panel-edit-form {
      font-family: Arial, sans-serif;
    }
    #panel-edit-form label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
      margin-top: 8px;
    }
    #panel-edit-form input[type="text"],
    #panel-edit-form select {
      width: 100%;
      box-sizing: border-box;
      font-size: 13px;
      padding: 5px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface-2);
      color: var(--text);
      font-family: Monaco, monospace;
    }
    .edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .edit-actions button {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-family: Arial, sans-serif;
    }
    #edit-save-btn,
    #add-relative-save   { background: var(--btn-primary); color: #fff; }
    #edit-save-btn:hover,
    #add-relative-save:hover { background: var(--btn-hover); }
    #add-relative-save:disabled { background: var(--btn-disabled); cursor: default; }
    #edit-cancel-btn,
    #add-relative-cancel { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .panel-unknown { color: var(--text-muted); font-style: italic; }
    #panel-parents { margin-top: 6px; font-size: 13px; line-height: 1.7; }
    #panel-parents a { color: var(--text); text-decoration: underline; cursor: pointer; }
    #panel-parents a:hover { opacity: 0.75; }
    #panel-spouse { margin-top: 6px; font-size: 13px; line-height: 1.7; }
    #panel-spouse a { color: var(--text); text-decoration: underline; cursor: pointer; }
    #panel-spouse a:hover { opacity: 0.75; }
    #panel-spouse-marriage { color: var(--text-muted); font-size: 12px; }
    #panel-back {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      padding: 0 0 4px 0;
      text-decoration: underline;
    }
    #panel-back:hover { color: var(--text); }
    .edit-section-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 14px;
      margin-bottom: 2px;
    }
    .person-picker { position: relative; }
    .person-picker input[type="text"] { padding-right: 28px; }
    .person-picker button {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
    }
    .person-picker button:hover { color: var(--text); }
    .person-picker-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      z-index: 100;
      max-height: 200px;
      overflow-y: auto;
      list-style: none;
      margin: 2px 0 0;
      padding: 0;
    }
    .person-picker-results li {
      padding: 6px 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: Monaco, monospace;
    }
    .person-picker-results li:hover { background: var(--surface-3, var(--border)); }
    .picker-warn { color: #e67e22; margin-left: 4px; }
    #panel-notes {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    #panel-edit-form textarea {
      width: 100%;
      box-sizing: border-box;
      font-size: 13px;
      padding: 5px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface-2);
      color: var(--text);
      font-family: Arial, sans-serif;
      resize: vertical;
    }
    .settings-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .settings-row button {
      flex: 1;
    }
    #settings-send-webhook { width: 100%; background: var(--btn-primary); color: #fff; }
    #settings-send-webhook:hover:not(:disabled) { background: var(--btn-hover); }
    #settings-send-webhook:disabled { background: var(--btn-disabled); cursor: default; }
    #webhook-email-error { font-size: 11px; font-family: Arial, sans-serif; color: #c0392b; margin: -6px 0 8px; min-height: 14px; }
    #settings-download-edits { width: 100%; background: var(--btn-primary); color: #fff; }
    #export-html-btn { width: 100%; background: var(--btn-primary); color: #fff; }
    #export-html-btn:hover { background: var(--btn-hover); }
    #export-html-btn:disabled { background: var(--btn-disabled); cursor: default; }
    #export-password-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
    .export-pw-row { display: flex; gap: 4px; align-items: center; }
    .export-pw-row input { flex: 1; margin-bottom: 0 !important; }
    .export-pw-remove,
    .export-pw-toggle {
      background: none !important;
      border: none !important;
      padding: 0 4px !important;
      font-size: 15px;
      line-height: 1;
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
    }
    .export-pw-remove:hover { color: #c0392b; }
    .export-pw-toggle[data-revealed="true"] { color: var(--btn-primary); }
    #export-password-add {
      background: none !important;
      border: 1px solid var(--border) !important;
      color: var(--text-muted);
      font-size: 12px !important;
      padding: 3px 8px !important;
      margin-bottom: 6px;
      width: auto !important;
      align-self: flex-start;
    }
    #export-password-add:hover { color: var(--text); border-color: var(--text-muted) !important; }
    #export-password-error {
      font-size: 11px;
      font-family: Arial, sans-serif;
      margin: 2px 0 6px;
      color: #c0392b;
      min-height: 14px;
    }
    #export-html-status {
      font-size: 11px;
      font-family: Arial, sans-serif;
      margin: 4px 0 0;
      color: var(--text-muted);
    }
    #settings-download-edits:hover { background: var(--btn-hover); }
    #settings-reset-edits { background: #c0392b; color: #fff; border: none; }
    #settings-reset-edits:hover { background: #a93226; }
    #settings-edit-count {
      font-size: 11px;
      font-family: Arial, sans-serif;
      color: var(--text-muted);
      margin: 4px 0 0;
      line-height: 1.5;
    }
    #settings-edit-count ul {
      margin: 4px 0 0;
      padding: 0 0 0 14px;
      list-style: disc;
    }
    #settings-edit-count li {
      margin: 1px 0;
      color: var(--text);
    }
    #crop-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #crop-canvas {
      display: block;
      border-radius: 8px;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
    #crop-canvas:active { cursor: grabbing; }
    #crop-actions {
      display: flex;
      gap: 10px;
    }
    #crop-actions button {
      padding: 9px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      cursor: pointer;
    }
    #crop-cancel  { background: rgba(255,255,255,0.15); color: #fff; }
    #crop-cancel:hover { background: rgba(255,255,255,0.25); }
    #crop-zoom-out,

  <style type="text/css">
    :root {
      --bg:          #ffffff;
      --surface:     #ffffff;
      --surface-2:   #efefef;
      --border:      #cccccc;
      --text:        #000000;
      --text-muted:  #555555;
      --text-mono:   #333333;
      --btn-primary: #333333;
      --btn-hover:   #555555;
      --btn-disabled:#999999;
      --shadow:      rgba(0,0,0,0.2);
      --nav-btn-bg:  rgba(255,255,255,0.9);
      --nav-btn-active: rgba(220,220,220,0.95);
    }
    body.dark {
      --bg:          #16213e;
      --surface:     #1f2d47;
      --surface-2:   #0f3460;
      --border:      #3a4a6b;
      --text:        #e0e0e0;
      --text-muted:  #9aaabb;
      --text-mono:   #b0c0d0;
      --btn-primary: #4a90d9;
      --btn-hover:   #6aaaf0;
      --btn-disabled:#556070;
      --shadow:      rgba(0,0,0,0.5);
      --nav-btn-bg:  rgba(31,45,71,0.95);
      --nav-btn-active: rgba(15,52,96,0.95);
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
    }
    #login-bg {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      opacity: 0.8;
      pointer-events: none;
    }
    #login {
      display: none;
      position: relative;
      z-index: 1;
      background-color: var(--surface-2);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 24px var(--shadow);
    }
    #login input {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 14px;
    }
    #login button {
      background: var(--btn-primary);
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-left: 6px;
    }
    #login button:hover { background: var(--btn-hover); }
    #myCanvas {
      cursor: pointer;
    }
    #person-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      background: var(--surface);
      color: var(--text);
      box-shadow: -2px 0 8px var(--shadow);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 30;
    }
    #person-panel.open {
      transform: translateX(0);
    }
    #panel-close {
      font-size: 24px;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }
    #panel-img {
      width: 100%;
      max-width: 200px;
      display: block;
      margin: 0 auto 16px;
      border-radius: 4px;
    }
    #panel-name {
      text-align: center;
      margin: 0 0 12px;
      font-size: 18px;
      font-family: Arial, sans-serif;
      color: var(--text);
    }
    #panel-id {
      text-align: center;
      margin: -8px 0 10px;
      font-size: 11px;
      font-family: Monaco, monospace;
      color: var(--text-muted);
    }
    #panel-details p {
      margin: 4px 0;
      font-size: 13px;
      font-family: Monaco, monospace;
      color: var(--text-mono);
    }
    #nav-widget {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 5;
      display: none;
      flex-direction: row;
      gap: 6px;
      align-items: center;
      will-change: transform;
    }
    #nav-widget.visible {
      display: flex;
    }
    .nav-zoom {
      display: flex;
      flex-direction: row;
      gap: 6px;
    }
    #nav-widget button {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--nav-btn-bg);

      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      touch-action: none;
      user-select: none;
    }
    #nav-widget button:active {
      background: var(--nav-btn-active);

    // Left-to-right layout: generations flow left→right (X = depth),
// siblings spread top→bottom (Y = Buchheim-computed position).
// This produces a tall, narrow tree instead of a wide, shallow one.

const LR_NODE_SIZE = 0;
const LR_SIBLING_DISTANCE = 1;
const LR_TREE_DISTANCE = 1;

function lrGetTopContour(node, modSum, contourMap) {
  if (contourMap[node._x] === undefined) {
    contourMap[node._x] = node._y + modSum;
  } else {
    contourMap[node._x] = Math.min(contourMap[node._x], node._y + modSum);
  }
  modSum += node._modY;
  for (const child of node.children) lrGetTopContour(child, modSum, contourMap);
}

function lrGetBottomContour(node, modSum, contourMap) {
  if (contourMap[node._x] === undefined) {
    contourMap[node._x] = node._y + modSum;
  } else {
    contourMap[node._x] = Math.max(contourMap[node._x], node._y + modSum);
  }
  modSum += node._modY;
  for (const child of node.children) lrGetBottomContour(child, modSum, contourMap);
}

function lrCenterNodesBetween(topNode, bottomNode) {
  const children = topNode._parent.children;
  const topIndex = children.indexOf(topNode);
  const bottomIndex = children.indexOf(bottomNode);
  const numNodesBetween = (bottomIndex - topIndex) - 1;
  if (numNodesBetween > 0) {
    const distanceBetweenNodes = (bottomNode._y - topNode._y) / (numNodesBetween + 1);
    let count = 1;
    for (let i = topIndex + 1; i < bottomIndex; i++) {
      const middleNode = children[i];
      const desiredY = topNode._y + (distanceBetweenNodes * count);
      const offset = desiredY - middleNode._y;
      if (offset > 0) {
        middleNode._y += offset;
        middleNode._modY += offset;
      }
      count++;
    }
    lrCheckForConflicts(bottomNode);
  }
}

function lrCheckForConflicts(node) {
  const minDistance = LR_TREE_DISTANCE + LR_NODE_SIZE;
  let shiftValue = 0;
  const nodeContourMap = {};
  lrGetTopContour(node, 0, nodeContourMap);
  let sibling = node.getLeftMostSibling(); // "leftmost" = topmost in LR orientation
  while (sibling !== null && sibling !== node) {
    const siblingContourMap = {};
    lrGetBottomContour(sibling, 0, siblingContourMap);
    const maxLevel = Math.min(
      Math.max(...Object.keys(siblingContourMap)),
      Math.max(...Object.keys(nodeContourMap))
    );
    for (let level = node._x + 1; level <= maxLevel; level++) {
      const distance = nodeContourMap[level] - siblingContourMap[level];
      if (distance + shiftValue < minDistance) shiftValue = minDistance - distance;
    }
    if (shiftValue > 0) {
      node._y += shiftValue;
      node._modY += shiftValue;
      lrCenterNodesBetween(sibling, node);
      shiftValue = 0;
    }
    sibling = sibling.getNextSibling();
  }
}

function lrCalculateInitialY(node) {
  for (const child of node.children) lrCalculateInitialY(child);

  if (node.isLeaf()) {
    node._y = node.isLeftMost() ? 0 : node.getPreviousSibling()._y + LR_NODE_SIZE + LR_SIBLING_DISTANCE;
  } else if (node.children.length === 1) {
    if (node.isLeftMost()) {
      node._y = node.children[0]._y;
    } else {
      node._y = node.getPreviousSibling()._y + LR_NODE_SIZE + LR_SIBLING_DISTANCE;
      node._modY = node._y - node.children[0]._y;
    }
  } else {
    const topChild    = node.getLeftMostChild();
    const bottomChild = node.getRightMostChild();
    const mid = (topChild._y + bottomChild._y) / 2;
    if (node.isLeftMost()) {
      node._y = mid;
    } else {
      node._y = node.getPreviousSibling()._y + LR_NODE_SIZE + LR_SIBLING_DISTANCE;
      node._modY = node._y - mid;
    }
  }

  if (node.children.length > 0 && !node.isLeftMost()) lrCheckForConflicts(node);
}

function lrCheckAllChildrenOnScreen(node) {
  const nodeContourMap = {};
  lrGetTopContour(node, 0, nodeContourMap);
  let shiftAmount = 0;
  for (const x of Object.keys(nodeContourMap)) {
    if (nodeContourMap[x] + shiftAmount < 0) shiftAmount = nodeContourMap[x] * -1;
  }
  if (shiftAmount > 0) {
    node._y += shiftAmount;
    node._modY += shiftAmount;
  }
}

function lrCalculateFinalPositions(node, modSum) {
  node._y += modSum;
  modSum += node._modY;
  for (const child of node.children) lrCalculateFinalPositions(child, modSum);
}

function lrInitializeDepth(node, depth) {
  node._x = depth;  // depth IS the x coordinate in LR layout
  node._y = -1;
  node._modY = 0;
  for (const child of node.children) lrInitializeDepth(child, depth + 1);
}

function computeLayoutLR(rootNode) {
  lrInitializeDepth(rootNode, 0);
  lrCalculateInitialY(rootNode);
  lrCheckAllChildrenOnScreen(rootNode);
  lrCalculateFinalPositions(rootNode, 0);
}

class Indyvidual {
  constructor(rootId, data) {
    this.rootId = rootId;
    this.id = data.pointer;
    this.fullname = data.fullname;
    this.givenname = data.givenname;
    this.surname = data.surname;
    this.famc = data.famc;
    this.fams = data.fams;
    this.dob = data.date_of_birth;
    this.dod = data.date_of_death;
    this.placeOfBirth = data.place_of_birth;
    this.sex = data.sex;
    const placeholder = data.sex === 'F' ? placeholderFemale : placeholderMale;
    this.placeholderBase64Img = placeholder;
    this.base64Img = data.img || placeholder;
  }

  async init() {
    if (!this.base64Img) {
      return
    }
    const img = new Image();
    img.src = this.base64Img;
    return new Promise((resolve) => {
      img.onload = () => {
        this.img = img
        resolve();
      };
      img.onerror = () => {
        resolve();
      };
    })
  }

  setX(x) {
    this._x = x
  }
  setY(y) {
    this._y = y
  }

  findPartners() {
    const partners = []
    for (const f of Object.values(fMap)) {
      if (f.wife === this.id && f.husband && pMap[f.husband]) {
        partners.push(pMap[f.husband])
      } else if (f.husband === this.id && f.wife && pMap[f.wife]) {
        partners.push(pMap[f.wife])
      }
    }
    // TODO: later improve sorting and sort by date of mariage if available
    partners.sort((p1, p2) => compareDatesDob(p1, p2))
    return partners;
  }

  isDesedantOfRoot(){
    if (this.id === this.rootId) {
      return true;
    }
    if (!this.famc || !fMap[this.famc]) {
      return false
    }
    let famc = fMap[this.famc];
    let motherD = false
    let fatherD = false

    const motherId = famc.wife;
    if (motherId && pMap[motherId]) {
      const mother = pMap[motherId];
      motherD = mother.isDesedantOfRoot();
    }
    const fatherId = famc.husband;
    if (fatherId && pMap[fatherId]) {
      const father = pMap[fatherId];
      fatherD = father.isDesedantOfRoot()
    }
    return motherD || fatherD
  }

  getDistanceFromRoot() {
    if (this._distance !== undefined) {
      return this._distance;
    }
    if (this.id === this.rootId) {
      return 0;
    }
    if (!this.famc || !fMap[this.famc]) {
      return undefined
    }
    let famc = fMap[this.famc];
    const motherId = famc.wife;
    if (motherId && pMap[motherId]) {
      const mother = pMap[motherId]
      if (mother.isDesedantOfRoot()) {
        this._distance = mother.getDistanceFromRoot() + 1;
        return this._distance;
      }
    }
    const fatherId = famc.husband;
    if (fatherId && pMap[fatherId]) {
      const father = pMap[fatherId];
      if (father.isDesedantOfRoot()) {
        this._distance = father.getDistanceFromRoot() + 1;
        return this._distance;
      }
    }
    return -1;
  }
}

const LANG_KEY = 'familyTreeLang';
let _lang = localStorage.getItem(LANG_KEY) || 'pl';

function t(key, ...args) {
  const val = (TRANSLATIONS[_lang] || TRANSLATIONS.pl)[key];
  if (val === undefined) return key;
  return typeof val === 'function' ? val(...args) : val;
}

function setLang(lang) {
  _lang = lang;
  localStorage.setItem(LANG_KEY, lang);
}

function getLang() { return _lang; }

if (typeof module !== 'undefined') module.exports = { t, setLang, getLang };


    const MONTH_MAP = {
  // GEDCOM standard (English 3-letter abbreviations)
  JAN:1, FEB:2, MAR:3, APR:4, MAY:5, JUN:6,
  JUL:7, AUG:8, SEP:9, OCT:10, NOV:11, DEC:12,
  // Polish — abbreviated (diacritics already stripped via normToken)
  STY:1, LUT:2, /* MAR already above */ KWI:4, MAJ:5, CZE:6,
  LIP:7, SIE:8, WRZ:9, PAZ:10, LIS:11, GRU:12,
  // Polish — full nominative (diacritics stripped)
  STYCZEN:1, LUTY:2, MARZEC:3, KWIECIEN:4, CZERWIEC:6,
  LIPIEC:7, SIERPIEN:8, WRZESIEN:9, PAZDZIERNIK:10, LISTOPAD:11, GRUDZIEN:12,
  // Polish — genitive (the form most commonly used when writing dates: "20 maja 1979")
  STYCZNIA:1, LUTEGO:2, MARCA:3, KWIETNIA:4, MAJA:5, CZERWCA:6,
  LIPCA:7, SIERPNIA:8, WRZESNIA:9, PAZDZIERNIKA:10, LISTOPADA:11, GRUDNIA:12,
};

const QUALIFIER_MAP = { ABT:'~', EST:'~', CAL:'~', BEF:'<', AFT:'>' };

function pad2(n) { return String(n).padStart(2, '0'); }

// Strip diacritics and uppercase — handles Polish ą ę ó ś ź ż ć ń ł ź
function normToken(s) {
  return s.normalize('NFD').replace(/\p{Mn}/gu, '').toUpperCase();
}

function parseParts(str) {
  if (!str) return null;
  const tokens = str.trim().replace(/[\/\.]/g, ' ').split(/\s+/).map(normToken);
  let day, month, year;
  for (const tok of tokens) {
    if (MONTH_MAP[tok]) {
      month = MONTH_MAP[tok];
    } else if (/^\d{4}$/.test(tok)) {
      year = parseInt(tok, 10);
    } else if (/^\d{1,2}$/.test(tok)) {
      if (day === undefined)        day   = parseInt(tok, 10);
      else if (month === undefined) month = parseInt(tok, 10);
    }
  }
  if (!year) return null;
  return { day, month, year };
}

function parseGedcomDate(str) {
  if (!str || typeof str !== 'string') return null;
  let s = str.trim();

  // INT — strip keyword and trailing bracketed annotation
  if (/^INT\s+/i.test(s)) {
    s = s.replace(/^INT\s+/i, '').replace(/\s*\([^)]*\)\s*$/, '').trim();
    return parseParts(s);
  }

  // BET ... AND ...
  const betMatch = s.match(/^BET\s+(.+?)\s+AND\s+(.+)$/i);
  if (betMatch) {
    const from = parseParts(betMatch[1]);
    const to   = parseParts(betMatch[2]);
    if (from || to) return { rangeFrom: from, rangeTo: to };
    return null;
  }

  // FROM ... TO ...
  const fromMatch = s.match(/^FROM\s+(.+?)\s+TO\s+(.+)$/i);
  if (fromMatch) {
    const from = parseParts(fromMatch[1]);
    const to   = parseParts(fromMatch[2]);
    if (from || to) return { rangeFrom: from, rangeTo: to };
    return null;
  }

  // Qualifier prefix
  const qualMatch = s.match(/^(ABT|EST|CAL|BEF|AFT)\s+(.+)$/i);
  if (qualMatch) {
    const qualifier = QUALIFIER_MAP[qualMatch[1].toUpperCase()];
    const parts = parseParts(qualMatch[2]);
    if (!parts) return null;
    return { qualifier, ...parts };
  }

  return parseParts(s);
}

function formatParts(parts) {
  if (!parts || !parts.year) return null;
  if (parts.day && parts.month) return `${pad2(parts.day)}-${pad2(parts.month)}-${parts.year}`;
  if (parts.month)              return `${pad2(parts.month)}-${parts.year}`;
  return String(parts.year);
}

// Returns a display string. Falls back to the original string for unrecognised input.
function formatGedcomDate(str) {
  const parsed = parseGedcomDate(str);
  if (!parsed) return str || '';

  if (parsed.rangeFrom !== undefined) {
    const from = formatParts(parsed.rangeFrom);
    const to   = formatParts(parsed.rangeTo);
    if (from && to) return `${from}–${to}`;
    return from || to || (str || '');
  }

  const base = formatParts(parsed);
  if (!base) return str || '';
  return parsed.qualifier ? parsed.qualifier + base : base;
}

// Returns an ISO-ish sort key: "YYYY", "YYYY-MM", or "YYYY-MM-DD". Empty string if unparseable.
function gedcomDateSortKey(str) {
  const parsed = parseGedcomDate(str);
  if (!parsed) return '';
  const parts = parsed.rangeFrom || parsed;
  if (!parts || !parts.year) return '';
  const segs = [String(parts.year)];
  if (parts.month) segs.push(pad2(parts.month));
  if (parts.month && parts.day) segs.push(pad2(parts.day));
  return segs.join('-');
}

if (typeof module !== 'undefined') module.exports = { parseGedcomDate, formatGedcomDate, gedcomDateSortKey };


    function getNeighbours(personId, pMap, fMap) {
  const person = pMap[personId];
  if (!person) return [];
  const results = [];
  for (const famsPointer of [].concat(person.fams || [])) {
    const fam = fMap[famsPointer];
    if (!fam) continue;
    if (fam.husband && fam.husband !== personId && pMap[fam.husband])
      results.push({ id: fam.husband, via: 'spouse' });
    if (fam.wife && fam.wife !== personId && pMap[fam.wife])
      results.push({ id: fam.wife, via: 'spouse' });
    for (const childId of (fam.children || [])) {
      if (pMap[childId]) results.push({ id: childId, via: 'child' });
    }
  }
  const famc = person.famc ? fMap[person.famc] : null;
  if (famc) {
    if (famc.husband && pMap[famc.husband]) results.push({ id: famc.husband, via: 'parent' });
    if (famc.wife    && pMap[famc.wife   ]) results.push({ id: famc.wife,   via: 'parent' });
  }
  return results;
}

function findRelationPath(fromId, toId, pMap, fMap) {
  if (fromId === toId) return [fromId];
  const visited = new Set([fromId]);
  const queue = [[fromId]];
  while (queue.length) {
    const path = queue.shift();
    if (path.length > 20) continue;
    const current = path[path.length - 1];

    function gedcomDate(d) {
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
