function noteLines(text, level) {
  if (!text) return [];
  const [first, ...rest] = text.split('\n');
  const out = [`${level} NOTE ${first}`];
  for (const line of rest) out.push(`${level + 1} CONT ${line}`);
  return out;
}

function mediaPointer(personPointer) {
  return personPointer.replace(/^@I/, '@M');
}

function imageExtension(dataUri) {
  const m = dataUri.match(/^data:image\/(\w+);base64,/);
  if (!m) return 'jpg';
  return m[1] === 'jpeg' ? 'jpg' : m[1];
}

function exportToGedcom(people, families, { includeMediaRefs = false } = {}) {
  const lines = [];
  lines.push('0 HEAD');
  lines.push('1 GEDC');
  lines.push('2 VERS 5.5.1');
  lines.push('2 FORM LINEAGE-LINKED');
  lines.push('1 CHAR UTF-8');
  lines.push('1 SOUR FamilyTreeApp');
  lines.push(`1 DATE ${gedcomDate(new Date())}`);

  const sexMap = { M: 'M', F: 'F', other: 'U' };

  for (const p of people) {
    lines.push(`0 ${p.pointer} INDI`);
    if (p.fullname) {
      lines.push(`1 NAME ${p.fullname}`);
      if (p.givenname) lines.push(`2 GIVN ${p.givenname}`);
      if (p.surname)   lines.push(`2 SURN ${p.surname}`);
    }
    if (sexMap[p.sex]) lines.push(`1 SEX ${sexMap[p.sex]}`);
    if (p.date_of_birth || p.place_of_birth) {
      lines.push('1 BIRT');
      if (p.date_of_birth)  lines.push(`2 DATE ${p.date_of_birth}`);
      if (p.place_of_birth) lines.push(`2 PLAC ${p.place_of_birth}`);
    }
    // is_death is stored as "Y" (truthy string); a death date also implies death
    if (p.date_of_death || p.place_of_death || p.is_death) {
      lines.push('1 DEAT Y');
      if (p.date_of_death)  lines.push(`2 DATE ${p.date_of_death}`);
      if (p.place_of_death) lines.push(`2 PLAC ${p.place_of_death}`);
    }
    if (p.notes) lines.push(...noteLines(p.notes, 1));
    if (includeMediaRefs && p._hasImage) lines.push(`1 OBJE ${mediaPointer(p.pointer)}`);
    if (p.fams)  lines.push(`1 FAMS ${p.fams}`);
    if (p.famc)  lines.push(`1 FAMC ${p.famc}`);
  }

  for (const f of families) {
    lines.push(`0 ${f.pointer} FAM`);
    if (f.husband) lines.push(`1 HUSB ${f.husband}`);
    if (f.wife)    lines.push(`1 WIFE ${f.wife}`);
    for (const child of (f.children || [])) lines.push(`1 CHIL ${child}`);
    if (f.date_of_marriage || f.place_of_marriage) {
      lines.push('1 MARR');
      if (f.date_of_marriage)  lines.push(`2 DATE ${f.date_of_marriage}`);
      if (f.place_of_marriage) lines.push(`2 PLAC ${f.place_of_marriage}`);
    }
  }

  if (includeMediaRefs) {
    for (const p of people) {
      if (!p._hasImage) continue;
      const ext = imageExtension(p._imageDataUri);
      const filename = `media/${p.pointer}.${ext}`;
      lines.push(`0 ${mediaPointer(p.pointer)} OBJE`);
      lines.push(`1 FILE ${filename}`);
      lines.push(`2 FORM ${ext.toUpperCase()}`);
    }
  }

  lines.push('0 TRLR');
  return lines.join('\r\n') + '\r\n';
}

function exportZip(people, families, imageMap) {
  // Annotate people with image presence for OBJE record generation
  const annotated = people.map(p => {
    const uri = imageMap[p.pointer];
    return uri ? { ...p, _hasImage: true, _imageDataUri: uri } : p;
  });

  const gedText = exportToGedcom(annotated, families, { includeMediaRefs: true });

  const files = {};
  files['tree.ged'] = fflate.strToU8(gedText);

  for (const p of annotated) {
    if (!p._hasImage) continue;
    const uri = p._imageDataUri;
    const ext = imageExtension(uri);
    const b64 = uri.replace(/^data:image\/\w+;base64,/, '');
    // atob is available in browser; in Node (tests) we use Buffer
    const binary = typeof atob !== 'undefined'
      ? Uint8Array.from(atob(b64), c => c.charCodeAt(0))
      : Buffer.from(b64, 'base64');
    files[`media/${p.pointer}.${ext}`] = binary;
  }

  return fflate.zipSync(files, { level: 6 });
}

if (typeof module !== 'undefined') module.exports = { exportToGedcom, exportZip };


    const coordinates = [];
const toggleAreas = [];
const addRelativeAreas = [];
const collapsedNodes = new Set();
const nodeMap = new Map();
const originalChildren = new Map();
let selectedPersonId = null;
let layoutDirection  = 'TD'; // 'TD' (top-down) | 'LR' (left-to-right)

const PERSON_WIDTH = 200
const PERSON_HEIGHT = 100
const PERSON_PAD = 5
const COUPLE_DIST = 50;

const THEMES = {
  light: {
    canvasBg:    '#ffffff',
    cardFill:    '#ffffff',
    cardText:    '#000000',
    cardBorderM: '#19b2ce',
    cardBorderF: '#f00000',
    cardBorderX: '#cccccc',
    nodeOutline: '#000000',
    edge:        '#666666',
  },
  dark: {
    canvasBg:    '#16213e',
    cardFill:    '#1f2d47',
    cardText:    '#e0e0e0',
    cardBorderM: '#4fc3d8',
    cardBorderF: '#e05c5c',
    cardBorderX: '#555555',
    nodeOutline: '#aaaaaa',
    edge:        '#888888',
  },
};

let currentTheme = THEMES.light;

const mx = 500;
const my = 250;
const LR_MY = 300; // vertical slot height in LR mode; must exceed COUPLE_VERT_HEIGHT
const COUPLE_VERT_HEIGHT = PERSON_HEIGHT * 2 + COUPLE_DIST; // 250 — stacked couple height in LR



function addPersonToCoordinates(id, x, y) {
  coordinates.push({ id, x, y, width: PERSON_WIDTH, height: PERSON_HEIGHT })
}

function drawParentsChildEdge(
  ctx,
  p1x, p1y,
  p2x, p2y,
  p3x, p3y,
  p4x, p4y,
  color, radius = 10, round
) {
  ctx.beginPath();
  ctx.moveTo(p1x, p1y);
  ctx.lineTo(p2x, p2y);
  if (round && p3x !== p2x) {
    if (p3x > p2x) {
      ctx.lineTo(p3x - radius, p3y);
    } else {
      ctx.lineTo(p3x + radius, p3y);
    }
    ctx.arcTo(p3x, p3y, p4x, p4y, radius);
    ctx.lineTo(p4x, p4y);
  } else {
    ctx.lineTo(p3x, p3y);
    ctx.lineTo(p4x, p4y);
  }
  ctx.lineWidth = 1;
  ctx.strokeStyle = color;
  ctx.stroke();
}

function drawLine(ctx, x1, y1, x2, y2, lineColor) {
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.closePath();
  ctx.lineWidth = 1;
  ctx.strokeStyle = lineColor;
  ctx.stroke();
}

function drawDashedLine(ctx, x1, y1, x2, y2, color) {
  ctx.save();
  ctx.setLineDash([6, 4]);
  drawLine(ctx, x1, y1, x2, y2, color);
  ctx.restore();
}

function drawCircle(ctx, x, y, radius, color) {
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, 2 * Math.PI);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.stroke();
}

function drawToggleButton(ctx, x, y, collapsed) {
  const r = 10;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, 2 * Math.PI);
  ctx.fillStyle = currentTheme.cardFill;
  ctx.fill();
  ctx.strokeStyle = currentTheme.edge;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = currentTheme.cardText;
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(collapsed ? '+' : '\u2212', x, y + 1);
}

function drawRoundedRect(ctx, x, y, width, height, radius, borderColor, lineWidth = 1) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();

  ctx.lineWidth = lineWidth;
  ctx.fillStyle = currentTheme.cardFill;
  ctx.fill();
  ctx.strokeStyle = borderColor;
  ctx.stroke();
}

function childConnectionX(child, parentFamPointer) {
  if (child.type === 'couple') {
    let idx = child.dataIndex;
    if (parentFamPointer !== undefined) {
      const found = child.data.findIndex(p => p.famc === parentFamPointer);
      if (found >= 0) idx = found;
    }
    return child._x * mx + (idx === 0 ? -125 : 125);
  }
  if (child.type === 'chain') {
    let idx = child.dataIndex;
    if (parentFamPointer !== undefined) {
      const found = child.data.findIndex(p => p.famc === parentFamPointer);
      if (found >= 0) idx = found;
    }
    const cLeftX = child._x * mx - child.width / 2;
    return cLeftX + idx * (PERSON_WIDTH + COUPLE_DIST) + PERSON_WIDTH / 2;
  }
  return child._x * mx;
}

function drawNode(ctx, node) {
  const isCollapsed = collapsedNodes.has(node.id);

  if (node.type === 'chain') {
    for (let k = 0; k < (node.famsArray || []).length; k++) {
      const famPointer = node.famsArray[k];
      if (!collapsedNodes.has(node.id + '_' + famPointer)) {
        const famChildren = (node.childrenByFam || {})[famPointer] || [];
        for (const child of famChildren) {
          drawNode(ctx, child);
        }
      }
    }
    for (const famPointer of (node.soloFams || [])) {
      if (!collapsedNodes.has(node.id + '_' + famPointer)) {
        const famChildren = (node.childrenByFam || {})[famPointer] || [];
        for (const child of famChildren) {
          drawNode(ctx, child);
        }
      }
    }
  } else if (!isCollapsed) {
    for (const child of node.children) {
      // For couple nodes: check if this child belongs to a collapsed solo family
      if (node.soloFams && node.soloFams.length > 0) {
        const soloP = child.data.find(cp => cp.famc && node.soloFams.includes(cp.famc));
        if (soloP && collapsedNodes.has(node.id + '_' + soloP.famc)) continue;
      }
      drawNode(ctx, child);
    }
  }

  const width = node.width;
  const height = node.height;
  const isLR = layoutDirection === 'LR';
  const x = isLR ? node._x * mx                        : node._x * mx - width / 2;
  const y = isLR ? node._y * LR_MY - height / 2        : node._y * my;
  const pChildren = {};

  if (node.type === 'single') {
    const p = node.data[0];
    drawPerson(ctx, x, y, p.givenname, p.surname, p.dob, p.dod, p.img, p.sex, p.id === selectedPersonId, p.id);
    addPersonToCoordinates(p.id, x, y);

    if (node.children.length > 0) {
      let parentX, parentY;
      if (isLR) {
        parentX = x + PERSON_WIDTH;
        parentY = node._y * LR_MY;
      } else {
        parentX = x + PERSON_WIDTH / 2;
        parentY = y + PERSON_HEIGHT;
      }

      if (!isCollapsed) {
        for (const child of node.children) {
          if (isLR) {
            const childLeft = child._x * mx;
            let childY;
            if (child.type === 'couple') {
              const lrPersonOffset = COUPLE_VERT_HEIGHT / 2 - PERSON_HEIGHT / 2;
              const idx = child.data[0].famc === node.fams ? 0 : 1;
              childY = child._y * LR_MY + (idx === 0 ? -lrPersonOffset : lrPersonOffset);
            } else if (child.type === 'chain') {
              const lrSlot    = PERSON_HEIGHT + COUPLE_DIST;
              const totalH    = child.data.length * PERSON_HEIGHT + (child.data.length - 1) * COUPLE_DIST;
              const chainTopY = child._y * LR_MY - totalH / 2;
              const idx       = child.data.findIndex(cp => cp.famc === node.fams);
              childY = chainTopY + (idx >= 0 ? idx : 0) * lrSlot + PERSON_HEIGHT / 2;
            } else {
              childY = child._y * LR_MY;
            }
            const midX = (x + PERSON_WIDTH + childLeft) / 2;
            drawParentsChildEdge(ctx,
              parentX, parentY, midX, parentY, midX, childY, childLeft, childY,
              currentTheme.edge, 10, false);
          } else {
            const childX = childConnectionX(child, node.fams);
            const childY = child._y * my;
            const downDistance = childY - parentY;
            const round = !child.isSingle() && (child.isLeftMost() || child.isRightMost());
            drawParentsChildEdge(ctx,
              parentX, parentY,
              parentX, parentY + downDistance / 2,
              childX,  childY - downDistance / 2,
              childX,  childY,
              currentTheme.edge, 10, round);
          }
        }
      }

      const toggleX = isLR ? parentX + 20 : parentX;
      const toggleY = isLR ? parentY       : parentY + 20;
      drawToggleButton(ctx, toggleX, toggleY, isCollapsed);
      toggleAreas.push({ nodeId: node.id, nodeRef: node, x: toggleX, y: toggleY, r: 14 });
    }
  }

  if (node.type === 'couple') {
    const p1 = node.data[0];
    const p2 = node.data[1];

    if (isLR) {
      // Vertical arrangement: husband on top, wife below
      const coupleTopY = node._y * LR_MY - COUPLE_VERT_HEIGHT / 2;
      const wifeY      = coupleTopY + PERSON_HEIGHT + COUPLE_DIST;
      drawPerson(ctx, x, coupleTopY, p1.givenname, p1.surname, p1.dob, p1.dod, p1.img, p1.sex, p1.id === selectedPersonId, p1.id);
      addPersonToCoordinates(p1.id, x, coupleTopY);
      drawPerson(ctx, x, wifeY, p2.givenname, p2.surname, p2.dob, p2.dod, p2.img, p2.sex, p2.id === selectedPersonId, p2.id);
      addPersonToCoordinates(p2.id, x, wifeY);
      // Vertical bond line between the two persons
      drawLine(ctx, x + PERSON_WIDTH / 2, coupleTopY + PERSON_HEIGHT, x + PERSON_WIDTH / 2, wifeY, currentTheme.edge);
      pChildren.x = x + PERSON_WIDTH / 2;
      pChildren.y = node._y * LR_MY;
    } else {
      drawPerson(ctx, x, y, p1.givenname, p1.surname, p1.dob, p1.dod, p1.img, p1.sex, p1.id === selectedPersonId, p1.id);
      addPersonToCoordinates(p1.id, x, y);
      drawPerson(ctx, x + PERSON_WIDTH + COUPLE_DIST, y, p2.givenname, p2.surname, p2.dob, p2.dod, p2.img, p2.sex, p2.id === selectedPersonId, p2.id);
      addPersonToCoordinates(p2.id, x + PERSON_WIDTH + COUPLE_DIST, y);
      drawLine(ctx, x + PERSON_WIDTH, y + PERSON_HEIGHT / 2, x + PERSON_WIDTH + COUPLE_DIST, y + PERSON_HEIGHT / 2, currentTheme.edge);
      pChildren.x = x + PERSON_WIDTH + COUPLE_DIST / 2;
      pChildren.y = y + PERSON_HEIGHT / 2;
    }

    // For each child, determine if it belongs to one of this node's solo families.
    // Solo-family children exit from the owning parent's card center, not the couple midpoint.
    const getSoloFamc = (child) => {
      if (!node.soloFams || node.soloFams.length === 0) return null;
      const p = child.data.find(cp => cp.famc && node.soloFams.includes(cp.famc));
      return p ? p.famc : null;
    };

    if (!isCollapsed) {
      for (const child of node.children) {
        const soloFamc = getSoloFamc(child);
        if (soloFamc) {
          // Solo-family child: connector exits from the owning person's card center
          const isFamCollapsed = collapsedNodes.has(node.id + '_' + soloFamc);
          if (isFamCollapsed) continue;
          const famRecord = fMap[soloFamc];
          const ownerIdx  = famRecord
            ? node.data.findIndex(p => p.id === famRecord.husband || p.id === famRecord.wife)
            : 0;
          const safeIdx = ownerIdx >= 0 ? ownerIdx : 0;
          if (isLR) {
            const coupleTopY = node._y * LR_MY - COUPLE_VERT_HEIGHT / 2;
            const ownerY     = coupleTopY + safeIdx * (PERSON_HEIGHT + COUPLE_DIST) + PERSON_HEIGHT / 2;
            const childLeft  = child._x * mx;
            let childY;
            if (child.type === 'couple') {
              const lrPersonOffset = COUPLE_VERT_HEIGHT / 2 - PERSON_HEIGHT / 2;
              const idx = child.data.findIndex(p => p.famc === soloFamc);
              childY = child._y * LR_MY + (idx <= 0 ? -lrPersonOffset : lrPersonOffset);
            } else if (child.type === 'chain') {
              const lrSlot    = PERSON_HEIGHT + COUPLE_DIST;
              const totalH    = child.data.length * PERSON_HEIGHT + (child.data.length - 1) * COUPLE_DIST;
              const chainTopY = child._y * LR_MY - totalH / 2;
              const idx       = child.data.findIndex(p => p.famc === soloFamc);
              childY = chainTopY + (idx >= 0 ? idx : 0) * lrSlot + PERSON_HEIGHT / 2;
            } else {
              childY = child._y * LR_MY;
            }
            const parentRight = x + PERSON_WIDTH;
            const midX = parentRight + (childLeft - parentRight) / 4;
            drawParentsChildEdge(ctx,
              parentRight, ownerY, midX, ownerY, midX, childY, childLeft, childY,
              currentTheme.edge, 10, false
            );
          } else {
            const ownerX      = x + safeIdx * (PERSON_WIDTH + COUPLE_DIST) + PERSON_WIDTH / 2;
            const ownerBottom = y + PERSON_HEIGHT;
            const childX      = childConnectionX(child, soloFamc);
            const childY      = child._y * my;
            const downDist    = childY - ownerBottom;
            const round       = !child.isSingle() && (child.isLeftMost() || child.isRightMost());
            drawParentsChildEdge(ctx,
              ownerX, ownerBottom, ownerX, ownerBottom + downDist / 2,
              childX, childY - downDist / 2, childX, childY,
              currentTheme.edge, 10, round
            );
          }
        } else {
          // Regular child: connector exits from couple midpoint
          if (isLR) {
            const childLeft = child._x * mx;
            const childX = childLeft;
            let childY;
            if (child.type === 'couple') {
              const lrPersonOffset = COUPLE_VERT_HEIGHT / 2 - PERSON_HEIGHT / 2;
              const idx = child.data[0].famc === node.fams ? 0 : 1;
              childY = child._y * LR_MY + (idx === 0 ? -lrPersonOffset : lrPersonOffset);
            } else if (child.type === 'chain') {
              const lrSlot    = PERSON_HEIGHT + COUPLE_DIST;
              const totalH    = child.data.length * PERSON_HEIGHT + (child.data.length - 1) * COUPLE_DIST;
              const chainTopY = child._y * LR_MY - totalH / 2;
              const idx       = child.data.findIndex(p => p.famc === node.fams);
              childY = chainTopY + (idx >= 0 ? idx : 0) * lrSlot + PERSON_HEIGHT / 2;
            } else {
              childY = child._y * LR_MY;
            }
            const midX = (x + PERSON_WIDTH + childLeft) / 2;
            drawParentsChildEdge(ctx,
              pChildren.x, pChildren.y,
              midX, pChildren.y,
              midX, childY,
              childX, childY,
              currentTheme.edge, 10, false
            );
          } else {
            const childX = childConnectionX(child, node.fams);
            const childY = child._y * my;
            const downDistance = childY - pChildren.y;
            const round = !child.isSingle() && (child.isLeftMost() || child.isRightMost());
            drawParentsChildEdge(ctx,
              pChildren.x, pChildren.y,
              pChildren.x, pChildren.y + downDistance / 2,
              childX, childY - downDistance / 2,
              childX, childY,
              currentTheme.edge, 10, round
            );
          }
        }
      }
    }

    const hasRegularChildren = node.children.some(c => !getSoloFamc(c));
    if (hasRegularChildren) {
      const toggleX = isLR ? pChildren.x + 20 : pChildren.x;
      const toggleY = isLR ? pChildren.y       : pChildren.y + 20;
      drawToggleButton(ctx, toggleX, toggleY, isCollapsed);
      toggleAreas.push({ nodeId: node.id, nodeRef: node, x: toggleX, y: toggleY, r: 14 });
    }

    // Toggle buttons for solo-family children (per owning parent's card center)
    for (const famPointer of (node.soloFams || [])) {
      if (!node.children.some(c => getSoloFamc(c) === famPointer)) continue;
      const isFamCollapsed = collapsedNodes.has(node.id + '_' + famPointer);
      const famRecord      = fMap[famPointer];
      const ownerIdx       = famRecord
        ? node.data.findIndex(p => p.id === famRecord.husband || p.id === famRecord.wife)
        : 0;
      const safeIdx = ownerIdx >= 0 ? ownerIdx : 0;
      if (isLR) {
        const coupleTopY  = node._y * LR_MY - COUPLE_VERT_HEIGHT / 2;
        const ownerY      = coupleTopY + safeIdx * (PERSON_HEIGHT + COUPLE_DIST) + PERSON_HEIGHT / 2;
        drawToggleButton(ctx, x + PERSON_WIDTH + 20, ownerY, isFamCollapsed);
        toggleAreas.push({ nodeId: node.id + '_' + famPointer, nodeRef: node,
                           x: x + PERSON_WIDTH + 20, y: ownerY, r: 14 });
      } else {
        const ownerDropX    = x + safeIdx * (PERSON_WIDTH + COUPLE_DIST) + PERSON_WIDTH / 2;
        const ownerBottom   = y + PERSON_HEIGHT;
        drawToggleButton(ctx, ownerDropX, ownerBottom + 20, isFamCollapsed);
        toggleAreas.push({ nodeId: node.id + '_' + famPointer, nodeRef: node,
                           x: ownerDropX, y: ownerBottom + 20, r: 14 });
      }
    }
  }

  if (node.type === 'chain') {
    const n         = node.data.length;
    const sharedIdx = node.dataIndex;

    if (isLR) {
      // LR mode: stack persons vertically, bond lines vertical, children exit right
      const lrSlot    = PERSON_HEIGHT + COUPLE_DIST;          // 150px per person slot
      const totalH    = n * PERSON_HEIGHT + (n - 1) * COUPLE_DIST;
      const chainTopY = node._y * LR_MY - totalH / 2;

      for (let k = 0; k < n; k++) {
        const p  = node.data[k];
        const py = chainTopY + k * lrSlot;
        drawPerson(ctx, x, py, p.givenname, p.surname, p.dob, p.dod, p.img, p.sex, p.id === selectedPersonId, p.id);
        addPersonToCoordinates(p.id, x, py);

        if (k < n - 1) {
          const isDirect = k === sharedIdx || k + 1 === sharedIdx;
          const bondFromY = py + PERSON_HEIGHT;
          const bondToY   = py + lrSlot;
          if (isDirect) {
            drawLine(ctx, x + PERSON_WIDTH / 2, bondFromY, x + PERSON_WIDTH / 2, bondToY, currentTheme.edge);
          } else {
            drawDashedLine(ctx, x + PERSON_WIDTH / 2, bondFromY, x + PERSON_WIDTH / 2, bondToY, currentTheme.edge);
          }
        }
      }

      for (let k = 0; k < (node.famsArray || []).length; k++) {
        const famPointer     = node.famsArray[k];
        const famChildren    = (node.childrenByFam || {})[famPointer] || [];
        const isFamCollapsed = collapsedNodes.has(node.id + '_' + famPointer);
        // Bond center Y for family k = gap between person k and k+1
        const bondCenterY = chainTopY + (k + 1) * lrSlot - COUPLE_DIST / 2;
        const connX       = x + PERSON_WIDTH / 2;

        if (!isFamCollapsed) {
          for (const child of famChildren) {
            const childLeft = child._x * mx;
            const lrPersonOffset = COUPLE_VERT_HEIGHT / 2 - PERSON_HEIGHT / 2;
            const lrCoupleChildIdx = child.type === 'couple'
              ? (child.data[0].famc === famPointer ? 0 : 1)
              : 0;
            const childY = child.type === 'couple'
              ? child._y * LR_MY + (lrCoupleChildIdx === 0 ? -lrPersonOffset : lrPersonOffset)
              : child._y * LR_MY;
            const midX = (x + PERSON_WIDTH + childLeft) / 2;
            drawParentsChildEdge(ctx,
              connX, bondCenterY, midX, bondCenterY, midX, childY, childLeft, childY,
              currentTheme.edge, 10, false
            );
          }
        }
        if (famChildren.length > 0) {
          drawToggleButton(ctx, connX + 20, bondCenterY, isFamCollapsed);
          toggleAreas.push({ nodeId: node.id + '_' + famPointer, nodeRef: node, x: connX + 20, y: bondCenterY, r: 14 });
        }
      }
    } else {
      // TD mode: persons side by side, bond lines horizontal, children exit downward
      const nodeY  = y;
      const midY   = nodeY + PERSON_HEIGHT / 2;
      const leftX  = x;

      for (let k = 0; k < n; k++) {
        const p  = node.data[k];
        const px = leftX + k * (PERSON_WIDTH + COUPLE_DIST);
        drawPerson(ctx, px, nodeY, p.givenname, p.surname, p.dob, p.dod, p.img, p.sex, p.id === selectedPersonId, p.id);
        addPersonToCoordinates(p.id, px, nodeY);

        if (k < n - 1) {
          const x1 = px + PERSON_WIDTH;
          const x2 = x1 + COUPLE_DIST;
          const isDirect = k === sharedIdx || k + 1 === sharedIdx;
          if (isDirect) {
            drawLine(ctx, x1, midY, x2, midY, currentTheme.edge);
          } else {
            drawDashedLine(ctx, x1, midY, x2, midY, currentTheme.edge);
          }
        }
      }

      for (let k = 0; k < (node.famsArray || []).length; k++) {
        const famPointer     = node.famsArray[k];
        const famChildren    = (node.childrenByFam || {})[famPointer] || [];
        const isFamCollapsed = collapsedNodes.has(node.id + '_' + famPointer);
        const dropX = leftX + k * (PERSON_WIDTH + COUPLE_DIST) + PERSON_WIDTH + COUPLE_DIST / 2;

        if (!isFamCollapsed) {
          for (const child of famChildren) {
            const childX   = childConnectionX(child, famPointer);
            const childY   = child._y * my;
            const downDist = childY - midY;
            const round    = !child.isSingle() && (child.isLeftMost() || child.isRightMost());
            drawParentsChildEdge(ctx,
              dropX, midY, dropX, midY + downDist / 2,
              childX, childY - downDist / 2, childX, childY,
              currentTheme.edge, 10, round
            );
          }
        }
        if (famChildren.length > 0) {
          drawToggleButton(ctx, dropX, midY + 20, isFamCollapsed);
          toggleAreas.push({ nodeId: node.id + '_' + famPointer, nodeRef: node, x: dropX, y: midY + 20, r: 14 });
        }
      }

      // Solo families: child line exits from the anchor person's own card centre
      const anchorDropX = leftX + sharedIdx * (PERSON_WIDTH + COUPLE_DIST) + PERSON_WIDTH / 2;
      for (const famPointer of (node.soloFams || [])) {
        const famChildren    = (node.childrenByFam || {})[famPointer] || [];
        const isFamCollapsed = collapsedNodes.has(node.id + '_' + famPointer);

        if (!isFamCollapsed) {
          for (const child of famChildren) {
            const childX   = childConnectionX(child, famPointer);
            const childY   = child._y * my;
            const downDist = childY - midY;
            const round    = !child.isSingle() && (child.isLeftMost() || child.isRightMost());
            drawParentsChildEdge(ctx,
              anchorDropX, midY, anchorDropX, midY + downDist / 2,
              childX, childY - downDist / 2, childX, childY,
              currentTheme.edge, 10, round
            );
          }
        }
        if (famChildren.length > 0) {
          drawToggleButton(ctx, anchorDropX, midY + 20, isFamCollapsed);
          toggleAreas.push({ nodeId: node.id + '_' + famPointer, nodeRef: node,
                             x: anchorDropX, y: midY + 20, r: 14 });
        }
      }
    }
  }
}

function drawPerson(ctx, x, y, name, surname, dob, dod, preloadedImg, sex, selected = false, personId = null) {
  // border
  let borderColor = currentTheme.cardBorderX;
  if (sex === "M") {
    borderColor = currentTheme.cardBorderM;
  } else if (sex === "F") {
    borderColor = currentTheme.cardBorderF;
  }

  drawRoundedRect(ctx, x, y, PERSON_WIDTH, PERSON_HEIGHT, PERSON_PAD, borderColor, selected ? 3 : 1)

  ctx.drawImage(preloadedImg, x + PERSON_PAD, y + PERSON_PAD, 90, 90)

  // name
  const fontHeight1 = 18;
  const fontHeight1b = 12;
  ctx.fillStyle = currentTheme.cardText;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const textX = x + PERSON_PAD + 90 + PERSON_PAD;
  const textY = y + PERSON_PAD + PERSON_PAD;

  const nameParts = (name || '').split(' ').filter(Boolean);
  ctx.font = fontHeight1 + 'px Arial';
  ctx.fillText(nameParts[0], textX, textY);
  if (nameParts.length > 1) {
    const firstWidth = ctx.measureText(nameParts[0] + ' ').width;
    ctx.font = fontHeight1b + 'px Arial';
    ctx.fillText(nameParts.slice(1).join(' '), textX + firstWidth, textY + (fontHeight1 - fontHeight1b));
    ctx.font = fontHeight1 + 'px Arial';
  }
  ctx.fillText(surname, textX, textY + fontHeight1);

  // dates
  const fontHeight2 = 11;
  ctx.font = fontHeight2 + 'px Monaco';
  if (dob) {
    ctx.fillText(t('person.born') + formatGedcomDate(dob), textX, textY + PERSON_PAD + 2 * fontHeight1 + PERSON_PAD);
  }
  if (dod) {
    ctx.fillText(t('person.died') + formatGedcomDate(dod), textX, textY + PERSON_PAD + 2 * fontHeight1 + PERSON_PAD + fontHeight2);
  }

  if (personId) {
    const badgeX = x + PERSON_WIDTH - 10;
    const badgeY = y + PERSON_HEIGHT - 10;
    const badgeR = 9;
    ctx.beginPath();
    ctx.arc(badgeX, badgeY, badgeR, 0, 2 * Math.PI);
    ctx.fillStyle = '#999999';
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('+', badgeX, badgeY + 1);
    addRelativeAreas.push({ personId, x: badgeX, y: badgeY, r: badgeR + 4 });
  }
}

function compareDatesDob(p1, p2, reverse = false) {
  const keyA = p1.dob ? gedcomDateSortKey(p1.dob) : '';
  const keyB = p2.dob ? gedcomDateSortKey(p2.dob) : '';
  const cmp  = keyA < keyB ? -1 : keyA > keyB ? 1 : 0;
  return reverse ? -cmp : cmp;
}


async function unwrapDek(slot, password, iterations) {
  if (!crypto.subtle) throw new Error('crypto.subtle not available');
  const keyMaterial = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
  );
  const kek = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: base64ToUint8Array(slot.salt), iterations, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    true,
    ['decrypt']
  );
  const rawDek = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: base64ToUint8Array(slot.nonce) },
    kek,
    base64ToUint8Array(slot.wrappedKey)
  );
  return new Uint8Array(rawDek);
}

async function decryptData(rawDek, nonce, cipherText) {
  const key = await crypto.subtle.importKey(
    'raw', rawDek, { name: 'AES-GCM' }, false, ['decrypt']
  );
  return crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, cipherText);
}

function base64ToUint8Array(base64String) {
  const binaryString = atob(base64String);
  const length = binaryString.length;
  const uint8Array = new Uint8Array(length);
  for (let i = 0; i < length; i++) {
      uint8Array[i] = binaryString.charCodeAt(i);
  }
  return uint8Array;
}

function uint8ArrayToBase64(bytes) {
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

async function inflate(buf) {
  const ds = new DecompressionStream('deflate-raw');
  const writer = ds.writable.getWriter();
  writer.write(new Uint8Array(buf));
  writer.close();
  return new Response(ds.readable).arrayBuffer();
}

async function deflate(bytes) {
  const cs = new CompressionStream('deflate-raw');
  const writer = cs.writable.getWriter();
  writer.write(bytes);
  writer.close();
  return new Uint8Array(await new Response(cs.readable).arrayBuffer());
}

async function encryptWithPasswords(plaintext, passwords) {
  const enc        = new TextEncoder();
  const iterations = 5000000;

  const dek        = crypto.getRandomValues(new Uint8Array(32));
  const dataNonce  = crypto.getRandomValues(new Uint8Array(12));
  const dekKey     = await crypto.subtle.importKey('raw', dek, 'AES-GCM', false, ['encrypt']);
  const compressed = await deflate(enc.encode(plaintext));
  const cipherBuf  = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: dataNonce }, dekKey, compressed);

  const slots = [];
  for (const password of passwords) {
    const salt      = crypto.getRandomValues(new Uint8Array(32));
    const slotNonce = crypto.getRandomValues(new Uint8Array(12));
    const keyMat    = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const kek       = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
      keyMat,
      { name: 'AES-GCM', length: 256 },
      true,
      ['encrypt']
    );
    const rawKek     = await crypto.subtle.exportKey('raw', kek);
    const kekEnc     = await crypto.subtle.importKey('raw', rawKek, 'AES-GCM', false, ['encrypt']);
    const wrappedBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: slotNonce }, kekEnc, dek);
    slots.push({
      salt:       uint8ArrayToBase64(salt),
      nonce:      uint8ArrayToBase64(slotNonce),
      wrappedKey: uint8ArrayToBase64(new Uint8Array(wrappedBuf)),
    });
  }

  return {
    iterations,
    compressed: true,
    nonce:      uint8ArrayToBase64(dataNonce),
    cipherText: uint8ArrayToBase64(new Uint8Array(cipherBuf)),
    slots,
  };
}

async function encryptData(plaintext, password) {
  return encryptWithPasswords(plaintext, [password]);
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const text = t(el.dataset.i18n);
    if (el.children.length === 0) {
      el.textContent = text;
    } else {
      // Element has child elements (e.g. label > input) — update only the leading text node
      let found = false;
      for (const node of el.childNodes) {
        if (node.nodeType === 3) { node.textContent = text; found = true; break; }
      }
      if (!found) el.insertBefore(document.createTextNode(text), el.firstChild);
    }
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
}

applyTranslations();

const _NS             = location.pathname.replace(/\/$/, '') || '/';
const SCRATCH_KEY     = _NS + ':familyTreeScratch';
const SCRATCH_ROOT_KEY = _NS + ':familyTreeScratchRoot';
const NEW_PEOPLE_KEY_NS = _NS + ':familyTreeNewPeople';

async function main(data, canvas) {
  const fams = data.fams
  const rootId = data.rootId;
  const images = data.images;

  const originalById = new Map(data.people.map(p => [p.pointer, p]));
  const EDITS_KEY            = _NS + ':familyTreeEdits';
  const WEBHOOK_EMAIL_KEY    = _NS + ':familyTreeWebhookEmail';
  const IMAGES_KEY           = _NS + ':familyTreeImages';
  const NEW_PEOPLE_KEY       = NEW_PEOPLE_KEY_NS;
  const FAMILY_EDITS_KEY     = _NS + ':familyTreeFamilyEdits';
  const PINNED_KEY           = _NS + ':familyTreePinnedPerson';
  const HIDE_SAVED_MODAL_KEY = _NS + ':familyTreeHideSavedModal';
  const DATA_VERSION_KEY     = _NS + ':familyTreeDataVersion';
  const LAYOUT_KEY           = _NS + ':familyTreeLayout';
  const SELECTED_KEY         = _NS + ':selected-' + rootId;
  const VIEW_KEY             = _NS + ':view-' + rootId;
  const THEME_KEY            = _NS + ':theme';
  const RELATION_A_KEY       = _NS + ':familyTree.relationA';
  const RELATION_B_KEY       = _NS + ':familyTree.relationB';

  let edits = {};
  try { edits = JSON.parse(localStorage.getItem(EDITS_KEY) || '{}'); } catch (_) {}

  let imageEdits = {};
  try { imageEdits = JSON.parse(localStorage.getItem(IMAGES_KEY) || '{}'); } catch (_) {}
  let newPeople = {};
  let familyEdits = {};
  try { newPeople   = JSON.parse(localStorage.getItem(NEW_PEOPLE_KEY)   || '{}'); } catch (_) {}
  try { familyEdits = JSON.parse(localStorage.getItem(FAMILY_EDITS_KEY) || '{}'); } catch (_) {}

  let root;
  let allPeopleByPointer = new Map();
  let searchIndex = [];

  const FIELD_LABELS = {
    givenname:      'field.givenname',
    surname:        'field.surname',
    fullname:       'field.fullname',
    date_of_birth:  'field.date_of_birth',
    date_of_death:  'field.date_of_death',
    place_of_birth: 'field.place_of_birth',
    sex:            'field.sex',
  };

  function showConflictModal(conflicts) {
    return new Promise(resolve => {
      const modal   = document.getElementById('conflict-modal');
      const summary = document.getElementById('conflict-summary');
      const list    = document.getElementById('conflict-list');

      summary.textContent = t('conflict.summary', conflicts.length);

      list.innerHTML = '';
      for (const { personId, field, localValue, canonicalValue } of conflicts) {
        const person = originalById.get(personId);
        const name   = person ? `${person.givenname || ''} ${person.surname || ''}`.trim() || personId : personId;
        const label  = t(FIELD_LABELS[field] || field);
        const nameAttr = `c-${personId}-${field}`.replace(/[^a-zA-Z0-9-]/g, '_');
        const row = document.createElement('div');
        row.className = 'conflict-row';
        row.innerHTML = `
          <div class="conflict-person">${name}</div>
          <div class="conflict-field">${label}</div>
          <label class="conflict-choice">
            <input type="radio" name="${nameAttr}" value="local" checked>
            ${t('conflict.myEdit')} <strong>${localValue || t('conflict.empty')}</strong>
          </label>
          <label class="conflict-choice">
            <input type="radio" name="${nameAttr}" value="canonical">
            ${t('conflict.newData')} <strong>${canonicalValue || t('conflict.empty')}</strong>
          </label>`;
        list.appendChild(row);
      }

      document.getElementById('conflict-keep-all').onclick = () => {
        list.querySelectorAll('input[value="local"]').forEach(r => { r.checked = true; });
      };
      document.getElementById('conflict-accept-all').onclick = () => {
        list.querySelectorAll('input[value="canonical"]').forEach(r => { r.checked = true; });
      };
      document.getElementById('conflict-done').onclick = () => {
        for (const { personId, field } of conflicts) {
          const nameAttr = `c-${personId}-${field}`.replace(/[^a-zA-Z0-9-]/g, '_');
          const chosen = list.querySelector(`input[name="${nameAttr}"]:checked`)?.value;
          if (chosen === 'canonical') {
            if (edits[personId]) {
              delete edits[personId][field];
              if (Object.keys(edits[personId]).length === 0) delete edits[personId];
            }
          }
        }
        localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
        localStorage.setItem(DATA_VERSION_KEY, data.dataVersion);
        modal.style.display = 'none';
        resolve();
      };

      modal.style.display = 'flex';
    });
  }

  async function checkVersionConflicts() {
    const storedVersion  = parseInt(localStorage.getItem(DATA_VERSION_KEY) || '0', 10);
    const currentVersion = data.dataVersion || 0;
    const versionBumped  = currentVersion > storedVersion;

    const conflicts = [];
    let autoResolved = 0;

    for (const personId of Object.keys(edits)) {
      const original = originalById.get(personId);
      if (!original) continue;

      const deltaFields = { ...edits[personId] };
      for (const [field, localValue] of Object.entries(deltaFields)) {
        const canonicalValue = original[field];
        const canonicalEmpty = canonicalValue == null || canonicalValue === '';

        if (canonicalEmpty) continue;

        if (localValue === canonicalValue) {
          delete edits[personId][field];
          autoResolved++;
          continue;
        }

        if (versionBumped) conflicts.push({ personId, field, localValue, canonicalValue });
      }

      if (edits[personId] && Object.keys(edits[personId]).length === 0) delete edits[personId];
    }

    // Also clean up imageEdits entries that exactly match canonical data (baked-in images).
    let imageAutoResolved = 0;
    for (const id of Object.keys(imageEdits)) {
      if (imageEdits[id] !== '' && imageEdits[id] === data.images[id]) {
        delete imageEdits[id];
        imageAutoResolved++;
      }
    }
    if (imageAutoResolved > 0) localStorage.setItem(IMAGES_KEY, JSON.stringify(imageEdits));

    if (autoResolved > 0) localStorage.setItem(EDITS_KEY, JSON.stringify(edits));

    if (versionBumped) {
      if (conflicts.length > 0) {
        await showConflictModal(conflicts);
      } else {
        localStorage.setItem(DATA_VERSION_KEY, currentVersion);
      }
    }
  }

  await checkVersionConflicts();

  async function rebuildGraph() {
    // Merge base data with field edits + new people
    const effectivePeople = data.people.map(p => {
      const delta = edits[p.pointer];
      return delta ? { ...p, ...delta } : p;
    }).filter(p => !p.removed).concat(
      Object.entries(newPeople).map(([pointer, fields]) => ({ pointer, ...fields })).filter(p => !p.removed)
    );

    // Merge base families with patches + new families
    const allFamilies = data.fams.map(f => {
      const patch = familyEdits[f.pointer];
      return patch ? { ...f, ...patch } : f;
    }).concat(
      Object.entries(familyEdits)
        .filter(([, v]) => v._new)
        .map(([pointer, fields]) => {
          const { _new, ...rest } = fields;
          return { pointer, ...rest };
        })
    );

    // Raw pointer → record map for addRelative (before Indyvidual wrapping)
    allPeopleByPointer = new Map(effectivePeople.map(p => [p.pointer, p]));

    pMap = await effectivePeople.reduce(async (accPromise, obj) => {
      const acc = await accPromise;
      if (images[obj.pointer]) obj.img = images[obj.pointer];
      const p = new Indyvidual(rootId, obj);
      await p.init();
      acc[obj.pointer] = p;
      return acc;
    }, Promise.resolve({}));

    fMap = allFamilies.reduce((acc, obj) => {
      acc[obj.pointer] = obj;
      return acc;
    }, {});

    // Apply stored image overrides ('' = removal sentinel → placeholder)
    for (const [id, base64] of Object.entries(imageEdits)) {
      const person = pMap[id];
      if (!person) continue;
      const src = base64 === '' ? person.placeholderBase64Img : base64;
      person.base64Img = src;
      const img = new Image();
      img.src = src;
      await new Promise(resolve => { img.onload = img.onerror = resolve; });
      person.img = img;
    }

    // Split people by ancestry level from root
    const levelData = [];
    for (const i of Object.values(pMap)) {
      let dist = -1;
      try {
        dist = i.getDistanceFromRoot();
        if (dist !== undefined && dist !== -1) {
          if (!levelData[dist]) levelData[dist] = [];
          levelData[dist].push(i);
        } else {
          // Not a direct descendant — check if spouse of one
          if (i.fams && fMap[i.fams]) {
            const spouseFamily = fMap[i.fams];
            let partnerDist;
            if (spouseFamily.husband === i.id && spouseFamily.wife && pMap[spouseFamily.wife]) {
              partnerDist = pMap[spouseFamily.wife].getDistanceFromRoot();
            } else if (spouseFamily.wife === i.id && spouseFamily.husband && pMap[spouseFamily.husband]) {
              partnerDist = pMap[spouseFamily.husband].getDistanceFromRoot();
            }
            if (partnerDist !== undefined) {
              if (!levelData[partnerDist]) levelData[partnerDist] = [];
              levelData[partnerDist].push(i);
            }
          }
        }
      } catch (e) {
        console.log(i.fullname, e);
      }
    }

    // Sort each level by parent family order then DOB
    for (let i = 0; i < levelData.length; i++) {
      const level = levelData[i];
      let previousLevelOrder = null;
      if (i > 0) previousLevelOrder = levelData[i - 1].map(p => p.fams);
      level.sort((p1, p2) => {
        if (previousLevelOrder && p1.famc && p2.famc && p1.famc !== p2.famc) {
          return previousLevelOrder.indexOf(p1.famc) - previousLevelOrder.indexOf(p2.famc);
        }
        return compareDatesDob(p1, p2);
      });
    }

    // Build graph nodes
    const graph = [];
    let id = 1;

    function resolveFams(p, pp) {
      if (p.fams && !pp.fams) return p.fams;
      if (!p.fams && pp.fams) return pp.fams;
      if (!p.fams && !pp.fams) return undefined;
      const pf = fMap[p.fams];
      const ppf = fMap[pp.fams];
      if (pf && ((pf.wife === p.id && pf.husband === pp.id) || (pf.wife === pp.id && pf.husband === p.id))) return p.fams;
      if (ppf && ((ppf.wife === p.id && ppf.husband === pp.id) || (ppf.wife === pp.id && ppf.husband === p.id))) return pp.fams;
      return p.fams;
    }

    for (let i = 0; i < levelData.length; i++) {
      const level = levelData[i];
      const graphLayer = [];
      graph.push(graphLayer);
      let nodeIndex = 0;
      let prevFamc;

      const chainAnchors = new Set();
      for (const p of level) {
        if (p.findPartners().length >= 2) chainAnchors.add(p.id);
      }
      const processedInChain = new Set();
      const orderedLevel = [
        ...level.filter(p => chainAnchors.has(p.id)),
        ...level.filter(p => !chainAnchors.has(p.id)),
      ];

      for (const p of orderedLevel) {
        if (prevFamc !== undefined && p.famc !== undefined && prevFamc !== p.famc) nodeIndex = 0;
        prevFamc = p.famc;
        if (processedInChain.has(p.id)) continue;

        const partners = p.findPartners().filter(pp => !processedInChain.has(pp.id));

        if (partners.length === 0) {
          const singleNode = new Node(id, 'single', [p], nodeIndex, i, 0, p.fams);
          singleNode.soloFams = Object.values(fMap)
            .filter(f => (f.husband === p.id && !f.wife) || (f.wife === p.id && !f.husband))
            .map(f => f.pointer);
          graphLayer.push(singleNode);
          nodeIndex++; id++;
        } else if (partners.length === 1) {
          const pp = partners[0];
          const nodeFams = resolveFams(p, pp);
          let nodeData, dataIndex;
          if (p.sex === 'M') { dataIndex = 0; nodeData = [p, pp]; }
          else               { nodeData = [pp, p]; dataIndex = 1; }
          const coupleNode = new Node(id, 'couple', nodeData, nodeIndex, i, dataIndex, nodeFams);
          // Check both members — iteration order determines which is `p` vs `pp`
          coupleNode.soloFams = Object.values(fMap)
            .filter(f =>
              (f.husband === p.id  && !f.wife) || (f.wife === p.id  && !f.husband) ||
              (f.husband === pp.id && !f.wife) || (f.wife === pp.id && !f.husband)
            )
            .map(f => f.pointer);
          graphLayer.push(coupleNode);
          processedInChain.add(p.id); processedInChain.add(pp.id);
          nodeIndex++; id++;
        } else {
          const sortedSpouses = [...partners].sort((a, b) => compareDatesDob(a, b));
          const famsArr = sortedSpouses.map(pp => resolveFams(p, pp));
          const isMale = p.sex !== 'F';
          const chainData = isMale ? [p, ...sortedSpouses] : [...sortedSpouses, p];
          const sharedPersonIndex = isMale ? 0 : chainData.length - 1;
          const chainNode = new Node(id, 'chain', chainData, nodeIndex, i, sharedPersonIndex, famsArr[0], famsArr);
          chainNode.soloFams = Object.values(fMap)
            .filter(f => (f.husband === p.id && !f.wife) || (f.wife === p.id && !f.husband))
            .map(f => f.pointer)
            .filter(fp => !famsArr.includes(fp));
          graphLayer.push(chainNode);
          processedInChain.add(p.id);
          for (const pp of sortedSpouses) processedInChain.add(pp.id);
          nodeIndex++; id++;
        }
      }
    }

    function nodeOwnsFamily(node, famPointer) {
      if (node.fams === famPointer) return true;
      if (node.famsArray && node.famsArray.includes(famPointer)) return true;
      if (node.soloFams && node.soloFams.includes(famPointer)) return true;
      return false;
    }

    // Link children to parents
    for (let i = graph.length - 2; i >= 0; i--) {
      for (const parentNode of graph[i]) {
        for (const childNode of graph[i + 1]) {
          for (const child of childNode.data) {
            if (child.famc !== undefined && nodeOwnsFamily(parentNode, child.famc)) {
              if (!parentNode.children.includes(childNode)) {
                parentNode.children.push(childNode);
                childNode.setParent(parentNode);
              }
              if (!parentNode.childrenByFam) parentNode.childrenByFam = {};
              if (!parentNode.childrenByFam[child.famc]) parentNode.childrenByFam[child.famc] = [];
              if (!parentNode.childrenByFam[child.famc].includes(childNode))
                parentNode.childrenByFam[child.famc].push(childNode);
            }
          }
        }
      }
    }

    if (graph[0] && graph[0].length === 1) {
      root = graph[0][0];
    } else if (graph[0]) {
      root = new Node('rootId', 'fake', [], 0, 0);
      for (const c of graph[0]) { root.children.push(c); c.setParent(root); }
    }

    for (let y = 0; y < graph.length; y++) {
      for (const node of graph[y]) node._y = y + 1;
    }
    currentLayout(root);

    nodeMap.clear();
    originalChildren.clear();
    for (const layer of graph) {
      for (const node of layer) nodeMap.set(node.id, node);
    }
    if (root.type === 'fake') nodeMap.set(root.id, root);

    ;(function storeOriginalChildren(node) {
      originalChildren.set(node.id, [...node.children]);
      for (const child of node.children) storeOriginalChildren(child);
    })(root);

    // Prune stale collapsed-node entries
    for (const toggleId of [...collapsedNodes]) {
      const str = String(toggleId);
      const underscoreIdx = str.indexOf('_');
      const actualId = underscoreIdx >= 0 ? parseInt(str.substring(0, underscoreIdx)) : toggleId;
      if (!nodeMap.has(actualId)) collapsedNodes.delete(toggleId);
    }

    searchIndex = Array.from(allPeopleByPointer.values()).map(p => {
      const yearMatch = (p.date_of_birth || '').match(/\d{4}/);
      return {
        id: p.pointer,
        label: [p.givenname, p.surname].filter(Boolean).join(' '),
        year: yearMatch ? yearMatch[0] : '',
      };
    });

    recomputeLayout();
    redraw();
    updateDataBadge();
  }

    const original = originalById.get(personId);
    if (!original) {
      // New person lives in newPeople — update it directly
      updateNewPeopleOrEdits(personId, changedFields);
      return;
    }
    const existing = edits[personId] || {};
    const merged = { ...existing, ...changedFields };
    for (const [k, v] of Object.entries(merged)) {
      if (original[k] === v || (v === '' && original[k] == null)) delete merged[k];
    }
    if (Object.keys(merged).length === 0) delete edits[personId];
    else edits[personId] = merged;
    localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
  }

  function recomputeLayout() {
    for (const toggleId of collapsedNodes) {
      const node = nodeMap.get(toggleId);
      if (node) {
        node.children = [];
      } else {
        const str = String(toggleId);
        const underscoreIdx = str.indexOf('_');
        if (underscoreIdx >= 0) {
          const actualNode = nodeMap.get(parseInt(str.substring(0, underscoreIdx)));
          const famPointer = str.substring(underscoreIdx + 1);
          if (actualNode && actualNode.childrenByFam && actualNode.childrenByFam[famPointer]) {
            const toRemove = new Set(actualNode.childrenByFam[famPointer].map(c => c.id));
            actualNode.children = actualNode.children.filter(c => !toRemove.has(c.id));
          }
        }
      }
    }
    currentLayout(root);
    for (const [nodeId, children] of originalChildren) {
      const node = nodeMap.get(nodeId);
      if (node) node.children = children;
    }
  }

  function getUpcomingBirthdays(people, windowDays = 7) {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const results = [];
    for (const p of Object.values(people)) {
      if (!p.dob) continue;
      const parsed = parseGedcomDate(p.dob);
      if (!parsed || parsed.rangeFrom !== undefined) continue;
      if (!parsed.month || !parsed.day) continue;
      const { month, day, year } = parsed;
      let bday = new Date(today.getFullYear(), month - 1, day);
      if (bday < today) bday = new Date(today.getFullYear() + 1, month - 1, day);
      const diffDays = Math.round((bday - today) / 86400000);
      if (diffDays >= 0 && diffDays < windowDays) {
        const age = year ? bday.getFullYear() - year : null;
        const alive = !p.dod;
        results.push({ person: p, daysUntil: diffDays, age, alive });
      }
    }
    return results.sort((a, b) => a.daysUntil - b.daysUntil);
  }

  // Handle panning with mouse
  let isPanning = false;
  let startX, startY;

  canvas.addEventListener('mousedown', (e) => {
      isPanning = true;
      startX = e.clientX - panX;
      startY = e.clientY - panY;
  });

  canvas.addEventListener('mousemove', async (e) => {
      if (!isPanning) return;
      panX = e.clientX - startX;
      panY = e.clientY - startY;
      scheduleSave();
      redraw();
  });

  canvas.addEventListener('mouseup', () => isPanning = false);
  canvas.addEventListener('mouseleave', () => isPanning = false);

  // zooming centering around mouse position
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();

    const zoomSpeed = 0.1;
    const mouseX = e.offsetX;  // Mouse position relative to canvas
    const mouseY = e.offsetY;

    const newScale = scale - e.deltaY * zoomSpeed / 100;

    // Ensure the new scale is within the desired range
    if (newScale >= MIN_SCALE && newScale <= MAX_SCALE) {
      // Calculate the scale ratio
      const scaleRatio = newScale / scale;

      // Adjust the translation to zoom around the mouse position
      panX -= (mouseX - panX) * (scaleRatio - 1);
      panY -= (mouseY - panY) * (scaleRatio - 1);

      scale = newScale;
      scheduleSave();
      redraw();
    }
  });

  function getMidpoint(touches) {
    const [touch1, touch2] = touches;
    return {
        x: (touch1.clientX + touch2.clientX) / 2,
        y: (touch1.clientY + touch2.clientY) / 2
    };
  }
  function getDistance(touches) {
    const [touch1, touch2] = touches;
    const dx = touch1.clientX - touch2.clientX;
    const dy = touch1.clientY - touch2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  let initialDistance;
  let lastMidpoint;

  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      initialDistance = getDistance(e.touches);
      lastMidpoint = getMidpoint(e.touches);
      isPanning = false;
    } else if (e.touches.length === 1) {
      startX = e.touches[0].clientX - panX;
      startY = e.touches[0].clientY - panY;
      isPanning = true;
    }
  });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();

    if (e.touches.length === 2) {
      const currentDistance = getDistance(e.touches);
      const midpoint = getMidpoint(e.touches);
      const rawRatio = currentDistance / initialDistance;
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * rawRatio));
      const actualRatio = newScale / scale;

      // Pan by midpoint delta, then zoom around new midpoint
      panX += midpoint.x - lastMidpoint.x;
      panY += midpoint.y - lastMidpoint.y;
      panX -= (midpoint.x - panX) * (actualRatio - 1);
      panY -= (midpoint.y - panY) * (actualRatio - 1);

      scale = newScale;
      initialDistance = currentDistance;
      lastMidpoint = midpoint;
      scheduleSave();
      redraw();
    } else if (e.touches.length === 1 && isPanning) {
      panX = e.touches[0].clientX - startX;
      panY = e.touches[0].clientY - startY;
      scheduleSave();
      redraw();
    }
  });

  canvas.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) {
      initialDistance = 0;
      lastMidpoint = null;
      isPanning = false;
    }
  });

  function getMousePosition(event) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = (event.clientX - rect.left - panX) / scale;
    const mouseY = (event.clientY - rect.top - panY) / scale;
    return { mouseX, mouseY };
}

  // ── Crop modal ──────────────────────────────────────────────────────────────
  const CANVAS_SIZE = 280;
  const MASK_SIZE   = 220;
  const OUTPUT_SIZE = 300;
  const HALF_MASK   = MASK_SIZE / 2;

  const cropModal    = document.getElementById('crop-modal');
  const cropCanvas   = document.getElementById('crop-canvas');
  const cropCtx      = cropCanvas.getContext('2d');
  cropCanvas.width   = CANVAS_SIZE;
  cropCanvas.height  = CANVAS_SIZE;

  let cropImg   = null;
  let cropX     = 0;
  let cropY     = 0;
  let cropScale = 1;

  function cropMinScale() {
    return Math.max(MASK_SIZE / cropImg.width, MASK_SIZE / cropImg.height);
  }

  function clampCrop() {
    const hw = (cropImg.width  * cropScale) / 2;
    const hh = (cropImg.height * cropScale) / 2;
    cropX = Math.min(cropX,  hw - HALF_MASK);
    cropX = Math.max(cropX, -(hw - HALF_MASK));
    cropY = Math.min(cropY,  hh - HALF_MASK);
    cropY = Math.max(cropY, -(hh - HALF_MASK));
  }

  function drawCrop() {
    cropCtx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    cropCtx.save();
    cropCtx.translate(CANVAS_SIZE / 2 + cropX, CANVAS_SIZE / 2 + cropY);
    cropCtx.scale(cropScale, cropScale);
    cropCtx.drawImage(cropImg, -cropImg.width / 2, -cropImg.height / 2);
    cropCtx.restore();

    const mx = (CANVAS_SIZE - MASK_SIZE) / 2;
    const my = (CANVAS_SIZE - MASK_SIZE) / 2;
    cropCtx.fillStyle = 'rgba(0,0,0,0.55)';
    cropCtx.fillRect(0,  0,  CANVAS_SIZE, my);
    cropCtx.fillRect(0,  my + MASK_SIZE, CANVAS_SIZE, CANVAS_SIZE - my - MASK_SIZE);
    cropCtx.fillRect(0,  my, mx, MASK_SIZE);
    cropCtx.fillRect(mx + MASK_SIZE, my, CANVAS_SIZE - mx - MASK_SIZE, MASK_SIZE);

    cropCtx.strokeStyle = 'rgba(255,255,255,0.75)';
    cropCtx.lineWidth = 1.5;
    cropCtx.strokeRect(mx + 0.75, my + 0.75, MASK_SIZE - 1.5, MASK_SIZE - 1.5);
  }

  function openCropModal(base64) {
    cropImg = new Image();
    cropImg.onload = () => {
      cropScale = cropMinScale();

      drawCrop();
    };
    cropImg.src = base64;
  }

  // Mouse drag
  let cropDragStart = null;
  cropCanvas.addEventListener('mousedown', (e) => {
    cropDragStart = { x: e.clientX - cropX, y: e.clientY - cropY };
  });
  window.addEventListener('mousemove', (e) => {
    if (!cropDragStart) return;
    cropX = e.clientX - cropDragStart.x;
    cropY = e.clientY - cropDragStart.y;
    clampCrop();
    drawCrop();
  });
  window.addEventListener('mouseup', () => { cropDragStart = null; });

  // Mouse wheel zoom
  cropCanvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
    cropScale = Math.max(cropMinScale(), cropScale * factor);
    clampCrop();
    drawCrop();
  }, { passive: false });

  // Touch pan + pinch zoom
  let cropLastMidpoint = null;
  let cropInitialDist  = 0;
  cropCanvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 2) {
      cropInitialDist  = getDistance(e.touches);
      cropLastMidpoint = getMidpoint(e.touches);
    } else if (e.touches.length === 1) {
      cropDragStart = { x: e.touches[0].clientX - cropX, y: e.touches[0].clientY - cropY };
    }
  }, { passive: false });
  cropCanvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 2) {
      const dist     = getDistance(e.touches);
      const midpoint = getMidpoint(e.touches);
      const ratio    = dist / cropInitialDist;
      cropX += midpoint.x - cropLastMidpoint.x;
      cropY += midpoint.y - cropLastMidpoint.y;
      cropScale = Math.max(cropMinScale(), cropScale * ratio);
      cropInitialDist  = dist;
      cropLastMidpoint = midpoint;
      clampCrop();
      drawCrop();
    } else if (e.touches.length === 1 && cropDragStart) {
      cropX = e.touches[0].clientX - cropDragStart.x;
      cropY = e.touches[0].clientY - cropDragStart.y;
      clampCrop();
      drawCrop();
    }
  }, { passive: false });
  cropCanvas.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) { cropInitialDist = 0; cropLastMidpoint = null; }
    if (e.touches.length === 0) cropDragStart = null;
  });

  // Zoom buttons
  document.getElementById('crop-zoom-in').addEventListener('click', () => {

    cropScale = Math.max(cropMinScale(), cropScale / 1.2);
    clampCrop(); drawCrop();
  });

  // Apply — export cropped region
  document.getElementById('crop-apply').addEventListener('click', () => {
    const out    = document.createElement('canvas');
    out.width    = OUTPUT_SIZE;
    out.height   = OUTPUT_SIZE;
    const outCtx = out.getContext('2d');
    const factor = OUTPUT_SIZE / MASK_SIZE;
    outCtx.translate(OUTPUT_SIZE / 2 + cropX * factor, OUTPUT_SIZE / 2 + cropY * factor);
    outCtx.scale(cropScale * factor, cropScale * factor);
    outCtx.drawImage(cropImg, -cropImg.width / 2, -cropImg.height / 2);
    pendingImageBase64 = out.toDataURL('image/jpeg', 0.85);
    panelImgEl.src = pendingImageBase64;
    cropModal.style.display = 'none';
    editPhotoInput.value = '';
    cropImg = null;
  });

  // Cancel
  document.getElementById('crop-cancel').addEventListener('click', () => {
    cropModal.style.display = 'none';
    editPhotoInput.value = '';
    cropImg = null;
  });

  // File picked → open modal instead of direct use
  editPhotoInput.addEventListener('change', () => {
    const file = editPhotoInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => openCropModal(e.target.result);
    reader.readAsDataURL(file);
  });

  panelImgRemoveBtn.addEventListener('click', () => {
    pendingImageBase64 = '';
    editPhotoInput.value = '';
    panelImgEl.src = pMap[currentPersonId].placeholderBase64Img;
  });

  function isLeafPerson(personId) {
    for (const fam of Object.values(fMap)) {
      if (fam.husband !== personId && fam.wife !== personId) continue;
      const activeChildren = (fam.children ?? []).filter(id => allPeopleByPointer.has(id));
      if (activeChildren.length > 0) return false;
    }
    return true;
  }

  function cleanupFamilyEditsForPerson(personId) {
    for (const famPointer of Object.keys(familyEdits)) {
      const fam = familyEdits[famPointer];
      let changed = false;
      const updated = { ...fam };
      if (updated.husband === personId) { delete updated.husband; changed = true; }
      if (updated.wife    === personId) { delete updated.wife;    changed = true; }
      if (Array.isArray(updated.children) && updated.children.includes(personId)) {
        updated.children = updated.children.filter(c => c !== personId);
        changed = true;
      }
      if (!changed) continue;
      if (updated._new && !updated.husband && !updated.wife && !(updated.children || []).length) {
        delete familyEdits[famPointer];
      } else {
        familyEdits[famPointer] = updated;
      }
    }
    localStorage.setItem(FAMILY_EDITS_KEY, JSON.stringify(familyEdits));
  }

  function removePerson(personId) {
    if (newPeople[personId]) {
      delete newPeople[personId];
      localStorage.setItem(NEW_PEOPLE_KEY, JSON.stringify(newPeople));
      delete edits[personId];
      localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
      cleanupFamilyEditsForPerson(personId);
    } else {
      edits[personId] = { ...(edits[personId] || {}), removed: true };
      localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
    }
  }

  function showPanel(personId) {
    const person = pMap[personId];
    if (!person) return;
    currentPersonId = personId;
    lastFocusedPersonId = personId;
    exitEditMode();
    selectedPersonId = personId;
    localStorage.setItem(SELECTED_KEY, personId);
    panelImgEl.src = person.base64Img;
    panelNameEl.textContent = person.givenname + ' ' + person.surname;
    if (window.familyTreeData) { panelIdEl.textContent = personId; panelIdEl.style.display = ''; }
    panelBirthEl.textContent = person.dob
      ? t('person.born') + formatGedcomDate(person.dob) + (person.placeOfBirth ? ', ' + person.placeOfBirth : '')
      : '';
    panelDeathEl.textContent = person.dod ? t('person.died') + formatGedcomDate(person.dod) : '';

    // Parents section
    const famcPtr      = allPeopleByPointer.get(personId)?.famc;
    const parentFam    = famcPtr ? fMap[famcPtr] : null;
    const fatherPerson = parentFam?.husband ? pMap[parentFam.husband] : null;
    const motherPerson = parentFam?.wife    ? pMap[parentFam.wife]    : null;

    function makeParentRow(person, pointer, slotExists, labelKey) {
      const wrap = document.createElement('span');
      wrap.appendChild(document.createTextNode(t(labelKey) + ': '));
      if (person) {
        const a = document.createElement('a');
        a.textContent = (`${person.givenname} ${person.surname}`).trim() || pointer;
        a.href = '#';
        a.addEventListener('click', e => {
          e.preventDefault();
          panelHistory.push(personId);
          showPanel(pointer);
        });
        wrap.appendChild(a);
      } else if (slotExists) {
        const u = document.createElement('span');
        u.className = 'panel-unknown';
        u.textContent = t('person.unknown');
        wrap.appendChild(u);
      } else {
        return null;
      }
      return wrap;
    }

    const fatherEl = makeParentRow(fatherPerson, parentFam?.husband, parentFam !== null, 'person.father');
    const motherEl = makeParentRow(motherPerson, parentFam?.wife,    parentFam !== null, 'person.mother');
    panelFatherEl.innerHTML = '';
    panelMotherEl.innerHTML = '';
    if (fatherEl) panelFatherEl.appendChild(fatherEl);
    if (motherEl) panelMotherEl.appendChild(motherEl);
    panelParentsEl.style.display = (fatherEl || motherEl) ? '' : 'none';

    // Spouse section
    const famsPtr  = allPeopleByPointer.get(personId)?.fams;
    const family   = famsPtr ? fMap[famsPtr] : null;
    const spouseId = family
      ? (family.husband === personId ? family.wife : family.husband)
      : null;
    const spouse   = spouseId ? pMap[spouseId] : null;
    panelSpouseNameEl.innerHTML = '';
    if (family) {
      if (spouse) {
        const a = document.createElement('a');
        a.textContent = (`${spouse.givenname} ${spouse.surname}`).trim() || spouseId;
        a.href = '#';
        a.addEventListener('click', e => {
          e.preventDefault();
          panelHistory.push(personId);
          showPanel(spouseId);
        });
        const wrap = document.createElement('span');
        wrap.appendChild(document.createTextNode(t('person.spouse') + ': '));
        wrap.appendChild(a);
        panelSpouseNameEl.appendChild(wrap);
      } else {
        panelSpouseNameEl.textContent = t('person.spouse') + ': ' + t('person.unknown');
      }
      const domFmt = family.date_of_marriage  ? formatGedcomDate(family.date_of_marriage)  : '';
      const pomFmt = family.place_of_marriage || '';
      const parts  = [domFmt, pomFmt].filter(Boolean);
      panelSpouseMarriageEl.textContent = parts.length ? parts.join(', ') : '';
    }
    panelSpouseEl.style.display = family ? '' : 'none';

    const notes = allPeopleByPointer.get(personId)?.notes || '';
    panelNotesEl.textContent = notes;
    panelNotesEl.style.display = notes ? '' : 'none';

    panelBackBtn.style.display = panelHistory.length > 0 ? '' : 'none';
    panelSetRootBtn.style.display = (data.people.length === 0 && personId !== rootId) ? 'block' : 'none';
    panelEl.classList.add('open');
    panelCrosshairBtn.classList.toggle('pinned', localStorage.getItem(PINNED_KEY) === personId);
    redraw();

    selectedPersonId = null;
    exitEditMode();
    localStorage.removeItem(SELECTED_KEY);
    panelEl.classList.remove('open');

  panelRemoveBtn.addEventListener('click', () => {

      ? ((person.givenname || '') + ' ' + (person.surname || '')).trim()

  const setRootModal        = document.getElementById('set-root-modal');
  const setRootModalText    = document.getElementById('set-root-modal-text');
  const setRootModalCancel  = document.getElementById('set-root-modal-cancel');
  const setRootModalConfirm = document.getElementById('set-root-modal-confirm');

  panelSetRootBtn.addEventListener('click', () => {
