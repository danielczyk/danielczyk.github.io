  panelEditForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const givenname     = editGivenname.value.trim();
    const surname       = editSurname.value.trim();
    const fullname      = `${givenname} /${surname}/`;
    const date_of_birth  = editDob.value.trim();
    const date_of_death  = editDod.value.trim();
    const place_of_birth = editPob.value.trim();
    const sex            = editSex.value;
    const notes          = editNotes.value;
    const changedFields  = { givenname, surname, fullname, date_of_birth, date_of_death, place_of_birth, sex, notes };
    applyDelta(currentPersonId, changedFields);
    updateIndyvidual(currentPersonId, changedFields);
    if (pendingImageBase64 !== null) {
      const person = pMap[currentPersonId];
      if (person) {
        const src = pendingImageBase64 === '' ? person.placeholderBase64Img : pendingImageBase64;
        person.base64Img = src;
        const img = new Image();
        img.src = src;
        await new Promise(resolve => { img.onload = img.onerror = resolve; });
        person.img = img;
        if (pendingImageBase64 === '' && !data.images[currentPersonId]) {
          // no original image to override — just clear any prior edit
          delete imageEdits[currentPersonId];
        } else {
          imageEdits[currentPersonId] = pendingImageBase64; // '' = sentinel for removal
        }
        localStorage.setItem(IMAGES_KEY, JSON.stringify(imageEdits));
      }
      pendingImageBase64 = null;
    }

    // Parent reassignment
    const newFatherId = document.getElementById('edit-father-pointer').value || null;
    const newMotherId = document.getElementById('edit-mother-pointer').value || null;
    const oldFamcPtr  = allPeopleByPointer.get(currentPersonId)?.famc || null;
    const oldFamily   = oldFamcPtr ? fMap[oldFamcPtr] : null;
    const oldFatherId = oldFamily?.husband || null;
    const oldMotherId = oldFamily?.wife    || null;
    if (newFatherId !== oldFatherId || newMotherId !== oldMotherId) {
      if (oldFamcPtr) {
        const oldFam = getFamilyRecord(oldFamcPtr);
        const updatedChildren = (oldFam.children || []).filter(c => c !== currentPersonId);
        const updated = { ...(familyEdits[oldFamcPtr] || {}), children: updatedChildren };
        if (updated._new && !updated.husband && !updated.wife && !updatedChildren.length) {
          delete familyEdits[oldFamcPtr];
        } else {
          familyEdits[oldFamcPtr] = updated;
        }
      }
      if (newFatherId || newMotherId) {
        let newFamPtr = findFamilyBetween(newFatherId, newMotherId);
        if (!newFamPtr) {
          if (newFatherId && !newMotherId) {
            const solo = Object.values(fMap).find(f => f.husband === newFatherId && !f.wife);
            newFamPtr = solo?.pointer ?? null;
          } else if (newMotherId && !newFatherId) {
            const solo = Object.values(fMap).find(f => f.wife === newMotherId && !f.husband);
            newFamPtr = solo?.pointer ?? null;
          }
        }
        if (!newFamPtr) {
          newFamPtr = nextFamilyId();
          familyEdits[newFamPtr] = { _new: true, husband: newFatherId, wife: newMotherId, children: [] };
        }
        const newFam = getFamilyRecord(newFamPtr);
        if (!(newFam.children || []).includes(currentPersonId)) {
          familyEdits[newFamPtr] = {
            ...(familyEdits[newFamPtr] || {}),
            children: [...(newFam.children || []), currentPersonId],
          };
        }
        updateNewPeopleOrEdits(currentPersonId, { famc: newFamPtr });
      } else {
        updateNewPeopleOrEdits(currentPersonId, { famc: null });
      }
      await rebuildGraph();
    }

    const famsPtr = allPeopleByPointer.get(currentPersonId)?.fams;
    if (famsPtr) {
      const dom = editDom.value.trim();
      const pom = editPom.value.trim();
      const currentFam = getFamilyRecord(famsPtr);
      if (dom !== (currentFam.date_of_marriage  || '') ||
          pom !== (currentFam.place_of_marriage || '')) {
        familyEdits[famsPtr] = { ...(familyEdits[famsPtr] || {}), date_of_marriage: dom, place_of_marriage: pom };
        localStorage.setItem(FAMILY_EDITS_KEY, JSON.stringify(familyEdits));
      }
    }

    showPanel(currentPersonId);
    redraw();
    updateSettingsEditCount();
    updateDataBadge();
    if (!localStorage.getItem(HIDE_SAVED_MODAL_KEY)) {
      savedLocallyCheckbox.checked = false;
      savedLocallyModal.style.display = 'flex';
    }
  });

  function nextPersonId() {
    const nums = [...data.people.map(p => p.pointer), ...Object.keys(newPeople)]
      .map(id => parseInt(id.match(/\d+/)?.[0] || 0));
    return `@I${Math.max(0, ...nums) + 1}@`;
  }

  function nextFamilyId() {
    const nums = [...data.fams.map(f => f.pointer), ...Object.keys(familyEdits)]
      .map(id => parseInt(id.match(/\d+/)?.[0] || 0));
    return `@F${Math.max(0, ...nums) + 1}@`;
  }

  function updateNewPeopleOrEdits(id, patch) {
    if (newPeople[id]) {
      Object.assign(newPeople[id], patch);
      localStorage.setItem(NEW_PEOPLE_KEY, JSON.stringify(newPeople));
    } else {
      edits[id] = { ...(edits[id] || {}), ...patch };
      localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
    }
  }

  function getFamilyRecord(pointer) {
    const base  = data.fams.find(f => f.pointer === pointer) || {};
    const patch = familyEdits[pointer] || {};
    return { ...base, ...patch };
  }

  function findFamiliesOfPerson(personId) {
    return Object.values(fMap).filter(f => f.husband === personId || f.wife === personId);
  }

  function findFamilyBetween(p1Id, p2Id) {
    const fam = Object.values(fMap).find(f =>
      (f.husband === p1Id && f.wife === p2Id) ||
      (f.husband === p2Id && f.wife === p1Id)
    );
    return fam?.pointer ?? null;
  }

  const addRelativePanelEl  = document.getElementById('add-relative-panel');
  const addRelativeTitleEl  = document.getElementById('add-relative-title');
  const addRelativeFormEl   = document.getElementById('add-relative-form');
  const addRelativeErrorEl  = document.getElementById('add-relative-error');
  const addRelativeCloseEl  = document.getElementById('add-relative-close');
  const addRelativeCancelEl = document.getElementById('add-relative-cancel');
  const arDobEl             = document.getElementById('ar-dob');
  const arDobWarnEl         = document.getElementById('ar-dob-warning');
  const addRelativeSaveEl   = document.getElementById('add-relative-save');

  function extractYear(dateStr) {
    if (!dateStr) return null;
    const m = dateStr.match(/\b(\d{4})\b/);
    return m ? parseInt(m[1], 10) : null;
  }

  function isAncestorOf(personId, candidateId) {
    const visited = new Set();
    const queue = [personId];
    while (queue.length) {
      const current = queue.shift();
      if (visited.has(current)) continue;
      visited.add(current);
      const famc = allPeopleByPointer.get(current)?.famc;
      if (!famc) continue;
      const fam = fMap[famc];
      if (!fam) continue;
      const parents = [fam.husband, fam.wife].filter(Boolean);
      if (parents.includes(candidateId)) return true;
      queue.push(...parents);
    }
    return false;
  }

  function initPersonPicker(searchEl, resultsEl, hiddenEl, clearBtn, opts = {}) {
    const { excludeId, allowedSex, childBirthYear, otherParentEl } = opts;

    function getMatches(q) {
      return Object.values(pMap)
        .filter(p => {
          if (p.id === excludeId) return false;
          if (isAncestorOf(p.id, excludeId)) return false;
          if (otherParentEl && p.id === otherParentEl.value) return false;
          if (allowedSex && p.sex !== allowedSex && p.sex !== 'unknown') return false;
          const candidateYear = extractYear(p.dob);
          if (candidateYear !== null && childBirthYear !== null) {
            if (candidateYear >= childBirthYear) return false;
            if (childBirthYear - candidateYear < 13) return false;
          }
          return (`${p.givenname} ${p.surname}`).toLowerCase().includes(q);
        })
        .slice(0, 10);
    }

    function warnings(p) {
      const flags = [];
      const candidateYear = extractYear(p.dob);
      const candidateDod  = extractYear(p.dod);
      if (candidateYear !== null && childBirthYear !== null) {
        const gap = childBirthYear - candidateYear;
        const ageThreshold = allowedSex === 'F' ? 55 : 70;
        if (gap > ageThreshold) flags.push('⚠');
      }
      if (candidateDod !== null && childBirthYear !== null && candidateDod < childBirthYear - 1) {
        flags.push('⚠');
      }
      return [...new Set(flags)];
    }

    searchEl.addEventListener('input', () => {
      const q = searchEl.value.trim().toLowerCase();
      if (!q) { resultsEl.style.display = 'none'; return; }
      const matches = getMatches(q);
      resultsEl.innerHTML = '';
      if (!matches.length) { resultsEl.style.display = 'none'; return; }
      for (const p of matches) {
        const li = document.createElement('li');
        const year = extractYear(p.dob);
        li.textContent = `${p.givenname} ${p.surname}${year ? ` (${year})` : ''}`;
        const warns = warnings(p);
        if (warns.length) {
          const w = document.createElement('span');
          w.className = 'picker-warn';
          w.textContent = ' ⚠';
          li.appendChild(w);
        }
        li.addEventListener('mousedown', () => {
          hiddenEl.value = p.id;
          searchEl.value = (`${p.givenname} ${p.surname}`).trim();
          resultsEl.style.display = 'none';
        });
        resultsEl.appendChild(li);
      }
      resultsEl.style.display = '';
    });

    clearBtn.addEventListener('click', () => {
      hiddenEl.value = '';
      searchEl.value = '';
      resultsEl.style.display = 'none';
    });

    searchEl.addEventListener('blur', () => {
      setTimeout(() => { resultsEl.style.display = 'none'; }, 150);
    });
  }

  function validateChildDob() {
    const rel = document.querySelector('input[name="rel"]:checked').value;
    if (rel !== 'child') {
      arDobWarnEl.style.display = 'none';
      addRelativeSaveEl.disabled = false;
      return;
    }
    const parentPerson = pMap[addingRelativeToId];
    const parentYear = parentPerson ? extractYear(parentPerson.dob) : null;
    const childYear  = extractYear(arDobEl.value.trim());
    let warning = null;
    const currentYear = new Date().getFullYear();
    if (childYear !== null && childYear > currentYear) {
      warning = 'The date of birth is in the future — please check the date.';
    } else if (parentYear !== null && childYear !== null) {
      if (childYear < parentYear) {
        warning = 'The child was born before the parent — please check the date.';
      } else if (childYear < parentYear + 10) {
        warning = `The child was born when the parent was only ${childYear - parentYear} year(s) old — please check the date.`;
      }
    }
    if (warning) {
      arDobWarnEl.textContent = warning;
      arDobWarnEl.style.display = '';
      addRelativeSaveEl.disabled = true;
    } else {
      arDobWarnEl.style.display = 'none';
      addRelativeSaveEl.disabled = false;
    }
  }

  let addingRelativeToId = null;

  const secondParentRow     = document.getElementById('ar-second-parent-row');
  const secondParentOptions = document.getElementById('ar-second-parent-options');

  function populateSecondParentSelector(personId) {
    const anchorFamilies = findFamiliesOfPerson(personId);
    const partners = anchorFamilies
      .map(f => (f.husband === personId ? f.wife : f.husband))
      .filter(Boolean);

    if (partners.length >= 1) {
      secondParentOptions.innerHTML = '';
      for (let i = 0; i < partners.length; i++) {
        const partnerId = partners[i];
        const pp = pMap[partnerId];
        const name = pp ? `${pp.givenname} ${pp.surname}`.trim() || partnerId : partnerId;
        secondParentOptions.innerHTML +=
          `<label><input type="radio" name="ar-second-parent" value="${partnerId}"${i === 0 ? ' checked' : ''}> ${name}</label>`;
      }
      secondParentOptions.innerHTML +=
        `<label><input type="radio" name="ar-second-parent" value="__unknown__"> ${t('rel.unknownParent')}</label>`;
      const isChild = document.querySelector('input[name="rel"]:checked')?.value === 'child';
      secondParentRow.style.display = isChild ? '' : 'none';
    } else {
      secondParentRow.style.display = 'none';
    }
  }

  function showAddRelativePanel(personId) {
    addingRelativeToId = personId;
    const p = pMap[personId];
    addRelativeTitleEl.textContent = `${t('rel.title')} ${p ? p.givenname + ' ' + p.surname : personId}`;
    addRelativeErrorEl.style.display = 'none';
    arDobWarnEl.style.display = 'none';
    addRelativeSaveEl.disabled = false;
    addRelativeFormEl.reset();
    populateSecondParentSelector(personId);
    closePanel();
    addRelativePanelEl.classList.add('open');
  }

  arDobEl.addEventListener('input', validateChildDob);
  document.querySelectorAll('input[name="rel"]').forEach(r => r.addEventListener('change', validateChildDob));
  document.querySelectorAll('input[name="rel"]').forEach(r => r.addEventListener('change', () => {
    if (!addingRelativeToId) return;
    const isChild = document.querySelector('input[name="rel"]:checked')?.value === 'child';
    const hasPartners = findFamiliesOfPerson(addingRelativeToId)
      .some(f => (f.husband === addingRelativeToId && f.wife) || (f.wife === addingRelativeToId && f.husband));
    const show = isChild && hasPartners;
    secondParentRow.style.display = show ? '' : 'none';
    if (show) {
      const first = secondParentOptions.querySelector('input[type="radio"]');
      if (first) first.checked = true;
    }
  }));

  addRelativeCloseEl.addEventListener('click',  () => addRelativePanelEl.classList.remove('open'));
  addRelativeCancelEl.addEventListener('click', () => addRelativePanelEl.classList.remove('open'));

  let addRelativeInFlight = false;
  addRelativeFormEl.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (addRelativeInFlight) return;
    const rel       = document.querySelector('input[name="rel"]:checked').value;
    const givenname = document.getElementById('ar-givenname').value.trim();
    const surname   = document.getElementById('ar-surname').value.trim();
    const sex       = document.getElementById('ar-sex').value;
    const dob       = document.getElementById('ar-dob').value.trim();
    const dod       = document.getElementById('ar-dod').value.trim();
    const pob       = document.getElementById('ar-pob').value.trim();

    if (!givenname && !surname) {
      addRelativeErrorEl.textContent = t('rel.errorNameRequired');
      addRelativeErrorEl.style.display = '';
      return;
    }

    const secondParentRowVisible = secondParentRow.style.display !== 'none';
    const secondParentId = secondParentRowVisible
      ? (document.querySelector('input[name="ar-second-parent"]:checked')?.value ?? null)
      : null;

    addRelativeInFlight = true;
    await addRelative(addingRelativeToId, rel, { givenname, surname, sex,
      date_of_birth: dob, date_of_death: dod, place_of_birth: pob }, secondParentId);
    addRelativeInFlight = false;
    addRelativePanelEl.classList.remove('open');
  });

  async function addRelative(personId, rel, fields, secondParentId = null) {
    const anchorPerson = allPeopleByPointer.get(personId);
    if (!anchorPerson) return;
    const newId    = nextPersonId();
    const fullname = `${fields.givenname} /${fields.surname}/`;
    const newPerson = { ...fields, fullname, pointer: newId, fams: null, famc: null };

    if (rel === 'child') {
      let famPointer;

      if (secondParentId && secondParentId !== '__unknown__') {
        // Known partner selected: use the existing shared family
        famPointer = findFamilyBetween(personId, secondParentId);
        if (!famPointer) {
          addRelativeErrorEl.textContent = t('rel.errorFamilyNotFound');
          addRelativeErrorEl.style.display = '';
          return;
        }

      } else if (secondParentId === '__unknown__') {
        // Unknown partner: find or create a solo family for the anchor
        const soloFam = Object.values(fMap).find(f =>
          (f.husband === personId && !f.wife) || (f.wife === personId && !f.husband)
        );
        if (soloFam) {
          famPointer = soloFam.pointer;
        } else {
          famPointer = nextFamilyId();
          familyEdits[famPointer] = {
            _new: true, pointer: famPointer,
            husband: anchorPerson.sex === 'M' ? personId : null,
            wife:    anchorPerson.sex === 'F' ? personId : null,
            children: [],
          };
        }

      } else {
        // Selector not shown — anchor has no existing partners at all.
        // Reuse an existing solo family if one already exists.
        const soloFam = Object.values(fMap).find(f =>
          (f.husband === personId && !f.wife) || (f.wife === personId && !f.husband)
        );
        if (soloFam) {
          famPointer = soloFam.pointer;
        } else {
          famPointer = nextFamilyId();
          familyEdits[famPointer] = {
            _new: true, pointer: famPointer,
            husband: anchorPerson.sex === 'M' ? personId : null,
            wife:    anchorPerson.sex === 'F' ? personId : null,
            children: [],
          };
          // Keep p.fams in sync so the single-node connector uses the correct family pointer
          anchorPerson.fams = famPointer;
          updateNewPeopleOrEdits(personId, { fams: famPointer });
        }
      }

      const fam = getFamilyRecord(famPointer);
      familyEdits[famPointer] = { ...(familyEdits[famPointer] || {}), children: [...(fam.children || []), newId] };
      newPerson.famc = famPointer;

    } else if (rel === 'spouse') {
      // If anchor already has a solo parent family (one spouse slot empty), fill that slot
      // so existing children stay linked to both parents rather than orphaned in the old family
      const soloFamEntry = Object.entries(fMap).find(([, f]) =>
        (f.husband === personId && !f.wife) || (f.wife === personId && !f.husband)
      );
      let famPointer;
      if (soloFamEntry) {
        famPointer = soloFamEntry[0];
        const slot = soloFamEntry[1].husband === personId ? 'wife' : 'husband';
        familyEdits[famPointer] = { ...(familyEdits[famPointer] || {}), [slot]: newId };
      } else {
        famPointer = nextFamilyId();
        const isHusband = anchorPerson.sex !== 'F';
        familyEdits[famPointer] = { _new: true,
          husband:  isHusband ? personId : newId,
          wife:     isHusband ? newId    : personId,
          children: [] };
      }
      newPerson.fams = famPointer;

    } else if (rel === 'parent') {
      let famPointer = anchorPerson.famc;
      if (!famPointer) {
        famPointer = nextFamilyId();
        familyEdits[famPointer] = { _new: true, husband: null, wife: null, children: [personId] };
        updateNewPeopleOrEdits(personId, { famc: famPointer });
        anchorPerson.famc = famPointer;
      }
      const fam  = getFamilyRecord(famPointer);
      const slot = !fam.husband ? 'husband' : (!fam.wife ? 'wife' : null);
      if (!slot) {
        addRelativeErrorEl.textContent = t('rel.errorParentSlotsFull');
        addRelativeErrorEl.style.display = '';
        return;
      }
      familyEdits[famPointer] = { ...(familyEdits[famPointer] || {}), [slot]: newId };
      newPerson.fams = famPointer;

    } else if (rel === 'sibling') {
      let famPointer = anchorPerson.famc;
      if (!famPointer) {
        famPointer = nextFamilyId();
        familyEdits[famPointer] = { _new: true, husband: null, wife: null, children: [personId] };
        updateNewPeopleOrEdits(personId, { famc: famPointer });
        anchorPerson.famc = famPointer;
      }
      const fam = getFamilyRecord(famPointer);
      familyEdits[famPointer] = { ...(familyEdits[famPointer] || {}), children: [...(fam.children || []), newId] };
      newPerson.famc = famPointer;
    }

    newPeople[newId] = newPerson;
    localStorage.setItem(NEW_PEOPLE_KEY,   JSON.stringify(newPeople));
    localStorage.setItem(FAMILY_EDITS_KEY, JSON.stringify(familyEdits));

    if (data.people.length === 0 && rel === 'parent' && personId === rootId) {
      localStorage.setItem(SCRATCH_ROOT_KEY, newId);
      location.reload();
      return;
    }

    await rebuildGraph();
    updateSettingsEditCount();
  }

  function handleClick(event) {
    const { mouseX, mouseY } = getMousePosition(event);

    for (const area of addRelativeAreas) {
      const dx = mouseX - area.x;
      const dy = mouseY - area.y;
      if (dx * dx + dy * dy <= area.r * area.r) {
        showAddRelativePanel(area.personId);
        return;
      }
    }

    for (const area of toggleAreas) {
      const dx = mouseX - area.x;
      const dy = mouseY - area.y;
      if (dx * dx + dy * dy <= area.r * area.r) {
        if (collapsedNodes.has(area.nodeId)) {
          collapsedNodes.delete(area.nodeId);
        } else {
          collapsedNodes.add(area.nodeId);
        }
        const toggledNode = area.nodeRef || nodeMap.get(area.nodeId);
        const effectiveMy = layoutDirection === 'LR' ? LR_MY : my;
        const beforeX = toggledNode._x * mx;
        const beforeY = toggledNode._y * effectiveMy + toggledNode.height / 2;
        recomputeLayout();
        panX += (beforeX - toggledNode._x * mx) * scale;
        panY += (beforeY - (toggledNode._y * effectiveMy + toggledNode.height / 2)) * scale;
        scheduleSave();
        redraw();
        return;
      }
    }

    let hit = false;
    coordinates.forEach(rect => {
      if (
          mouseX >= rect.x &&
          mouseX <= rect.x + rect.width &&
          mouseY >= rect.y &&
          mouseY <= rect.y + rect.height
      ) {
        showPanel(rect.id);
        hit = true;
      }
    });
    if (!hit) closePanel();
  }

  function getHomePan() {
    const pinnedId = localStorage.getItem(PINNED_KEY);
    if (pinnedId) {
      const rect = findPersonCanvasRect(pinnedId);
      if (rect) {
        return {
          panX: window.innerWidth  / 2 - (rect.x + rect.width  / 2) * homeScale,
          panY: window.innerHeight / 2 - (rect.y + rect.height / 2) * homeScale,
        };
      }
    }
    let rootCenterX, rootCenterY;
    if (layoutDirection === 'LR') {
      rootCenterX = (root._x * mx + root.width  / 2) * homeScale;
      rootCenterY = root._y * LR_MY * homeScale;
    } else {
      rootCenterX = root._x * mx * homeScale;
      rootCenterY = (root._y * my + root.height / 2) * homeScale;
    }
    return {
      panX: window.innerWidth  / 2 - rootCenterX,
      panY: window.innerHeight / 2 - rootCenterY,
    };
  }

  let saveTimer = null;
  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      localStorage.setItem(VIEW_KEY, JSON.stringify({ panX, panY, scale }));
    }, 400);
  }

  const savedView = localStorage.getItem(VIEW_KEY);
  if (savedView) {
    try {
      const v = JSON.parse(savedView);
      if (typeof v.panX === 'number' && typeof v.panY === 'number' && typeof v.scale === 'number') {
        panX = v.panX;
        panY = v.panY;
        scale = v.scale;
      }
    } catch (_) { /* corrupt entry — use default centred view */ }
  }

  function applyPan(dx, dy) {
    panX += dx;
    panY += dy;
    scheduleSave();
    redraw();
  }

  function applyZoom(factor) {
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2;
    const newScale = scale * factor;
    if (newScale < MIN_SCALE || newScale > MAX_SCALE) return;
    panX -= (cx - panX) * (factor - 1);
    panY -= (cy - panY) * (factor - 1);
    scale = newScale;
    scheduleSave();
    redraw();
  }

  function normaliseSearch(str) {
    return str.normalize('NFD').replace(/\p{Mn}/gu, '').toLowerCase();
  }

  function hideSearchSuggestions() {
    searchSuggestions.style.display = 'none';
    activeSearchIdx = -1;

  function renderSearchSuggestions(items) {
    searchSuggestions.innerHTML = '';
    if (items.length === 0) { hideSearchSuggestions(); return; }
    items.forEach(item => {
      const li = document.createElement('li');
      li.textContent = item.year ? `${item.label} (${item.year})` : item.label;
      li.dataset.personId = item.id;

    });

  function setSearchActiveIdx(idx) {
    const lis = searchSuggestions.querySelectorAll('li');
    lis.forEach((li, i) => li.classList.toggle('active', i === idx));
    activeSearchIdx = idx;
  }

  function findPersonCanvasRect(personId) {
    const fromCoords = coordinates.find(r => r.id === personId);
    if (fromCoords) return fromCoords;
    for (const node of nodeMap.values()) {
      if (!node.data) continue;
      const k = node.data.findIndex(p => p.id === personId);
      if (k === -1) continue;
      if (layoutDirection === 'LR') {
        const leftX = node._x * mx;
        const topY  = node.type === 'couple'
          ? node._y * LR_MY - COUPLE_VERT_HEIGHT / 2 + (k === 1 ? PERSON_HEIGHT + COUPLE_DIST : 0)
          : node._y * LR_MY - node.height / 2;
        return { x: leftX, y: topY, width: PERSON_WIDTH, height: PERSON_HEIGHT };
      } else {
        const leftX = node._x * mx - node.width / 2;
        return { x: leftX + k * (PERSON_WIDTH + COUPLE_DIST), y: node._y * my, width: PERSON_WIDTH, height: PERSON_HEIGHT };
      }
    }
    return null;
  }

  function selectSearchPerson(personId) {
    const rect = findPersonCanvasRect(personId);
    if (rect) {
      scale = Math.min(MAX_SCALE, Math.max(scale, 1));
      panX = window.innerWidth  / 2 - (rect.x + rect.width  / 2) * scale;
      panY = window.innerHeight / 2 - (rect.y + rect.height / 2) * scale;
      scheduleSave();

    searchInput.value = '';

    renderSearchSuggestions(matches);
  });

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setSearchActiveIdx(Math.min(activeSearchIdx + 1, lis.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setSearchActiveIdx(Math.max(activeSearchIdx - 1, 0));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      const target = lis[activeSearchIdx >= 0 ? activeSearchIdx : 0];
      if (target) selectSearchPerson(target.dataset.personId);
    } else if (e.key === 'Escape') {
      searchInput.value = '';
      hideSearchSuggestions();
      searchInput.blur();

  });

  function buildMergedForExport() {
    const mergedPeople = data.people.map(p => {
      const delta = edits[p.pointer];
      return delta ? { ...p, ...delta } : p;
    }).concat(
      Object.entries(newPeople).map(([pointer, fields]) => ({ pointer, ...fields }))
    ).filter(p => !p.removed);

    const mergedFams = data.fams.map(f => {
      const patch = familyEdits[f.pointer];
      if (!patch) return f;
      const { _new, ...rest } = patch;
      return { ...f, ...rest };
    }).concat(
      Object.entries(familyEdits)
        .filter(([, v]) => v._new)
        .map(([pointer, fields]) => { const { _new, ...rest } = fields; return { pointer, ...rest }; })
    ).filter(f => f.husband || f.wife || (f.children || []).length > 0);

    const mergedImages = { ...data.images };
    for (const [id, base64] of Object.entries(imageEdits)) {
      if (base64 === '') delete mergedImages[id];
      else mergedImages[id] = base64;
    }

    return { mergedPeople, mergedFams, mergedImages };
  }

    const root     = pMap[rootId];

    return `family-tree${surname}-${datePart}.${ext}`;

  exportHtmlBtn.addEventListener('click', async () => {
    const passwords = getPasswordInputs().map(i => i.value);
    if (validatePasswords()) return;

    const shellEl = document.getElementById('page-shell');
    if (!shellEl || !shellEl.textContent.includes('__FAMILY_TREE_DATA__')) {
      exportHtmlStatus.textContent = 'Error: page shell not found — rebuild with yarn build.';
      return;
    }

    exportHtmlBtn.disabled       = true;
    exportHtmlStatus.textContent = `Encrypting… (~10 s per password)`;

    try {
      const mergedPeople = data.people.map(p => ({ ...p, ...(edits[p.pointer] || {}) }));
      const mergedImages = { ...data.images };
      for (const [id, b64] of Object.entries(imageEdits)) {

      }
      const plaintext = JSON.stringify({ dataVersion: data.dataVersion || 0, rootId: data.rootId, people: mergedPeople, fams: data.fams, images: mergedImages });

      const encObj    = await encryptWithPasswords(plaintext, passwords);
      const dataBlock = `const encryptedData = ${JSON.stringify(encObj, null, ' ')};`;

      // shell = HTML frame + CSS + data placeholder, #app-code is empty
      const shell = shellEl.textContent.replace(/<\\\/script>/g, '<' + '/script>');

      // Inject the live JS into the shell's empty #app-code tag to produce a
      // complete, working HTML. The shell stored in #page-shell stays JS-free
      // so the downloaded file doesn't duplicate the scripts a second time.
      const jsContent = document.getElementById('app-code').textContent;
      // Use function replacements throughout: jsContent contains fflate's minified code
      // which includes SCRIPT_MAIN — a bare string replacement would expand that as "insert matched
      // substring here" and corrupt the output.
      const shellWithJs = shell.replace(
        '<script id="app-code"><' + '/script>',
        () => '<script id="app-code">' + jsContent + '<' + '/script>'
      );

      // Re-embed the JS-free shell so the downloaded file can also self-export.
      const escapedShell = shell.split('<' + '/script>').join('<\\/' + 'script>');
      const newHtml = shellWithJs
        .replace(
          /\/\* __FAMILY_TREE_DATA_START__ \*\/__FAMILY_TREE_DATA__\/\* __FAMILY_TREE_DATA_END__ \*\//,
          () => `/* __FAMILY_TREE_DATA_START__ */\n${dataBlock}\n/* __FAMILY_TREE_DATA_END__ */`
        )
        .replace(
          '<script type="text/plain" id="page-shell"><' + '/script>',
          () => `<script type="text/plain" id="page-shell">${escapedShell}<` + '/script>'
        );

      const blob = new Blob([newHtml], { type: 'text/html' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: 'index.html' });
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);

      exportHtmlStatus.textContent = 'Done.';
    } catch (err) {
      exportHtmlStatus.textContent = 'Error: ' + err.message;
    }

    exportHtmlBtn.disabled = false;
  });

  mergeBtn.addEventListener('click', async () => {

    }
    mergeBtn.disabled = true;
    mergeStatus.textContent = 'Processing...';
    try {
      const gedTexts   = [];
      const zipImages  = {};
      const fileLabels = [];

      for (const file of files) {
        if (file.name.toLowerCase().endsWith('.zip')) {
          const buf      = await file.arrayBuffer();
          const entries  = fflate.unzipSync(new Uint8Array(buf));
          const gedEntry = Object.keys(entries).find(k => k.toLowerCase().endsWith('.ged'));
          if (!gedEntry) throw new Error(`${file.name}: no .ged file found inside ZIP`);
          gedTexts.push(fflate.strFromU8(entries[gedEntry]));
          fileLabels.push(file.name);
          for (const [path, bytes] of Object.entries(entries)) {
            const m = path.match(/(@[IF]\d+@)\.(jpe?g|png|gif|webp)$/i);
            if (!m) continue;
            const pointer = m[1];
            const ext     = m[2].toLowerCase() === 'jpg' ? 'jpeg' : m[2].toLowerCase();
            const b64     = btoa(String.fromCharCode(...bytes));
            zipImages[pointer] = `data:image/${ext};base64,${b64}`;

          gedTexts.push(await file.text());

  function computeRelation() {
    if (!relationA || !relationB || !pMap[relationA] || !pMap[relationB]) {

    const path = findRelationPath(relationA, relationB, pMap, fMap);

    } else {
      const { genA, genB, hasSpouseLink } = classifyPath(path, pMap, fMap);

      const nameB = (pMap[relationB].givenname + ' ' + pMap[relationB].surname).trim() || relationB;

        const label = formatRelationLabel(formalRelationshipLabel(genA, genB));
        relationSummaryEl.textContent = label ? t('relation.summary', nameA, label, nameB) : nameA + ' — ' + nameB;

      renderRelationSteps(path);
    }

  function formatRelationLabel(label) {
    if (!label) return null;
    const { type, greats, degree, removal } = label;
    const great = (n) => (t('relation.greatPrefix')).repeat(n > 0 ? n : 0);
    switch (type) {
      case 'same':       return t('relation.same');
      case 'child':      return t('relation.child');
      case 'grandchild': return great(greats) + t('relation.grandchild');
      case 'parent':     return t('relation.parent');
      case 'grandparent':return great(greats) + t('relation.grandparent');
      case 'sibling':    return t('relation.sibling');
      case 'uncle':      return t('relation.uncle');
      case 'nephew':     return t('relation.nephew');
      case 'cousin': {
        const degStr = degree === 1 ? t('relation.cousin1st')
                     : degree === 2 ? t('relation.cousin2nd')
                     : t('relation.cousinNth', degree);
        if (removal === 0) return degStr;
        const remStr = removal === 1 ? t('relation.removed1') : t('relation.removedN', removal);
        return degStr + ', ' + remStr;
      }
      default: return null;
    }
  }

        li.textContent = `${name} (${viaLabel} →)`;

  }

  function makeRelationSuggestionHandler(slot, inputEl, suggestionsEl) {
    let activeSuggIdx = -1;

    function hideSuggestions() {
      suggestionsEl.style.display = 'none';
      activeSuggIdx = -1;
    }

    function renderSuggestions(items) {
      suggestionsEl.innerHTML = '';
      if (items.length === 0) { hideSuggestions(); return; }
      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item.year ? `${item.label} (${item.year})` : item.label;
        li.addEventListener('mousedown', e => {
          e.preventDefault();
          if (slot === 'a') { relationA = item.id; localStorage.setItem(RELATION_A_KEY, item.id); }
          else              { relationB = item.id; localStorage.setItem(RELATION_B_KEY, item.id); }
          renderRelationSlot(slot, item.id);
          hideSuggestions();
        });
        suggestionsEl.appendChild(li);
      });
      suggestionsEl.style.display = 'block';
      activeSuggIdx = -1;
    }

    inputEl.addEventListener('input', () => {
      const q = inputEl.value.trim();
      if (!q) { hideSuggestions(); return; }
      const nq = normaliseSearch(q);
      renderSuggestions(searchIndex.filter(item => normaliseSearch(item.label).includes(nq)).slice(0, 10));
    });

    inputEl.addEventListener('keydown', e => {
      const lis = suggestionsEl.querySelectorAll('li');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeSuggIdx = Math.min(activeSuggIdx + 1, lis.length - 1);
        lis.forEach((li, i) => li.classList.toggle('active', i === activeSuggIdx));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeSuggIdx = Math.max(activeSuggIdx - 1, 0);
        lis.forEach((li, i) => li.classList.toggle('active', i === activeSuggIdx));
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const target = lis[activeSuggIdx >= 0 ? activeSuggIdx : 0];
        if (target) target.dispatchEvent(new MouseEvent('mousedown'));
      } else if (e.key === 'Escape') {
        inputEl.value = '';
        hideSuggestions();
      }
    });

    inputEl.addEventListener('blur', () => setTimeout(hideSuggestions, 150));
  }

    dismissBtn.style.cssText = 'padding:6px 14px;border:none;background:transparent;color:rgba(255,255,255,0.8);cursor:pointer;font-size:0.85rem;margin-left:8px;';
    dismissBtn.addEventListener('click', () => bar.remove());

    bar.appendChild(label);
    bar.appendChild(importBtn);
    bar.appendChild(scratchBtn);
    bar.appendChild(dismissBtn);
    document.body.appendChild(bar);
  }

  if (data.isSample) showSampleBanner();

  window.__pw = {
    showPanel,
    redraw,
    pMap,
    fMap,
    coordinates,
    toggleAreas,
    root,
    home() { const h = getHomePan(); panX = h.panX; panY = h.panY; redraw(); },
    get panX()           { return panX; },
    get panY()           { return panY; },
    get scale()          { return scale; },
    get selectedPersonId() { return selectedPersonId; },
  };
}

const loginEl = document.getElementById('login');
const passwordEl = document.getElementById('password');
const buttonEl = document.getElementById('start');

function setupCanvas() {
  loginEl.remove();
  document.getElementById('login-bg')?.remove();
  const canvas = document.createElement('canvas');
  canvas.id = 'myCanvas';
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  canvas.style.border = 'none';
  canvas.style.display = 'block'; // To remove any extra spacing (similar to using CSS reset)
  document.body.appendChild(canvas);
  return canvas;
}

function showAddFirstPersonPrompt(canvas) {
  const overlay = document.createElement('div');
  overlay.style.cssText = [
    'position:fixed', 'inset:0', 'z-index:9998',
    'display:flex', 'align-items:center', 'justify-content:center',
    'background:var(--bg)', 'font-family:sans-serif',
  ].join(';');

  const card = document.createElement('div');
  card.style.cssText = [
    'background:var(--bg)', 'border:1px solid var(--text-muted)',
    'border-radius:12px', 'padding:32px', 'width:320px',
    'display:flex', 'flex-direction:column', 'gap:14px',
    'box-shadow:0 4px 24px rgba(0,0,0,0.15)',
  ].join(';');

  const title = document.createElement('h2');
  title.textContent = t('sample.addFirst');
  title.style.cssText = 'margin:0;font-size:1.1rem;color:var(--text);';

  const firstNameEl = document.createElement('input');
  firstNameEl.type = 'text';
  firstNameEl.placeholder = t('rel.firstName');
  firstNameEl.style.cssText = 'padding:8px 10px;border:1px solid var(--text-muted);border-radius:6px;background:var(--bg);color:var(--text);font-size:0.9rem;';

  const lastNameEl = document.createElement('input');
  lastNameEl.type = 'text';
  lastNameEl.placeholder = t('rel.lastName');
  lastNameEl.style.cssText = 'padding:8px 10px;border:1px solid var(--text-muted);border-radius:6px;background:var(--bg);color:var(--text);font-size:0.9rem;';

  const sexRow = document.createElement('div');
  sexRow.style.cssText = 'display:flex;gap:16px;color:var(--text);font-size:0.9rem;align-items:center;';
  ['M', 'F'].forEach((val, i) => {
    const lbl = document.createElement('label');
    lbl.style.cssText = 'display:flex;align-items:center;gap:6px;cursor:pointer;';
    const radio = document.createElement('input');
    radio.type = 'radio';
    radio.name = 'scratch-sex';
    radio.value = val;
    if (i === 0) radio.checked = true;
    lbl.appendChild(radio);
    lbl.appendChild(document.createTextNode(val === 'M' ? t('person.male') : t('person.female')));
    sexRow.appendChild(lbl);
  });

  const createBtn = document.createElement('button');
  createBtn.textContent = t('sample.create');
  createBtn.style.cssText = [
    'padding:10px', 'background:var(--btn-primary)', 'color:#fff',
    'border:none', 'border-radius:8px', 'cursor:pointer', 'font-size:0.95rem',
  ].join(';');

  createBtn.addEventListener('click', () => {
    const givenname = firstNameEl.value.trim();
    const surname   = lastNameEl.value.trim();
    if (!givenname && !surname) { firstNameEl.focus(); return; }
    createBtn.disabled = true;
    const sex = sexRow.querySelector('input[name="scratch-sex"]:checked')?.value || 'M';
    const fullname = surname ? `${givenname} /${surname}/` : givenname;
    localStorage.setItem(SCRATCH_ROOT_KEY, '@I1@');
    localStorage.setItem(NEW_PEOPLE_KEY_NS, JSON.stringify({ '@I1@': { fullname, givenname, surname, sex } }));
    overlay.remove();
    main({ dataVersion: 3, rootId: '@I1@', people: [], fams: [], images: {} }, canvas);
  });

  card.appendChild(title);
  card.appendChild(firstNameEl);
  card.appendChild(lastNameEl);
  card.appendChild(sexRow);
  card.appendChild(createBtn);
  overlay.appendChild(card);
  document.body.appendChild(overlay);
  firstNameEl.focus();
}

if (localStorage.getItem(SCRATCH_KEY) === '1') {
  const canvas = setupCanvas();
  const scratchRoot   = localStorage.getItem(SCRATCH_ROOT_KEY);
  const scratchPeople = JSON.parse(localStorage.getItem(NEW_PEOPLE_KEY_NS) || '{}');
  if (scratchRoot && scratchPeople[scratchRoot]) {
    main({ dataVersion: 3, rootId: scratchRoot, people: [], fams: [], images: {} }, canvas);
  } else {
    localStorage.removeItem(SCRATCH_ROOT_KEY);
    showAddFirstPersonPrompt(canvas);
  }
} else if (window.familyTreeData) {
  const canvas = setupCanvas();
  main(window.familyTreeData, canvas);
} else {
  loginEl.style.display = 'block';
  document.getElementById('login-bg').style.display = 'block';
  passwordEl.focus();
  passwordEl.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      buttonEl.click();
    }
  });
  buttonEl.addEventListener('click', async function () {
    const password = passwordEl.value;
    if (!password) {
      return alert('Provide password')
    }
    const button = this;
    let dotCount = 0;
    const interval = setInterval(() => {
        dotCount = (dotCount + 1) % 4; // Cycle through 0, 1, 2, 3
        let dots = '.'.repeat(dotCount); // Create a string with the appropriate number of dots
        button.textContent = `${t('login.btn')}${dots}`;
    }, 250);

    try {
      let dataString;
      const nonce = base64ToUint8Array(encryptedData.nonce);
      const cipherText = base64ToUint8Array(encryptedData.cipherText);

      const decode = async (buf) => {
        const bytes = encryptedData.compressed ? await inflate(buf) : buf;
        return new TextDecoder().decode(bytes);
      };

      if (encryptedData.slots) {
        // New multi-password format: try each slot until one opens
        for (const slot of encryptedData.slots) {
          try {
            const rawDek = await unwrapDek(slot, password, encryptedData.iterations);
            dataString = await decode(await decryptData(rawDek, nonce, cipherText));
            break;
          } catch (_) { /* wrong slot — try next */ }
        }
      } else {
        // Legacy single-password format: key derived directly from password
        const keyMaterial = await crypto.subtle.importKey(
          'raw', new TextEncoder().encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
        );
        const key = await crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: base64ToUint8Array(encryptedData.salt), iterations: encryptedData.iterations, hash: 'SHA-256' },
          keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
        );
        const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, cipherText);
        dataString = await decode(decrypted);
      }

      if (!dataString) throw new Error('no slot matched');

      const familyTreeData = JSON.parse(dataString);
      const canvas = setupCanvas();
      main(familyTreeData, canvas);
    } catch (err) {
      console.log(err);
      alert('Wrong password. Try again');
    }
    clearInterval(interval);
  });
}

// ── PWA service worker ───────────────────────────────────────────────────────
// family-tree-1778946216234 is replaced at build time by scripts/build.js with a timestamp
// so every build gets a fresh cache name and old caches are evicted automatically.
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'family-tree-1778946216234';
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.add(self.location.href.replace(/\\/[^\\/]*$/, '/')))
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    )
  );
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.mode === 'navigate') {
    e.respondWith(
      caches.match(e.request).then(cached => cached || fetch(e.request))
    );
  }
});
`;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: './' })
    .then(() => URL.revokeObjectURL(swUrl))
    .catch(() => {});
}
